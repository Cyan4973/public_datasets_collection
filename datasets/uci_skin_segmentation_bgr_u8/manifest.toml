notes = "Official upstream dataset page."

[[resources]]
id = "main_archive"
origin = "official"
url = "https://archive.ics.uci.edu/static/public/229/skin+segmentation.zip"
type = "archive"
version = "accessed_by_user"
access = "Direct public download."
size_bytes = 0
sha256 = ""
local_path = "downloads/uci_skin_segmentation_bgr_u8/skin-segmentation.zip"
notes = "Archive containing the Skin_NonSkin table."

[local_paths]
downloads = "downloads/uci_skin_segmentation_bgr_u8/"
extracted = "extracted/uci_skin_segmentation_bgr_u8/"
filtered = "filtered/uci_skin_segmentation_bgr_u8/"
index = "index/uci_skin_segmentation_bgr_u8/"
samples = "samples/uci_skin_segmentation_bgr_u8/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/uci_skin_segmentation_bgr_u8/samples.jsonl"
summary = "Validate the local UCI archive, parse B/G/R channel values per pixel sample, emit one row-major uint8 primary sample, and write skin labels as auxiliary uint8."
deterministic_notes = "Build is local-only, preserves upstream row order, range-checks BGR values to 0..255, validates binary labels, rejects malformed rows, and writes a samples.jsonl index."

[[series]]
id = "skin_bgr_channels"
description = "Skin Segmentation BGR color-channel values."
semantic_meaning = "Three native color-channel measurements per pixel sample in upstream B, G, R column order."
role = "primary"
representation_class = "native_numeric"
representation_notes = "The source table stores integer BGR channel values; values are copied as unsigned 8-bit integers without remapping."
source_resources = ["main_archive"]
filtered_input_path = "filtered/uci_skin_segmentation_bgr_u8/ingest_stats.json"
filtering = "Keep all rows and the B, G, and R channel columns from the official table."
missing_value_policy = "No missing marker is documented; blank, malformed, non-integer, or out-of-range values are fatal."
conversion = "Parse decimal BGR values, range-check to 0..255, and write one row-major raw uint8 sample."
numeric_kind = "uint"
bit_width = 8
endianness = "little"
sample_format = "raw homogeneous numeric array"
sample_count = 0
total_size_bytes = 0
output_path = "samples/uci_skin_segmentation_bgr_u8/skin_bgr_channels/"

[[series]]
id = "skin_binary_labels"
description = "Skin/non-skin labels."
semantic_meaning = "Binary class label aligned one value per source row."
role = "auxiliary"
representation_class = "native_numeric"
representation_notes = "The source table stores labels 1 and 2; values are copied as uint8 without remapping."
source_resources = ["main_archive"]
filtered_input_path = "filtered/uci_skin_segmentation_bgr_u8/ingest_stats.json"
filtering = "Keep the final label column for all retained rows."
missing_value_policy = "Blank, malformed, non-integer, or labels outside 1..2 are fatal."
conversion = "Parse decimal labels, range-check to 1..2, and write raw uint8 bytes."
numeric_kind = "uint"
bit_width = 8
endianness = "little"
sample_format = "raw homogeneous numeric array"
sample_count = 0
total_size_bytes = 0
output_path = "samples/uci_skin_segmentation_bgr_u8/skin_binary_labels/"
