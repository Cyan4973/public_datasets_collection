manifest_version = 1
dataset_id = "sentinel1_grd_measurement_u16"
name = "Sentinel-1 GRD Measurement Uint16"
description = "Selected Sentinel-1 Level-1 GRD SAR measurement GeoTIFFs preserved as native uint16 raster samples (one sample per source measurement file)."
homepage = "https://planetarycomputer.microsoft.com/dataset/sentinel-1-grd"

[license]
name = "Copernicus Sentinel Data Terms and Conditions"
spdx = "LicenseRef-Copernicus-Sentinel"
url = "https://sentinels.copernicus.eu/documents/d/sentinel/sentinel-data-legal-notice"
citation = "Contains modified Copernicus Sentinel data processed by ESA and distributed through the Microsoft Planetary Computer Sentinel-1 GRD collection."
notes = "Sentinel data are free and open under Copernicus Sentinel Data Terms and Conditions. Preserve attribution."

[safety]
contains_sensitive_data = false
contains_personal_data = false
provenance_notes = "Public satellite synthetic-aperture-radar imagery from the Microsoft Planetary Computer Sentinel-1 GRD collection or exact official measurement TIFF URLs supplied by the user."
usage_notes = "Remote-sensing SAR measurement rasters; no personal records or private observations."

[[origins]]
id = "planetary_computer_sentinel1_grd"
name = "Microsoft Planetary Computer Sentinel-1 GRD"
url = "https://planetarycomputer.microsoft.com/dataset/sentinel-1-grd"
type = "data_portal"
notes = "Public STAC catalog for Sentinel-1 Level-1 GRD products converted to Cloud Optimized GeoTIFF assets (uint16, Zstandard-compressed)."

[[resources]]
id = "selected_measurement_tiffs"
origin = "planetary_computer_sentinel1_grd"
url = "datasets/sentinel1_grd_measurement_u16/download.sh"
type = "bounded_stac_selection"
version = "medium_resolution_grd_default_hh_hv"
access = "Download script queries a public STAC endpoint or consumes an exact URL file, writes a download plan, and downloads a bounded set of measurement TIFFs."
size_bytes = 0
sha256 = ""
local_path = "downloads/sentinel1_grd_measurement_u16/"
notes = "Default selection is two medium-resolution dual-pol GRDM scenes (1SDH = HH+HV), taking both the HH and HV measurement assets per scene, using high-latitude/ocean search windows first and bounded by file-size and aggregate-download caps. Each polarization forms its own homogeneous series."

[local_paths]
downloads = "downloads/sentinel1_grd_measurement_u16/"
filtered = "filtered/sentinel1_grd_measurement_u16/"
index = "index/sentinel1_grd_measurement_u16/"
samples = "samples/sentinel1_grd_measurement_u16/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/sentinel1_grd_measurement_u16/samples.jsonl"
summary = "Download selected Sentinel-1 GRD measurement GeoTIFFs and extract one native uint16 raster sample per source measurement file."
deterministic_notes = "Fixed high-latitude/ocean-first STAC search order, product-token filter, explicit polarization set, exact asset URL plan, no polarization mixing, no scene concatenation, one whole-raster sample per source measurement GeoTIFF, 1 GB primary output cap, and lossless TIFF tile decoding (Deflate via zlib, Zstandard via the zstd CLI)."

[[series]]
id = "sentinel1_grd_vv_dn_u16"
description = "VV-polarized Sentinel-1 GRD measurement digital-number rasters."
semantic_meaning = "Native VV polarization SAR measurement pixel digital numbers from Sentinel-1 GRD products."
role = "primary"
representation_class = "native_numeric"
representation_notes = "Source measurement TIFFs store SAR digital numbers as uint16 raster pixels. Each sample is one full measurement raster decoded losslessly (Deflate via zlib, Zstandard via the zstd CLI)."
source_resources = ["selected_measurement_tiffs"]
filtered_input_path = "filtered/sentinel1_grd_measurement_u16/ingest_stats.json"
filtering = "Keep only single-band uint16 TIFF images for the VV polarization with supported uncompressed, Deflate, or Zstandard tile/strip encoding."
missing_value_policy = "Missing assets, non-uint16 TIFFs, unsupported TIFF compression, malformed tile/strip tables, truncated tiles, empty rasters, and constant rasters are rejected."
conversion = "Decode the measurement TIFF losslessly and write one raw uint16 pixel-plane sample per source VV measurement file."
numeric_kind = "uint"
bit_width = 16
endianness = "little"
sample_format = "raw Sentinel-1 GRD measurement digital-number raster"
sample_geometry = "2d_raster"
sample_rank = 2
sample_shape = []
sample_axes = ["y", "x"]
sample_count = 0
total_size_bytes = 0
output_path = "samples/sentinel1_grd_measurement_u16/sentinel1_grd_vv_dn_u16/"

