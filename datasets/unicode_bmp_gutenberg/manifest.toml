origin = "gutenberg"
url = "https://www.gutenberg.org/cache/epub/"
type = "text_corpus"
version = "pinned_12_books"
access = "Direct public download."
size_bytes = 0
sha256 = ""
local_path = "downloads/unicode_bmp_gutenberg/texts/"
