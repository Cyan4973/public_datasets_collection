manifest_version = 1
dataset_id = "beijing_air_quality_uci"
name = "UCI Beijing Multi-Site Air Quality"
description = "Per-station air-quality and weather time-series from the Beijing multi-site archive."
homepage = "https://archive.ics.uci.edu/dataset/501/beijing+multi+site+air+quality+data"

[license]
name = "CC BY 4.0"
spdx = "CC-BY-4.0"
url = "https://creativecommons.org/licenses/by/4.0/"
citation = "Beijing Multi-Site Air-Quality Data, UCI Machine Learning Repository."
notes = "UCI metadata indicates CC BY 4.0."

[safety]
contains_sensitive_data = false
contains_personal_data = false
provenance_notes = "Official upstream distribution only; no mirrors, leaks, or scraped personal content."
usage_notes = "Public source intended for reproducible numeric dataset collection."

[[origins]]
id = "official"
name = "UCI ML Repository"
url = "https://archive.ics.uci.edu/dataset/501/beijing+multi+site+air+quality+data"
type = "data_portal"
notes = "Official upstream dataset page."

[[resources]]
id = "main"
origin = "official"
url = "https://archive.ics.uci.edu/static/public/501/beijing+multi+site+air+quality+data.zip"
type = "archive"
version = "accessed_by_user"
access = "Direct public download."
size_bytes = 0
sha256 = ""
local_path = "downloads/beijing_air_quality_uci/beijing_multi_site_air_quality.zip"
notes = "Archive containing per-station CSV files."

[local_paths]
downloads = "downloads/beijing_air_quality_uci/"
extracted = "extracted/beijing_air_quality_uci/"
filtered = "filtered/beijing_air_quality_uci/"
index = "index/beijing_air_quality_uci/"
samples = "samples/beijing_air_quality_uci/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/beijing_air_quality_uci/samples.jsonl"
summary = "Download pinned upstream resources, build local raw numeric samples only from local files, and generate a machine-readable sample index."
deterministic_notes = "Build preserves source file order, does no network access, writes durable logs, and emits samples.jsonl under index/beijing_air_quality_uci/."

[[series]]
id = "air_year"
description = "Observation year."
semantic_meaning = "Observation year."
role = "auxiliary"
representation_class = "native_numeric"
source_resources = ["main"]
filtered_input_path = "filtered/beijing_air_quality_uci/inventory.tsv"
filtering = "Keep rows where all retained numeric fields are parseable."
missing_value_policy = "Rows with blanks in retained fields are filtered out."
conversion = "Parse the source table(s) in order and write this column's parsed values as one sample per monitoring station, as raw little-endian float64."
numeric_kind = "float"
bit_width = 64
endianness = "little"
sample_format = "raw homogeneous numeric array"
sample_count = 0
total_size_bytes = 0
output_path = "samples/beijing_air_quality_uci/air_year/"

