manifest_version = 1
dataset_id = "opendota_hero_stats"
name = "OpenDota Hero Stats"
description = "Numeric hero attribute and popularity/performance fields from the public OpenDota hero stats endpoint."

[license]
name = "LicenseRef-OpenDota"
spdx = "LicenseRef-OpenDota"
url = "https://www.opendota.com/"

[[resources]]
id = "hero_stats_json"
url = "https://api.opendota.com/api/heroStats"
type = "api_response"
local_path = "downloads/opendota_hero_stats/opendota_hero_stats.json"

[local_paths]
downloads = "downloads/opendota_hero_stats/"
filtered = "filtered/opendota_hero_stats/"
index = "index/opendota_hero_stats/"
samples = "samples/opendota_hero_stats/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/opendota_hero_stats/samples.jsonl"

[[series]]
id = "opendota_hero_id"
representation_class = "native_numeric"
missing_value_policy = "Rows missing numeric fields are filtered for that series."
numeric_kind = "uint"
bit_width = 16
endianness = "little"

