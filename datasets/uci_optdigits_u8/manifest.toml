manifest_version = 1
dataset_id = "uci_optdigits_u8"
name = "UCI Optical Recognition of Handwritten Digits"
description = "Native 8-bit integer 8x8 handwritten-digit feature grids from the UCI Optdigits train and test files."
homepage = "https://archive.ics.uci.edu/dataset/80/optical+recognition+of+handwritten+digits"

[license]
name = "Creative Commons Attribution 4.0 International"
spdx = "CC-BY-4.0"
url = "https://creativecommons.org/licenses/by/4.0/"
citation = "Optical Recognition of Handwritten Digits Data Set, UCI Machine Learning Repository."
notes = "UCI metadata indicates CC BY 4.0."

[safety]
contains_sensitive_data = false
contains_personal_data = false
provenance_notes = "Official UCI archive only; no mirrors, leaks, or scraped personal content."
usage_notes = "Public OCR benchmark appropriate for reproducible numeric dataset collection."

[[origins]]
id = "official"
name = "UCI Machine Learning Repository"
url = "https://archive.ics.uci.edu/dataset/80/optical+recognition+of+handwritten+digits"
type = "data_portal"
notes = "Official upstream dataset page."

[[resources]]
id = "main_archive"
origin = "official"
url = "https://archive.ics.uci.edu/static/public/80/optical+recognition+of+handwritten+digits.zip"
type = "archive"
version = "accessed_by_user"
access = "Direct public download."
size_bytes = 0
sha256 = ""
local_path = "downloads/uci_optdigits_u8/optdigits.zip"
notes = "Archive containing optdigits train and test tables."

[local_paths]
downloads = "downloads/uci_optdigits_u8/"
extracted = "extracted/uci_optdigits_u8/"
filtered = "filtered/uci_optdigits_u8/"
index = "index/uci_optdigits_u8/"
samples = "samples/uci_optdigits_u8/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/uci_optdigits_u8/samples.jsonl"
summary = "Validate the local UCI archive, parse train/test 64-feature digit tables, emit the native integer feature grids as uint8 samples, and write digit labels as auxiliary uint8."
deterministic_notes = "Build is local-only, preserves upstream train/test row order, range-checks feature values to 0..16, validates digit labels 0..9, rejects malformed rows, and writes a samples.jsonl index."

[[series]]
id = "optdigits_features"
description = "Optdigits 8x8 feature grids."
semantic_meaning = "Sixty-four upstream integer image-feature values per handwritten digit, row-major in source order."
role = "primary"
representation_class = "native_numeric"
representation_notes = "The source table stores bounded integer feature values; values are copied as unsigned 8-bit integers without remapping."
source_resources = ["main_archive"]
filtered_input_path = "filtered/uci_optdigits_u8/ingest_stats.json"
filtering = "Keep all rows and all 64 numeric feature columns from the train and test files."
missing_value_policy = "No missing marker is documented; blank, malformed, non-integer, or out-of-range feature values are fatal."
conversion = "Parse decimal feature values, range-check to 0..16, and write train/test row-major raw uint8 samples."
numeric_kind = "uint"
bit_width = 8
endianness = "little"
sample_format = "raw homogeneous numeric array"
sample_count = 0
total_size_bytes = 0
output_path = "samples/uci_optdigits_u8/optdigits_features/"

[[series]]
id = "optdigits_labels"
description = "Optdigits digit labels."
semantic_meaning = "Digit class label aligned one value per source row."
role = "auxiliary"
representation_class = "native_numeric"
representation_notes = "The source table stores digit labels 0 through 9; values are copied as uint8 without remapping."
source_resources = ["main_archive"]
filtered_input_path = "filtered/uci_optdigits_u8/ingest_stats.json"
filtering = "Keep one digit label per retained source row."
missing_value_policy = "Blank, malformed, non-integer, or labels outside 0..9 are fatal."
conversion = "Parse decimal labels, range-check to 0..9, and write raw uint8 bytes."
numeric_kind = "uint"
bit_width = 8
endianness = "little"
sample_format = "raw homogeneous numeric array"
sample_count = 0
total_size_bytes = 0
output_path = "samples/uci_optdigits_u8/optdigits_labels/"
