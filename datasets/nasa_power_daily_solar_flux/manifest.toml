manifest_version = 1
dataset_id = "nasa_power_daily_solar_flux"
name = "NASA POWER Daily Solar Flux"
description = "NASA POWER daily point solar-radiation JSON extracts for twenty fixed locations, 1984-2024."
homepage = "https://power.larc.nasa.gov/"

[license]
name = "NASA Open Data"
spdx = "LicenseRef-NASA-Open-Data"
url = "https://power.larc.nasa.gov/docs/services/api/"
citation = "NASA POWER Project daily point API."
notes = "NASA POWER data are publicly accessible."

[safety]
contains_sensitive_data = false
contains_personal_data = false
provenance_notes = "Official NASA POWER API only."
usage_notes = "Public climate point data suitable for reproducible numeric dataset collection."

[[origins]]
id = "nasa_power_daily_api"
name = "NASA POWER Daily Point API"
url = "https://power.larc.nasa.gov/api/temporal/daily/point"
type = "api"
notes = "Public JSON API for daily point climate time series."

[[resources]]
id = "power_daily_solar_flux_1984_2024"
origin = "nasa_power_daily_api"
url = "https://power.larc.nasa.gov/api/temporal/daily/point"
type = "api_query_result"
version = "1984-2024-twenty-locations-three-solar-radiation-parameters"
access = "Location-year JSON queries with fixed coordinates, parameters, start, end, format, and UTC time standard."
size_bytes = 0
sha256 = ""
local_path = "downloads/nasa_power_daily_solar_flux/"
notes = "One JSON file per selected location-year."

[local_paths]
downloads = "downloads/nasa_power_daily_solar_flux/"
extracted = "extracted/nasa_power_daily_solar_flux/"
filtered = "filtered/nasa_power_daily_solar_flux/"
index = "index/nasa_power_daily_solar_flux/"
samples = "samples/nasa_power_daily_solar_flux/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/nasa_power_daily_solar_flux/samples.jsonl"
summary = "Download selected NASA POWER daily point JSON files, retain parseable solar-radiation parameter values, and emit one homogeneous sample per location and parameter."
deterministic_notes = "Fixed location list, fixed parameter list, fixed years 1984-2024, fixed API query parameters, download-time payload validation, skipped fill-value and malformed rows only, preserved day order within each location-year response, concatenated years in ascending order per location-parameter sample, durable logs under logs/nasa_power_daily_solar_flux/, and generated sample index at index/nasa_power_daily_solar_flux/samples.jsonl."

[[series]]
id = "nasa_power_solar_allsky_sw_down_f64"
description = "NASA POWER all-sky surface shortwave downward irradiance."
semantic_meaning = "Float64 daily all-sky shortwave downward irradiance at the surface, one sample per selected location."
source_resources = ["power_daily_solar_flux_1984_2024"]
filtered_input_path = "filtered/nasa_power_daily_solar_flux/location_parameter_year_stats.tsv"
filtering = "Keep ALLSKY_SFC_SW_DWN rows with parseable date keys and values that are not equal to the API fill value."
missing_value_policy = "Filter rows whose values equal the API fill value, blank strings, NaN strings, malformed date keys, or malformed numeric values."
conversion = "Parse retained parameter values as Python float and write IEEE-754 little-endian float64 arrays preserving chronological order within each location-parameter sample."
numeric_kind = "float"
bit_width = 64
endianness = "little"
sample_format = "raw homogeneous numeric array"
sample_count = 20
total_size_bytes = 0
output_path = "samples/nasa_power_daily_solar_flux/nasa_power_solar_allsky_sw_down_f64/"

