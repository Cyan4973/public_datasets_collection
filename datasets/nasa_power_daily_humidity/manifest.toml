deterministic_notes = "Fixed location list, fixed parameter list, fixed years 1981-2024, fixed API query parameters, download-time payload validation, skipped fill-value and malformed rows only, preserved day order within each location-year response, concatenated years in ascending order per location-parameter sample, durable logs under logs/nasa_power_daily_humidity/, and generated sample index at index/nasa_power_daily_humidity/samples.jsonl."
[[series]]
id = "nasa_power_humidity_rh2m_f64"
description = "NASA POWER 2-meter daily relative humidity."
semantic_meaning = "Float64 daily relative humidity at 2 meters, one sample per selected location."
source_resources = ["power_daily_humidity_1981_2024"]
filtered_input_path = "filtered/nasa_power_daily_humidity/location_parameter_year_stats.tsv"
filtering = "Keep RH2M rows with parseable date keys and values that are not equal to the API fill value."
conversion = "Parse retained parameter values as Python float and write IEEE-754 little-endian float64 arrays preserving chronological order within each location-parameter sample."
