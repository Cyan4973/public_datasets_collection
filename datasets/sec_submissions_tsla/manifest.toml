manifest_version = 1
dataset_id = "sec_submissions_tsla"
name = "SEC Submissions TSLA"
description = "Pinned SEC recent submissions metadata stream for Tesla recent filings."

[local_paths]
downloads = "downloads/sec_submissions_tsla/"
filtered = "filtered/sec_submissions_tsla/"
index = "index/sec_submissions_tsla/"
samples = "samples/sec_submissions_tsla/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/sec_submissions_tsla/samples.jsonl"

[[series]]
id = "sec_tsla_submission_size"
path = "samples/sec_submissions_tsla/sec_tsla_submission_size/tsla.bin"
numeric_kind = "uint"
bit_width = 32
endianness = "little"
sample_format = "raw_homogeneous_array"
missing_value_policy = "filtered_rows_with_invalid_sizes"

[[series]]
id = "sec_tsla_acceptance_timestamp"
path = "samples/sec_submissions_tsla/sec_tsla_acceptance_timestamp/tsla.bin"
numeric_kind = "uint"
bit_width = 64
endianness = "little"
sample_format = "raw_homogeneous_array"
missing_value_policy = "filtered_rows_with_invalid_acceptance_timestamps"

[[series]]
id = "sec_tsla_filing_year"
path = "samples/sec_submissions_tsla/sec_tsla_filing_year/tsla.bin"
numeric_kind = "uint"
bit_width = 16
endianness = "little"
sample_format = "raw_homogeneous_array"
missing_value_policy = "filtered_rows_with_invalid_filing_dates"

[[series]]
id = "sec_tsla_filing_month"
path = "samples/sec_submissions_tsla/sec_tsla_filing_month/tsla.bin"
numeric_kind = "uint"
bit_width = 8
endianness = "little"
sample_format = "raw_homogeneous_array"
missing_value_policy = "filtered_rows_with_invalid_filing_dates"

[[series]]
id = "sec_tsla_filing_day"
path = "samples/sec_submissions_tsla/sec_tsla_filing_day/tsla.bin"
numeric_kind = "uint"
bit_width = 8
endianness = "little"
sample_format = "raw_homogeneous_array"
missing_value_policy = "filtered_rows_with_invalid_filing_dates"
