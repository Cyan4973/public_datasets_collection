manifest_version = 1
dataset_id = "chesscom_hikaru_2024_01"
name = "Chess.com Hikaru January 2024 Games"
description = "Pinned monthly Chess.com games payload with rating and game-end timestamp fields."

[license]
name = "LicenseRef-ChessCom"
spdx = "LicenseRef-ChessCom"
url = "https://www.chess.com/news/view/published-data-api"

[[resources]]
id = "games_json"
url = "https://api.chess.com/pub/player/hikaru/games/2024/01"
type = "api_response"
local_path = "downloads/chesscom_hikaru_2024_01/chesscom_hikaru_2024_01.json"

[local_paths]
downloads = "downloads/chesscom_hikaru_2024_01/"
filtered = "filtered/chesscom_hikaru_2024_01/"
index = "index/chesscom_hikaru_2024_01/"
samples = "samples/chesscom_hikaru_2024_01/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/chesscom_hikaru_2024_01/samples.jsonl"

[[series]]
id = "chesscom_white_rating"
representation_class = "native_numeric"
missing_value_policy = "Rows missing numeric fields are filtered."
