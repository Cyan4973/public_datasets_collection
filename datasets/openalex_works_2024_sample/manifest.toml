manifest_version = 1
dataset_id = "openalex_works_2024_sample"
name = "OpenAlex Works 2024 Sample"
description = "Bounded cursor-paginated OpenAlex 2024 works table with native date/count fields and stable per-work cardinalities."

[license]
name = "CC0-1.0"
spdx = "CC0-1.0"
url = "https://docs.openalex.org/download-all-data/openalex-snapshot"

[[resources]]
id = "openalex_works_2024_pages"
url = "https://api.openalex.org/works?filter=from_publication_date:2024-01-01,to_publication_date:2024-12-31&per-page=200&cursor=*"
type = "api_response_pages"
local_path = "downloads/openalex_works_2024_sample/pages/"

[local_paths]
downloads = "downloads/openalex_works_2024_sample/"
filtered = "filtered/openalex_works_2024_sample/"
index = "index/openalex_works_2024_sample/"
samples = "samples/openalex_works_2024_sample/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/openalex_works_2024_sample/samples.jsonl"

[[series]]
id = "openalex_publication_date"
semantic_meaning = "Work publication date encoded as YYYYMMDD from the native publication_date field."
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Rows missing a full publication_date are filtered."
conversion = "Native ISO date string parsed to YYYYMMDD uint32."
numeric_kind = "uint"
bit_width = 32
endianness = "little"

[[series]]
id = "openalex_cited_by_count"
semantic_meaning = "Native OpenAlex cited_by_count for the work."
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Rows missing numeric count fields are filtered."
conversion = "Native JSON integer stored as uint32."
numeric_kind = "uint"
bit_width = 32
endianness = "little"

