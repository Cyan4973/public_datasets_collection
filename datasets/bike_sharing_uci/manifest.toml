manifest_version = 1
dataset_id = "bike_sharing_uci"
name = "UCI Bike Sharing"
description = "Real measured columns from the UCI Bike Sharing hourly file (hour.csv): weather measurements, the weather-condition code, and ride counts. Calendar/calendar-derived index columns are excluded."

[license]
name = "CC BY 4.0"
spdx = "CC-BY-4.0"
url = "https://creativecommons.org/licenses/by/4.0/"
citation = "Bike Sharing Dataset, UCI Machine Learning Repository."
notes = "UCI metadata indicates CC BY 4.0."

[safety]
contains_sensitive_data = false
contains_personal_data = false
provenance_notes = "Official upstream distribution only; no mirrors, leaks, or scraped personal content."
usage_notes = "Public source intended for reproducible numeric dataset collection."

[[origins]]
id = "official"
name = "UCI ML Repository"
url = "https://archive.ics.uci.edu/dataset/275/bike+sharing+dataset"
type = "data_portal"
notes = "Official upstream dataset page."

[[resources]]
id = "main"
origin = "official"
url = "https://archive.ics.uci.edu/static/public/275/bike+sharing+dataset.zip"
type = "archive"
version = "accessed_by_user"
access = "Direct public download."
size_bytes = 0
sha256 = ""
local_path = "downloads/bike_sharing_uci/bike_sharing_dataset.zip"
notes = "Archive containing hour.csv."

[local_paths]
downloads = "downloads/bike_sharing_uci/"
extracted = "extracted/bike_sharing_uci/"
filtered = "filtered/bike_sharing_uci/"
index = "index/bike_sharing_uci/"
samples = "samples/bike_sharing_uci/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/bike_sharing_uci/samples.jsonl"
summary = "Parse hour.csv in source order and emit one sample per retained measured column at the smallest target width its values fit. Calendar/calendar-derived columns are dropped."
deterministic_notes = "Build is local-only and order-preserving. Retained columns: temp/atemp/hum/windspeed (f32), weathersit (u8), casual/registered/cnt (u16). Excluded columns: instant (record index), dteday (date string), and the calendar/calendar-derived fields season, yr, mnth, hr, weekday, holiday, workingday. Integer columns are range-checked to fit their unsigned width; out-of-range or malformed rows are fatal."

[[series]]
id = "bike_temp"
description = "Normalized hourly air temperature."
semantic_meaning = "Normalized temperature in Celsius (upstream value divided by 41), one value per hour in source order."
source_resources = ["main"]
filtered_input_path = "filtered/bike_sharing_uci/inventory.tsv"
filtering = "Keep the temp column for all hourly rows."
missing_value_policy = "No missing values upstream; malformed rows are fatal."
conversion = "Parse as float and write little-endian float32."
numeric_kind = "float"
bit_width = 32
endianness = "little"
sample_format = "raw homogeneous numeric array"
sample_count = 0
total_size_bytes = 0
output_path = "samples/bike_sharing_uci/bike_temp/"

