[local_paths]
downloads = "downloads/unicode_bmp_gutenberg/"
extracted = "extracted/unicode_bmp_gutenberg/"
filtered = "filtered/unicode_bmp_gutenberg/"
index = "index/unicode_bmp_gutenberg/"
samples = "samples/unicode_bmp_gutenberg/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/unicode_bmp_gutenberg/samples.jsonl"
summary = "Download 12 pinned Project Gutenberg books, strip Gutenberg boilerplate, encode the remaining text as UTF-16 little-endian code units, and emit one sample per book."
deterministic_notes = "Download validates that all 12 pinned books are present. Build preserves book order, applies fixed header/footer stripping rules, encodes as UTF-16LE without further normalization, writes durable logs, and emits samples.jsonl."

[[series]]
id = "unicode_bmp_codeunits"
description = "UTF-16 little-endian code-unit streams for stripped Project Gutenberg books."
semantic_meaning = "Derived operational code-unit representation of public-domain text."
representation_class = "derived_operational_numeric"
representation_notes = "UTF-16 code units are not native measurements, but they are a deterministic pinned machine representation that real text-processing infrastructure may store or compress."
source_resources = ["books"]
filtered_input_path = "filtered/unicode_bmp_gutenberg/ingest_stats.json"
filtering = "Keep the 12 pinned books. Remove Project Gutenberg boilerplate using the fixed start/end marker list, then keep the remaining text exactly."
missing_value_policy = "No imputation. Characters are preserved exactly after boilerplate stripping."
conversion = "Encode stripped text directly as UTF-16LE and write one raw sample per book."
numeric_kind = "uint"
bit_width = 16
endianness = "little"
sample_format = "raw homogeneous numeric array"
sample_count = 0
total_size_bytes = 0
output_path = "samples/unicode_bmp_gutenberg/unicode_bmp_codeunits/"
