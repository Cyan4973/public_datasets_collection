summary = "Download the pinned UCI archive and emit one raw float32 electricity-load time series per meter as samples of a single homogeneous series."
deterministic_notes = "Build preserves row order and omits timestamps. Every meter measures the same quantity (client electricity load, kW, 15-minute cadence), so all meters are samples of one homogeneous series (one sample per meter), not a series per meter. Writes durable logs and samples.jsonl under index/electricity_load_diagrams_uci/."

