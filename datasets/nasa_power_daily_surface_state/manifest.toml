manifest_version = 1
dataset_id = "nasa_power_daily_surface_state"
name = "NASA POWER Daily Surface State"
description = "NASA POWER daily point surface pressure, specific humidity, and wet-bulb temperature JSON extracts for twenty fixed locations, 1981-2024."
homepage = "https://power.larc.nasa.gov/"

[license]
name = "NASA Open Data"
spdx = "LicenseRef-NASA-Open-Data"
url = "https://power.larc.nasa.gov/docs/services/api/"
citation = "NASA POWER Project daily point API."
notes = "NASA POWER data are publicly accessible."

[safety]
contains_sensitive_data = false
contains_personal_data = false
provenance_notes = "Official NASA POWER API only."
usage_notes = "Public climate point data suitable for reproducible numeric dataset collection."

[[origins]]
id = "nasa_power_daily_api"
name = "NASA POWER Daily Point API"
url = "https://power.larc.nasa.gov/api/temporal/daily/point"
type = "api"
notes = "Public JSON API for daily point climate time series."

[[resources]]
id = "power_daily_surface_state_1981_2024"
origin = "nasa_power_daily_api"
url = "https://power.larc.nasa.gov/api/temporal/daily/point"
type = "api_query_result"
version = "1981-2024-twenty-locations-three-surface-state-parameters"
access = "Location-year JSON queries with fixed coordinates, parameters, start, end, format, and UTC time standard."
size_bytes = 0
sha256 = ""
local_path = "downloads/nasa_power_daily_surface_state/"
notes = "One JSON file per selected location-year."

[local_paths]
downloads = "downloads/nasa_power_daily_surface_state/"
extracted = "extracted/nasa_power_daily_surface_state/"
filtered = "filtered/nasa_power_daily_surface_state/"
index = "index/nasa_power_daily_surface_state/"
samples = "samples/nasa_power_daily_surface_state/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/nasa_power_daily_surface_state/samples.jsonl"
summary = "Download selected NASA POWER daily point JSON files, retain parseable surface-state parameter values, and emit one homogeneous sample per location and parameter."
deterministic_notes = "Fixed location list, fixed parameter list, fixed years 1981-2024, fixed API query parameters, download-time payload validation, skipped fill-value and malformed rows only, preserved day order within each location-year response, concatenated years in ascending order per location-parameter sample, durable logs under logs/nasa_power_daily_surface_state/, and generated sample index at index/nasa_power_daily_surface_state/samples.jsonl."

[[series]]
id = "nasa_power_surface_pressure_ps_f64"
description = "NASA POWER daily surface pressure."
semantic_meaning = "Float64 daily surface pressure, one sample per selected location."
source_resources = ["power_daily_surface_state_1981_2024"]
filtered_input_path = "filtered/nasa_power_daily_surface_state/location_parameter_year_stats.tsv"
filtering = "Keep PS rows with parseable date keys and values that are not equal to the API fill value."
missing_value_policy = "Filter rows whose values equal the API fill value, blank strings, NaN strings, malformed date keys, or malformed numeric values."
conversion = "Parse retained parameter values as Python float and write IEEE-754 little-endian float64 arrays preserving chronological order within each location-parameter sample."
numeric_kind = "float"
bit_width = 64
endianness = "little"
sample_format = "raw homogeneous numeric array"
sample_count = 20
total_size_bytes = 0
output_path = "samples/nasa_power_daily_surface_state/nasa_power_surface_pressure_ps_f64/"

