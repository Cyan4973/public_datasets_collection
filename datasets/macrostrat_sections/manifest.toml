type = "json_api_response"
access = "Public HTTPS JSON endpoint."
size_bytes = 15049802
sha256 = ""
local_path = "downloads/macrostrat_sections/macrostrat_sections.json"
notes = "Validated local run used 11,315 section records and 15,049,802 source bytes."

[local_paths]
downloads = "downloads/macrostrat_sections/"
filtered = "filtered/macrostrat_sections/"
index = "index/macrostrat_sections/"
samples = "samples/macrostrat_sections/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/macrostrat_sections/samples.jsonl"
summary = "Emit one primary numeric sample per selected Macrostrat section summary field."
deterministic_notes = "Fixed API endpoint; source order is preserved."

