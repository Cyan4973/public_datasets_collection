manifest_version = 1
dataset_id = "europe_pmc_search"
name = "Europe PMC Search"
description = "Bounded January 2024 Europe PMC search metadata table with publication dates, citation counts, author counts, publication-type counts, title lengths, full-text id counts, and journal-title lengths."
homepage = "https://europepmc.org/RestfulWebService"

[license]
name = "Europe PMC open metadata"
spdx = "LicenseRef-Europe-PMC-Open-Metadata"
url = "https://europepmc.org/About"
citation = "Europe PMC, EMBL-EBI."
notes = "Europe PMC provides public bibliographic metadata through its REST API. Preserve source attribution and original record identifiers."

[safety]
contains_sensitive_data = false
contains_personal_data = false
provenance_notes = "Public scholarly bibliographic metadata from the official Europe PMC REST API."
usage_notes = "Operational bibliographic metadata suitable for reproducible numeric dataset collection; no article full text is downloaded."

[[origins]]
id = "europe_pmc_api"
name = "Europe PMC REST Search API"
url = "https://www.ebi.ac.uk/europepmc/webservices/rest/search"
type = "public_api"
notes = "Public cursor-paginated search endpoint."

[[resources]]
id = "europe_pmc_january_2024_search_pages"
origin = "europe_pmc_api"
url = "datasets/europe_pmc_search/download.sh"
type = "bounded_api_pagination"
version = "FIRST_PDATE_2024-01-01_to_2024-01-31_pageSize_1000"
access = "Download script walks Europe PMC cursorMark pages for FIRST_PDATE:[2024-01-01 TO 2024-01-31], resultType=lite, format=json."
size_bytes = 147787058
sha256 = ""
local_path = "downloads/europe_pmc_search/"
notes = "The downloader validates page structure, record count, duplicate source/id keys, minimum records, and a 300 MB source cap."

[local_paths]
downloads = "downloads/europe_pmc_search/"
filtered = "filtered/europe_pmc_search/"
index = "index/europe_pmc_search/"
samples = "samples/europe_pmc_search/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/europe_pmc_search/samples.jsonl"
summary = "Download all cursor pages for January 2024 Europe PMC first-publication-date search, deduplicate by source/id, sort by firstPublicationDate/source/id, and emit one homogeneous sequence per numeric metadata field."
deterministic_notes = "Fixed date window, fixed query, fixed page size, cache-aware cursor pagination, no network access during build, sorted output by firstPublicationDate/source/id, durable logs under logs/europe_pmc_search/, and generated sample index at index/europe_pmc_search/samples.jsonl."

[[series]]
id = "europepmc_first_publication_date"
description = "First-publication dates for retained Europe PMC records."
semantic_meaning = "Europe PMC firstPublicationDate converted to Unix epoch seconds at UTC midnight."
role = "auxiliary"
representation_class = "native_numeric"
representation_notes = "Publication date is native Europe PMC metadata; epoch conversion is deterministic and preserves date order."
source_resources = ["europe_pmc_january_2024_search_pages"]
filtered_input_path = "filtered/europe_pmc_search/ingest_stats.json"
filtering = "Malformed records missing source/id or firstPublicationDate are skipped; duplicate source/id records are deduplicated by final observed page entry."
missing_value_policy = "firstPublicationDate is required for retention."
conversion = "Parse YYYY-MM-DD date and write little-endian uint32 sequence sorted by firstPublicationDate/source/id."
numeric_kind = "uint"
bit_width = 32
endianness = "little"
sample_format = "raw uint32 sequence"
sample_geometry = "sequence"
sample_rank = 1
sample_shape = []
sample_axes = ["publication_sorted_by_first_publication_date"]
sample_count = 1
total_size_bytes = 751832
output_path = "samples/europe_pmc_search/europepmc_first_publication_date/"

