manifest_version = 1
dataset_id = "sec_submissions_nvda"
name = "SEC Submissions NVDA"
description = "Pinned SEC recent submissions metadata stream for NVIDIA recent filings."

[local_paths]
downloads = "downloads/sec_submissions_nvda/"
filtered = "filtered/sec_submissions_nvda/"
index = "index/sec_submissions_nvda/"
samples = "samples/sec_submissions_nvda/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/sec_submissions_nvda/samples.jsonl"

[[series]]
id = "sec_nvda_submission_size"
path = "samples/sec_submissions_nvda/sec_nvda_submission_size/nvda.bin"
numeric_kind = "uint"
bit_width = 32
endianness = "little"
sample_format = "raw_homogeneous_array"
missing_value_policy = "filtered_rows_with_invalid_sizes"

[[series]]
id = "sec_nvda_acceptance_timestamp"
path = "samples/sec_submissions_nvda/sec_nvda_acceptance_timestamp/nvda.bin"
numeric_kind = "uint"
bit_width = 64
endianness = "little"
sample_format = "raw_homogeneous_array"
missing_value_policy = "filtered_rows_with_invalid_acceptance_timestamps"

[[series]]
id = "sec_nvda_filing_year"
path = "samples/sec_submissions_nvda/sec_nvda_filing_year/nvda.bin"
numeric_kind = "uint"
bit_width = 16
endianness = "little"
sample_format = "raw_homogeneous_array"
missing_value_policy = "filtered_rows_with_invalid_filing_dates"

[[series]]
id = "sec_nvda_filing_month"
path = "samples/sec_submissions_nvda/sec_nvda_filing_month/nvda.bin"
numeric_kind = "uint"
bit_width = 8
endianness = "little"
sample_format = "raw_homogeneous_array"
missing_value_policy = "filtered_rows_with_invalid_filing_dates"

[[series]]
id = "sec_nvda_filing_day"
path = "samples/sec_submissions_nvda/sec_nvda_filing_day/nvda.bin"
numeric_kind = "uint"
bit_width = 8
endianness = "little"
sample_format = "raw_homogeneous_array"
missing_value_policy = "filtered_rows_with_invalid_filing_dates"
