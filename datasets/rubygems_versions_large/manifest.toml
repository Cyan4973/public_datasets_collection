[[origins]]
id = "official"
name = "RubyGems Versions Large"
url = "https://rubygems.org/"
type = "api"
notes = "Official public endpoint."

[[resources]]
id = "search_result"
origin = "official"
url = "https://rubygems.org/api/v1/versions/rails.json"
type = "api_query_result"
version = "2026-06-10"
access = "Direct public HTTP request."
size_bytes = 0
sha256 = ""
local_path = "downloads/rubygems_versions_large/rubygems_versions.json"
notes = "Pinned query parameters from the scout batch."

[local_paths]
downloads = "downloads/rubygems_versions_large/"
extracted = "extracted/rubygems_versions_large/"
filtered = "filtered/rubygems_versions_large/"
index = "index/rubygems_versions_large/"
samples = "samples/rubygems_versions_large/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/rubygems_versions_large/samples.jsonl"
summary = "Download the pinned public JSON payload, validate its top-level structure, extract numeric fields, and emit raw little-endian numeric samples."
deterministic_notes = "Fixed endpoint, fixed query parameters, fixed field extraction, and source-order row retention."

[[series]]
id = "rubygems_downloads_count"
description = "Per-version download counts."
semantic_meaning = "RubyGems downloads_count field."
representation_class = "native_numeric"
representation_notes = "Direct numeric metadata from the pinned RubyGems versions endpoint."
source_resources = ["versions_feed"]
filtering = "Keep rows carrying downloads_count, built_at, created_at, prerelease, and licenses."
missing_value_policy = "Rows missing required fields are skipped."
conversion = "Parse rows in endpoint order and emit raw little-endian arrays."
numeric_kind = "uint"
bit_width = 64
endianness = "little"
sample_format = "raw homogeneous numeric array"
output_path = "samples/rubygems_versions_large/rubygems_downloads_count/"

[[series]]
id = "rubygems_built_at"
description = "Per-version build timestamp."
semantic_meaning = "built_at parsed to UTC epoch seconds."
