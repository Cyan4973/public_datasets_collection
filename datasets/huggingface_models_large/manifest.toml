manifest_version = 1
dataset_id = "huggingface_models_large"
name = "Hugging Face Models Large"
description = "Pinned Hugging Face models listing with model metrics."

[license]
name = "LicenseRef-HuggingFace"
spdx = "LicenseRef-HuggingFace"
url = "https://huggingface.co/"

[[resources]]
id = "huggingface_models_json"
url = "https://huggingface.co/api/models?limit=500&full=true"
type = "api_response"
local_path = "downloads/huggingface_models_large/huggingface_models_large.json"

[local_paths]
downloads = "downloads/huggingface_models_large/"
filtered = "filtered/huggingface_models_large/"
index = "index/huggingface_models_large/"
samples = "samples/huggingface_models_large/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/huggingface_models_large/samples.jsonl"

[[series]]
id = "hf_model_downloads"
representation_class = "native_numeric"
missing_value_policy = "Rows missing numeric fields are filtered."
numeric_kind = "uint"
bit_width = 64
endianness = "little"

[[series]]
id = "hf_model_likes"
representation_class = "native_numeric"
missing_value_policy = "Rows missing numeric fields are filtered."
numeric_kind = "uint"
bit_width = 32
endianness = "little"

[[series]]
id = "hf_model_trending_score"
representation_class = "native_numeric"
missing_value_policy = "Rows missing numeric fields are filtered."
numeric_kind = "int"
bit_width = 32
endianness = "little"

[[series]]
id = "hf_model_created_at"
representation_class = "derived_operational_numeric"
missing_value_policy = "Rows missing numeric fields are filtered."
numeric_kind = "uint"
bit_width = 32
endianness = "little"

[[series]]
id = "hf_model_siblings_count"
representation_class = "derived_operational_numeric"
missing_value_policy = "Rows missing numeric fields are filtered."
numeric_kind = "uint"
bit_width = 16
endianness = "little"

[[series]]
id = "hf_model_tags_count"
representation_class = "derived_operational_numeric"
missing_value_policy = "Rows missing numeric fields are filtered."
numeric_kind = "uint"
bit_width = 16
endianness = "little"

[[series]]
id = "hf_model_gated"
representation_class = "derived_operational_numeric"
missing_value_policy = "Rows missing numeric fields are filtered."
numeric_kind = "uint"
bit_width = 8
endianness = "little"

[[series]]
id = "hf_model_private"
representation_class = "derived_operational_numeric"
missing_value_policy = "Rows missing numeric fields are filtered."
numeric_kind = "uint"
bit_width = 8
endianness = "little"
