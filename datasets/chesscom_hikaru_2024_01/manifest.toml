bit_width = 16
endianness = "little"

[[series]]
id = "chesscom_black_rating"
representation_class = "native_numeric"
missing_value_policy = "Rows missing numeric fields are filtered."
numeric_kind = "uint"
bit_width = 16
endianness = "little"

[[series]]
id = "chesscom_end_time"
representation_class = "native_numeric"
missing_value_policy = "Rows missing numeric fields are filtered."
