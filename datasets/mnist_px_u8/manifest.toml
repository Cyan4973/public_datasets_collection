manifest_version = 1
dataset_id = "mnist_px_u8"
name = "MNIST Pixels (u8)"
description = "Grayscale 8-bit pixel intensities of the MNIST handwritten-digit images: one family, one sample per (split, digit class)."
homepage = "http://yann.lecun.com/exdb/mnist/"

[license]
name = "CC BY-SA 3.0"
spdx = "CC-BY-SA-3.0"
url = "https://creativecommons.org/licenses/by-sa/3.0/"
citation = "LeCun, Cortes, Burges. The MNIST database of handwritten digits."
notes = "Public benchmark; only numeric pixel intensities are extracted."

[safety]
contains_sensitive_data = false
contains_personal_data = false
provenance_notes = "MNIST IDX files from the Google CVDF mirror; raw 28x28 grayscale pixel bytes."
usage_notes = "Promote only after a fresh successful download, build, and verify."

[[origins]]
id = "cvdf"
name = "Google CVDF MNIST mirror"
url = "https://storage.googleapis.com/cvdf-datasets/mnist"
type = "mirror"
notes = "IDX ubyte gzip files (train/test images + labels). Original host (yann.lecun.com) is often unavailable."

[[resources]]
id = "idx_files"
origin = "cvdf"
url = "https://storage.googleapis.com/cvdf-datasets/mnist/train-images-idx3-ubyte.gz"
type = "idx_ubyte"
version = "mnist"
access = "Four gzip IDX files: train/test images (idx3) and labels (idx1)."
size_bytes = 0
sha256 = ""
local_path = "downloads/mnist_px_u8/"
notes = "Images: magic 0x803, n x 28 x 28 uint8. Labels: magic 0x801, n uint8."

[local_paths]
downloads = "downloads/mnist_px_u8/"
extracted = "extracted/mnist_px_u8/"
filtered = "filtered/mnist_px_u8/"
index = "index/mnist_px_u8/"
samples = "samples/mnist_px_u8/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/mnist_px_u8/samples.jsonl"
summary = "Parse the MNIST IDX images/labels and emit one sample per (split, digit class) of concatenated 8-bit pixel intensities."
deterministic_notes = "Each 28x28 image contributes 784 uint8 pixels in row-major order; images are grouped by (split in {train,test}, label in 0..9) into one sample each (a 28x28 image is < 1000 values, so per-class grouping keeps samples above the floor). One family mnist_pixel_u8; samples with < MNIST_MIN_RECORDS or constant values dropped. Mirrors the downstream mnist_px_28x28 family."

[[series]]
id = "mnist_pixel_u8"
semantic_meaning = "Grayscale pixel intensity (0-255) of MNIST digit images, one sample per (split, digit class)."
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Per-class buffers with < MNIST_MIN_RECORDS or constant values dropped."
conversion = "Native 8-bit grayscale pixel bytes, row-major."
numeric_kind = "uint"
bit_width = 8
endianness = "little"
