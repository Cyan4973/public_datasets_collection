[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/npm_search_packages_large/samples.jsonl"
summary = "Download the pinned public JSON payload, validate its top-level structure, extract numeric fields, and emit raw little-endian numeric samples."
deterministic_notes = "Fixed endpoint, fixed query parameters, fixed field extraction, and source-order row retention."

[[series]]
id = "npm_downloads_monthly"
description = "Monthly package downloads."
semantic_meaning = "npm search result downloads.monthly field."
representation_class = "native_numeric"
representation_notes = "Direct numeric metadata from the pinned npm registry search response."
source_resources = ["search_result"]
filtering = "Keep rows with numeric downloads, dependents, score, and package metadata counts."
missing_value_policy = "Rows missing required numeric fields are skipped."
conversion = "Parse response objects in order and emit raw little-endian arrays."
numeric_kind = "uint"
bit_width = 64
endianness = "little"
sample_format = "raw homogeneous numeric array"
output_path = "samples/npm_search_packages_large/npm_downloads_monthly/"

