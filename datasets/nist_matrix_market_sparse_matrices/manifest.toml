[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/nist_matrix_market_sparse_matrices/samples.jsonl"
summary = "Download bounded NIST Matrix Market sparse coordinate files and emit native stored row, column, and value arrays per matrix."
deterministic_notes = "Fixed exact candidate URLs, bounded resource count and byte caps, no network access during build, no symmetric expansion, duplicate decompressed matrices skipped, and sample boundaries follow stored matrix attribute arrays."

[[series]]
id = "row_index_u32"
description = "Stored Matrix Market row coordinate arrays."
semantic_meaning = "One-based row indices for stored sparse matrix entries, preserving source order."
role = "primary"
representation_class = "native_numeric"
representation_notes = "Matrix Market coordinate rows are native sparse-matrix source fields, not generated dense-grid helper coordinates."
source_resources = ["selected_matrix_market_coordinate_files"]
filtered_input_path = "filtered/nist_matrix_market_sparse_matrices/ingest_stats.json"
filtering = "Reject malformed Matrix Market headers, unsupported storage types, unsupported fields, out-of-bounds coordinates, matrices below the entry floor, and duplicate decompressed matrices."
missing_value_policy = "Sparse missing cells are structural zeros and are not materialized; malformed stored entries reject the source matrix."
conversion = "Parse decimal one-based row coordinates to little-endian uint32 arrays without renumbering."
numeric_kind = "uint"
bit_width = 32
endianness = "little"
sample_format = "raw homogeneous row-coordinate arrays by sparse matrix"
sample_geometry = "sparse_coordinate_matrix_attribute"
sample_rank = 1
sample_axes = ["stored_entry"]
sample_count = 19
total_size_bytes = 3067180
output_path = "samples/nist_matrix_market_sparse_matrices/row_index_u32/"

