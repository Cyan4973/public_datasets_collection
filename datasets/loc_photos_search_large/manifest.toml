manifest_version = 1
dataset_id = "loc_photos_search_large"
name = "LOC Photos Search Large"
description = "Numeric metadata streams from a 500-row Library of Congress photos search result."
homepage = "https://www.loc.gov/photos/"

[license]
name = "Library of Congress Terms"
spdx = "NOASSERTION"
url = "https://www.loc.gov/"
citation = "https://www.loc.gov/photos/"
notes = "Public Library of Congress API output."

[safety]
contains_sensitive_data = false
contains_personal_data = false
provenance_notes = "Public JSON response from a fixed Library of Congress photos query."
usage_notes = "Promote only after fresh successful download."

[[origins]]
id = "official"
name = "Library of Congress"
url = "https://www.loc.gov/photos/"
type = "api"
notes = "Official public endpoint."

[[resources]]
id = "search_result"
origin = "official"
url = "https://www.loc.gov/photos/?fo=json&c=500"
type = "api_query_result"
version = "2026-06-11"
access = "Direct public HTTP request."
size_bytes = 0
sha256 = ""
local_path = "downloads/loc_photos_search_large/loc_photos_search_large.json"
notes = "Pinned query parameters from the scout batch."

[local_paths]
downloads = "downloads/loc_photos_search_large/"
extracted = "extracted/loc_photos_search_large/"
filtered = "filtered/loc_photos_search_large/"
index = "index/loc_photos_search_large/"
samples = "samples/loc_photos_search_large/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/loc_photos_search_large/samples.jsonl"
summary = "Download the pinned LOC photos JSON payload, extract numeric metadata and deterministic list counts, and emit raw little-endian numeric samples."
deterministic_notes = "Fixed query parameters, source-order row retention, fixed field extraction."
