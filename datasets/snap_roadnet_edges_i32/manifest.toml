manifest_version = 1
dataset_id = "snap_roadnet_edges_i32"
name = "SNAP Road Network Edge Endpoints Int32"
description = "Road-network graph edge endpoint columns from SNAP roadNet-CA, roadNet-PA, and roadNet-TX."
homepage = "https://snap.stanford.edu/data/"

[license]
name = "SNAP dataset terms"
spdx = "LicenseRef-SNAP-Dataset-Terms"
url = "https://snap.stanford.edu/data/"
citation = "Jure Leskovec and Andrej Krevl. SNAP Datasets: Stanford Large Network Dataset Collection."
notes = "Preserve SNAP attribution and individual roadNet dataset citations."

[safety]
contains_sensitive_data = false
contains_personal_data = false
provenance_notes = "Public road-network edge-list graph datasets from the Stanford SNAP collection."
usage_notes = "Graph node endpoint IDs only; comment headers and metadata lines are not emitted."

[[origins]]
id = "snap_road_networks"
name = "SNAP road network datasets"
url = "https://snap.stanford.edu/data/"
type = "public_research_dataset"
notes = "Road networks of California, Pennsylvania, and Texas from the SNAP collection."

[[resources]]
id = "roadnet_ca"
origin = "snap_road_networks"
url = "https://snap.stanford.edu/data/roadNet-CA.txt.gz"
type = "gzipped_edge_list"
version = "SNAP roadNet-CA"
access = "Download script fetches the fixed SNAP gzip URL and validates edge count and int32 endpoint range."
size_bytes = 0
sha256 = ""
local_path = "downloads/snap_roadnet_edges_i32/roadNet-CA.txt.gz"
notes = "California road-network edge list."

[[resources]]
id = "roadnet_pa"
origin = "snap_road_networks"
url = "https://snap.stanford.edu/data/roadNet-PA.txt.gz"
