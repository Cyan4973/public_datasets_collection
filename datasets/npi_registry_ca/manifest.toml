manifest_version = 1
dataset_id = "npi_registry_ca"
status = "staged"
kind = "derived_operational_numeric"

[origin]
name = "ClinicalTables NPI"
url = "https://clinicaltables.nlm.nih.gov/api/npi_idv/v3/search?terms=ca&maxList=500"
license = "Public API terms"

[build]
sample_index_path = ".data/index/npi_registry_ca/samples.jsonl"
missing_value_policy = "Rows without a parseable NPI are dropped."

[[series]]
id = "npi_registry_npi_u64"
numeric_kind = "uint"
bit_width = 64
endianness = "little"
sample_format = "raw"

[[series]]
id = "npi_registry_name_length_u16"
numeric_kind = "uint"
bit_width = 16
endianness = "little"
sample_format = "raw"

[[series]]
id = "npi_registry_taxonomy_length_u16"
numeric_kind = "uint"
bit_width = 16
endianness = "little"
sample_format = "raw"

[[series]]
id = "npi_registry_address_length_u16"
numeric_kind = "uint"
bit_width = 16
endianness = "little"
sample_format = "raw"

