manifest_version = 1
dataset_id = "gdc_somatic_mutations"
name = "GDC Simple Somatic Mutations — genomic position (per chromosome)"
description = "Genomic start positions of GDC simple somatic mutations: one family (base-pair position), one sample per chromosome."
homepage = "https://portal.gdc.cancer.gov/"

[license]
name = "NIH GDC Data Access / Open"
spdx = "NONE"
url = "https://gdc.cancer.gov/access-data/data-access-policies"
citation = "NCI Genomic Data Commons (GDC), https://gdc.cancer.gov/."
notes = "Open-access simple somatic mutation coordinates only (no controlled-access or individual-level data)."

[safety]
contains_sensitive_data = false
contains_personal_data = false
provenance_notes = "Official GDC REST API (ssms endpoint), open-access mutation coordinates with field projection."
usage_notes = "Promote only after fresh successful download, build, and verify. Aggregate mutation coordinates; no patient identifiers."

[[origins]]
id = "gdc"
name = "NCI Genomic Data Commons API"
url = "https://api.gdc.cancer.gov/ssms"
type = "api"
notes = "Official public GDC REST API (open simple somatic mutations)."

[[resources]]
id = "ssms_by_chromosome"
origin = "gdc"
url = "https://api.gdc.cancer.gov/ssms?fields=chromosome,start_position&sort=start_position:asc&size=5000"
type = "api_response"
version = "per_chromosome_paged"
access = "Paged JSON, sharded per chromosome (filters) and capped to bound pagination depth."
size_bytes = 0
sha256 = ""
local_path = "downloads/gdc_somatic_mutations/pages/"
notes = "One or more pages per chromosome; only chromosome + start_position are projected."

[local_paths]
downloads = "downloads/gdc_somatic_mutations/"
extracted = "extracted/gdc_somatic_mutations/"
filtered = "filtered/gdc_somatic_mutations/"
index = "index/gdc_somatic_mutations/"
samples = "samples/gdc_somatic_mutations/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/gdc_somatic_mutations/samples.jsonl"
summary = "Crawl GDC simple somatic mutations sharded per chromosome with field projection, then emit one sample per chromosome of base-pair start positions sorted ascending."
deterministic_notes = "The crawl is sharded per chromosome and capped at GDC_MAX_PER_CHR positions (sorted by start_position) to keep pagination depth modest. The build re-derives the chromosome from each record, keeps positions in (0, 2^32), and stores them sorted ascending (canonical genomic order). One family = one quantity (base-pair position); chromosomes differ in length/range but not in quantity -- 'many series of the same quantity'. A chromosome sample is kept only if it has >= GDC_MIN_CHR_RECORDS non-constant positions."

[[series]]
id = "gdc_ssm_position_u32"
semantic_meaning = "Base-pair start position of a simple somatic mutation, one sample per chromosome (sorted ascending)."
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Records with no chromosome or out-of-range position dropped; chromosomes with < GDC_MIN_CHR_RECORDS positions dropped."
conversion = "Native 1-based base-pair coordinate stored as uint32."
numeric_kind = "uint"
bit_width = 32
endianness = "little"
