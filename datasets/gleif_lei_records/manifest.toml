[[series]]
id = "gleif_next_renewal_days_i32"
description = "Next renewal dates."
semantic_meaning = "LEI next-renewal date as days since Unix epoch for records where the optional field is present."
role = "primary"
representation_class = "derived_operational_numeric"
representation_notes = "GLEIF exposes dates as ISO date-time strings; days since Unix epoch is a stable machine-facing date representation. This optional series omits records where the source omits nextRenewalDate."
source_resources = ["bounded_lei_record_pages"]
filtered_input_path = "filtered/gleif_lei_records/ingest_stats.json"
filtering = "Keep populated parseable nextRenewalDate values."
missing_value_policy = "Rows with missing optional nextRenewalDate are omitted from this series; malformed populated dates reject the row."
conversion = "Parse ISO date/date-time strings and write little-endian int32 day numbers."
numeric_kind = "int"
bit_width = 32
endianness = "little"
sample_format = "raw homogeneous int32 date array"
sample_geometry = "lei_record_column"
sample_rank = 1
sample_axes = ["lei_record_with_next_renewal"]
sample_count = 0
total_size_bytes = 0
output_path = "samples/gleif_lei_records/gleif_next_renewal_days_i32/"

[[series]]
id = "gleif_legal_address_line_count_u16"
description = "Legal-address line counts."
semantic_meaning = "Number of source legal-address lines for each retained LEI record."
role = "primary"
representation_class = "native_numeric"
representation_notes = "The count is the native cardinality of the GLEIF legalAddress.addressLines array, emitted separately from other count fields."
source_resources = ["bounded_lei_record_pages"]
filtered_input_path = "filtered/gleif_lei_records/ingest_stats.json"
filtering = "Keep records with legalAddress addressLines arrays and required date fields."
missing_value_policy = "Malformed or missing legalAddress addressLines arrays are skipped."
conversion = "Count source array elements and write little-endian uint16 values."
numeric_kind = "uint"
bit_width = 16
endianness = "little"
sample_format = "raw homogeneous uint16 count array"
sample_geometry = "lei_record_column"
sample_rank = 1
sample_axes = ["lei_record"]
sample_count = 0
total_size_bytes = 0
output_path = "samples/gleif_lei_records/gleif_legal_address_line_count_u16/"

