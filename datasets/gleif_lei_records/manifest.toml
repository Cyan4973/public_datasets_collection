manifest_version = 1
dataset_id = "gleif_lei_records"
name = "GLEIF LEI Records"
description = "Bounded public GLEIF LEI record catalog parsed into homogeneous entity and registration numeric arrays."
homepage = "https://www.gleif.org/en/lei-data/gleif-api"

[license]
name = "GLEIF LEI Data Terms of Use"
spdx = "LicenseRef-GLEIF-LEI-Data-Terms"
url = "https://www.gleif.org/en/lei-data/gleif-data-terms-of-use"
citation = "Global Legal Entity Identifier Foundation (GLEIF) LEI record data."
notes = "Preserve GLEIF attribution and comply with GLEIF LEI data terms."

[safety]
contains_sensitive_data = false
contains_personal_data = false
provenance_notes = "Public legal-entity reference data from GLEIF."
usage_notes = "Public legal-entity identifier metadata; no private personal records expected."

[[origins]]
id = "gleif_api"
name = "GLEIF API LEI records"
url = "https://api.gleif.org/api/v1/lei-records"
type = "public_api"
notes = "Public paginated API for LEI record data."

[[resources]]
id = "bounded_lei_record_pages"
origin = "gleif_api"
url = "https://api.gleif.org/api/v1/lei-records"
type = "paginated_api"
version = "catalog_prefix_at_user_download_time"
access = "Download script fetches exact page-numbered API pages up to bounded page and record caps."
size_bytes = 0
sha256 = ""
local_path = "downloads/gleif_lei_records/"
notes = "Default selection is a bounded prefix of the public LEI record catalog, preserving API page order."

[local_paths]
downloads = "downloads/gleif_lei_records/"
filtered = "filtered/gleif_lei_records/"
index = "index/gleif_lei_records/"
samples = "samples/gleif_lei_records/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/gleif_lei_records/samples.jsonl"
summary = "Download bounded GLEIF LEI record pages, parse date and nested-count fields, and emit separate homogeneous raw numeric arrays."
deterministic_notes = "Download uses fixed page size and ascending page numbers. Build preserves first-seen API order, deduplicates by LEI, emits one homogeneous field per series, skips rows with missing required dates, and enforces acceptance floors without network access."

[[series]]
id = "gleif_entity_creation_days_i32"
description = "Entity creation dates."
semantic_meaning = "LEI entity creation date as days since Unix epoch, preserving deduplicated API order."
role = "primary"
representation_class = "derived_operational_numeric"
representation_notes = "GLEIF exposes dates as ISO date-time strings; days since Unix epoch is a stable machine-facing date representation."
source_resources = ["bounded_lei_record_pages"]
filtered_input_path = "filtered/gleif_lei_records/ingest_stats.json"
filtering = "Keep records with parseable entity creation, initial registration, and last update dates plus finite nested counts."
missing_value_policy = "Rows missing required date fields or malformed count/list fields are skipped; optional next-renewal dates are emitted only for records where present."
conversion = "Parse ISO date/date-time strings and write little-endian int32 day numbers."
numeric_kind = "int"
bit_width = 32
endianness = "little"
sample_format = "raw homogeneous int32 date array"
sample_geometry = "lei_record_column"
sample_rank = 1
sample_axes = ["lei_record"]
sample_count = 0
total_size_bytes = 0
output_path = "samples/gleif_lei_records/gleif_entity_creation_days_i32/"

[[series]]
id = "gleif_initial_registration_days_i32"
description = "Initial registration dates."
semantic_meaning = "Initial LEI registration date as days since Unix epoch, preserving deduplicated API order."
role = "primary"
representation_class = "derived_operational_numeric"
representation_notes = "GLEIF exposes dates as ISO date-time strings; days since Unix epoch is a stable machine-facing date representation."
source_resources = ["bounded_lei_record_pages"]
