filtering = "Keep rows accepted for power_value_f64."
missing_value_policy = "Filter rows rejected by the power_value_f64 series missing-value policy."
conversion = "Parse the date month component as integer and write uint8 arrays aligned to retained value rows."
numeric_kind = "uint"
bit_width = 8
endianness = "little"
sample_format = "raw homogeneous numeric array"
sample_count = 0
total_size_bytes = 0
output_path = "samples/nasa_power_daily_temperature_extremes/obs_month_u8/"

[[series]]
