manifest_version = 1
dataset_id = "metacpan_releases_search_large"
name = "MetaCPAN Releases Search Large"
description = "Bounded paginated MetaCPAN release table with release-level numeric metadata, one column sample per native numeric field."
homepage = "https://metacpan.org/"

[license]
name = "MetaCPAN"
spdx = "LicenseRef-MetaCPAN"
url = "https://metacpan.org/"
citation = "https://metacpan.org/"
notes = "Public MetaCPAN API output. Release records describe public CPAN distributions."

[safety]
contains_sensitive_data = false
contains_personal_data = false
provenance_notes = "Public JSON responses from paginated MetaCPAN release _search pages."
usage_notes = "Promote only after fresh successful download, build, and verify."

[[origins]]
id = "official"
name = "MetaCPAN"
url = "https://fastapi.metacpan.org/v1/release/_search"
type = "api"
notes = "Official public MetaCPAN Elasticsearch endpoint."

[[resources]]
id = "release_pages"
origin = "official"
url = "https://fastapi.metacpan.org/v1/release/_search"
type = "api_response_pages"
version = "from_size_paginated"
access = "Public Elasticsearch search_after pagination (match_all sorted by date asc) over the full index, with _source field filtering."
size_bytes = 0
sha256 = ""
local_path = "downloads/metacpan_releases_search_large/pages/"
notes = "Full MetaCPAN release index walked via search_after; METACPAN_MAX_RECORDS (default 500000) caps the pull."

[local_paths]
downloads = "downloads/metacpan_releases_search_large/"
extracted = "extracted/metacpan_releases_search_large/"
filtered = "filtered/metacpan_releases_search_large/"
index = "index/metacpan_releases_search_large/"
samples = "samples/metacpan_releases_search_large/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/metacpan_releases_search_large/samples.jsonl"
summary = "Paginate the MetaCPAN release index to a bounded record count, extract release-level numeric fields as table columns, and emit one raw little-endian numeric sample per field."
deterministic_notes = "Fixed endpoint, fixed page size, match_all sorted by date asc, search_after pagination over the full index with _source field filtering, bounded max record count, atomic per-row field extraction with _id de-duplication, and a generated sample index."

[[series]]
id = "metacpan_version_numified"
semantic_meaning = "Native MetaCPAN version_numified value for the release."
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Rows missing version_numified are filtered."
conversion = "Native JSON number stored as float64."
numeric_kind = "float"
bit_width = 64
endianness = "little"

[[series]]
id = "metacpan_stat_size"
semantic_meaning = "Release archive size in bytes (stat.size)."
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Missing stat.size defaults to 0."
conversion = "Native JSON integer stored as uint32."
numeric_kind = "uint"
bit_width = 32
endianness = "little"

[[series]]
id = "metacpan_stat_mtime"
semantic_meaning = "Release archive modification time (stat.mtime, Unix epoch seconds)."
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Missing stat.mtime defaults to 0."
conversion = "Native JSON integer stored as uint32."
numeric_kind = "uint"
bit_width = 32
endianness = "little"

[[series]]
id = "metacpan_dependency_count"
semantic_meaning = "Number of declared dependency records for the release."
role = "primary"
representation_class = "derived_operational_numeric"
missing_value_policy = "Missing arrays are treated as empty arrays; counts are clamped to 65535."
conversion = "Stable JSON array cardinality stored as uint16."
numeric_kind = "uint"
bit_width = 16
endianness = "little"

[[series]]
id = "metacpan_provides_count"
semantic_meaning = "Number of provided modules for the release."
role = "primary"
representation_class = "derived_operational_numeric"
missing_value_policy = "Missing arrays are treated as empty arrays; counts are clamped to 65535."
conversion = "Stable JSON array cardinality stored as uint16."
numeric_kind = "uint"
bit_width = 16
endianness = "little"

[[series]]
id = "metacpan_tests_pass"
semantic_meaning = "CPAN Testers pass count for the release."
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Missing test counts default to 0."
conversion = "Native JSON integer stored as uint32."
numeric_kind = "uint"
bit_width = 32
endianness = "little"

[[series]]
id = "metacpan_tests_fail"
semantic_meaning = "CPAN Testers fail count for the release."
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Missing test counts default to 0."
conversion = "Native JSON integer stored as uint32."
numeric_kind = "uint"
bit_width = 32
endianness = "little"

[[series]]
id = "metacpan_tests_na"
semantic_meaning = "CPAN Testers N/A count for the release."
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Missing test counts default to 0."
conversion = "Native JSON integer stored as uint32."
numeric_kind = "uint"
bit_width = 32
endianness = "little"

[[series]]
id = "metacpan_tests_unknown"
semantic_meaning = "CPAN Testers unknown count for the release."
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Missing test counts default to 0."
conversion = "Native JSON integer stored as uint32."
numeric_kind = "uint"
bit_width = 32
endianness = "little"
