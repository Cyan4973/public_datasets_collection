manifest_version = 1
dataset_id = "openfda_device_event"
name = "openFDA Device Event"
description = "openFDA bulk device adverse event records reduced to homogeneous numeric date and event-count columns."

[license]
name = "openFDA Terms of Service"
spdx = "LicenseRef-openFDA"
url = "https://open.fda.gov/terms/"

[[resources]]
id = "openfda_device_event_api"
url = "https://api.fda.gov/download.json"
type = "bulk_download_index"
local_path = "downloads/openfda_device_event/events.json"
notes = "The downloader resolves device/event .json.zip partitions from the openFDA bulk download index."

[local_paths]
downloads = "downloads/openfda_device_event/"
filtered = "filtered/openfda_device_event/"
index = "index/openfda_device_event/"
samples = "samples/openfda_device_event/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/openfda_device_event/samples.jsonl"

[[series]]
id = "openfda_device_event_date_received_ymd_u32"
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Rows missing parseable received dates are filtered."
numeric_kind = "uint"
bit_width = 32
endianness = "little"
sample_geometry = "openfda_device_event_column"

[[series]]
id = "openfda_device_event_mdr_text_count_u16"
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Missing MDR text arrays are counted as zero."
numeric_kind = "uint"
bit_width = 16
endianness = "little"
sample_geometry = "openfda_device_event_column"

[[series]]
id = "openfda_device_event_date_changed_ymd_u32"
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Rows missing parseable changed dates are filtered."
numeric_kind = "uint"
bit_width = 32
endianness = "little"
sample_geometry = "openfda_device_event_column"

[[series]]
id = "openfda_device_event_patient_problem_count_u16"
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Missing patient problem arrays are counted as zero."
numeric_kind = "uint"
bit_width = 16
endianness = "little"
sample_geometry = "openfda_device_event_column"

[[series]]
id = "openfda_device_event_product_problem_count_u16"
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Missing product problem arrays are counted as zero."
numeric_kind = "uint"
bit_width = 16
endianness = "little"
sample_geometry = "openfda_device_event_column"
