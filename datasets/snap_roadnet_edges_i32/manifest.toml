version = "SNAP roadNet-PA"
access = "Download script fetches the fixed SNAP gzip URL and validates edge count and int32 endpoint range."
size_bytes = 0
sha256 = ""
local_path = "downloads/snap_roadnet_edges_i32/roadNet-PA.txt.gz"
notes = "Pennsylvania road-network edge list."

[[resources]]
id = "roadnet_tx"
origin = "snap_road_networks"
url = "https://snap.stanford.edu/data/roadNet-TX.txt.gz"
type = "gzipped_edge_list"
version = "SNAP roadNet-TX"
access = "Download script fetches the fixed SNAP gzip URL and validates edge count and int32 endpoint range."
