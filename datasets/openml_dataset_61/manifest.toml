manifest_version = 1
dataset_id = "openml_dataset_61"
name = "OpenML Dataset 61 Iris Features"
description = "Pinned OpenML Iris ARFF with the four native numeric feature columns."

[license]
name = "LicenseRef-OpenML"
spdx = "LicenseRef-OpenML"
url = "https://www.openml.org/"

[[resources]]
id = "dataset_61_arff"
url = "https://www.openml.org/data/download/61/dataset_61_iris.arff"
type = "file"
local_path = "downloads/openml_dataset_61/dataset_61.arff"

[local_paths]
downloads = "downloads/openml_dataset_61/"
filtered = "filtered/openml_dataset_61/"
index = "index/openml_dataset_61/"
samples = "samples/openml_dataset_61/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/openml_dataset_61/samples.jsonl"

[[series]]
id = "iris_sepallength"
representation_class = "native_numeric"
missing_value_policy = "Malformed rows are fatal."
numeric_kind = "float"
bit_width = 32
endianness = "little"

[[series]]
id = "iris_sepalwidth"
representation_class = "native_numeric"
missing_value_policy = "Malformed rows are fatal."
numeric_kind = "float"
bit_width = 32
endianness = "little"

[[series]]
id = "iris_petallength"
representation_class = "native_numeric"
missing_value_policy = "Malformed rows are fatal."
numeric_kind = "float"
bit_width = 32
endianness = "little"

[[series]]
id = "iris_petalwidth"
representation_class = "native_numeric"
missing_value_policy = "Malformed rows are fatal."
numeric_kind = "float"
bit_width = 32
endianness = "little"

