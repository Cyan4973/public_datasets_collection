manifest_version = 1
dataset_id = "nasa_donki_cme"
name = "NASA DONKI Coronal Mass Ejections"
description = "NASA DONKI coronal mass ejection events over a multi-year window, one column sample per native CME-analysis numeric field."
homepage = "https://ccmc.gsfc.nasa.gov/tools/DONKI/"

[license]
name = "NASA"
spdx = "LicenseRef-NASA-Open"
url = "https://ccmc.gsfc.nasa.gov/tools/DONKI/"
citation = "NASA CCMC Database Of Notifications, Knowledge, Information (DONKI)."
notes = "Public NASA DONKI web service output."

[safety]
contains_sensitive_data = false
contains_personal_data = false
provenance_notes = "Public JSON responses from the DONKI CME web service, fetched one calendar year per page."
usage_notes = "Promote only after fresh successful download, build, and verify."

[[origins]]
id = "official"
name = "NASA DONKI"
url = "https://kauai.ccmc.gsfc.nasa.gov/DONKI/WS/get/CME"
type = "api"
notes = "Official public DONKI CME web service."

[[resources]]
id = "cme_year_pages"
origin = "official"
url = "https://kauai.ccmc.gsfc.nasa.gov/DONKI/WS/get/CME?startDate=YYYY-01-01&endDate=YYYY-12-31"
type = "api_response_pages"
version = "per_year"
access = "One public HTTP request per calendar year in the configured window."
size_bytes = 0
sha256 = ""
local_path = "downloads/nasa_donki_cme/pages/"
notes = "DONKI CME events for each year in DONKI_START_YEAR..DONKI_END_YEAR (default 2010-2026, full archive)."

[local_paths]
downloads = "downloads/nasa_donki_cme/"
extracted = "extracted/nasa_donki_cme/"
filtered = "filtered/nasa_donki_cme/"
index = "index/nasa_donki_cme/"
samples = "samples/nasa_donki_cme/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/nasa_donki_cme/samples.jsonl"
summary = "Download DONKI CME events year by year, select the most-accurate analysis per event, and emit one raw little-endian numeric sample per native analysis field across all events."
deterministic_notes = "Fixed endpoint, per-year date windows, most-accurate (else first) cmeAnalyses selection, atomic per-row extraction with activityID de-duplication (rows missing required analysis fields are dropped), and a generated sample index."

[[series]]
id = "donki_cme_latitude_f32"
semantic_meaning = "CME source latitude (degrees) from the selected analysis."
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Rows whose selected analysis lacks latitude are dropped."
conversion = "Native JSON number stored as float32."
numeric_kind = "float"
bit_width = 32
endianness = "little"

[[series]]
id = "donki_cme_longitude_f32"
semantic_meaning = "CME source longitude (degrees) from the selected analysis."
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Rows whose selected analysis lacks longitude are dropped."
conversion = "Native JSON number stored as float32."
numeric_kind = "float"
bit_width = 32
endianness = "little"

[[series]]
id = "donki_cme_half_angle_f32"
semantic_meaning = "CME half-angle (degrees) from the selected analysis."
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Rows whose selected analysis lacks halfAngle are dropped."
conversion = "Native JSON number stored as float32."
numeric_kind = "float"
bit_width = 32
endianness = "little"

[[series]]
id = "donki_cme_speed_f32"
semantic_meaning = "CME speed (km/s) from the selected analysis."
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Rows whose selected analysis lacks speed are dropped."
conversion = "Native JSON number stored as float32."
numeric_kind = "float"
bit_width = 32
endianness = "little"

[[series]]
id = "donki_cme_start_epoch_u32"
semantic_meaning = "CME startTime as Unix epoch seconds."
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Rows missing a parseable startTime are dropped."
conversion = "Native ISO time parsed to Unix epoch seconds, stored as uint32."
numeric_kind = "uint"
bit_width = 32
endianness = "little"
