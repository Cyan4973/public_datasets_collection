manifest_version = 1
dataset_id = "openalex_works_2024_sample"
name = "OpenAlex Works 2024 Sample"
description = "Pinned OpenAlex sample with native works count fields."

[license]
name = "LicenseRef-OpenAlex"
spdx = "LicenseRef-OpenAlex"
url = "https://docs.openalex.org/"

[[resources]]
id = "openalex_works_json"
url = "https://api.openalex.org/works?filter=from_publication_date:2024-01-01,to_publication_date:2024-12-31&per-page=200"
type = "api_response"
local_path = "downloads/openalex_works_2024_sample/openalex_works_2024_sample.json"

[local_paths]
downloads = "downloads/openalex_works_2024_sample/"
filtered = "filtered/openalex_works_2024_sample/"
index = "index/openalex_works_2024_sample/"
samples = "samples/openalex_works_2024_sample/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/openalex_works_2024_sample/samples.jsonl"

[[series]]
id = "openalex_cited_by_count"
representation_class = "native_numeric"
missing_value_policy = "Rows missing numeric fields are filtered."
numeric_kind = "uint"
bit_width = 32
endianness = "little"

[[series]]
id = "openalex_referenced_works_count"
representation_class = "native_numeric"
missing_value_policy = "Rows missing numeric fields are filtered."
numeric_kind = "uint"
bit_width = 32
endianness = "little"

