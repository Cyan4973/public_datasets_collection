manifest_version = 1
dataset_id = "opensky_states"
name = "OpenSky State Vectors"
description = "Pinned OpenSky states snapshot with aircraft position and motion values."

[local_paths]
downloads = "downloads/opensky_states/"
filtered = "filtered/opensky_states/"
index = "index/opensky_states/"
samples = "samples/opensky_states/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/opensky_states/samples.jsonl"

[[series]]
id = "opensky_longitude"
description = "Aircraft longitude (degrees)."
semantic_meaning = "Aircraft longitude (degrees)."
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Records missing or with an unparseable value for this field are skipped by the build; constant or empty samples are rejected."
conversion = "Extract this field from each source record in order and store as raw little-endian float32."
numeric_kind = "float"
bit_width = 32
endianness = "little"
sample_format = "raw homogeneous numeric array"
sample_count = 0
total_size_bytes = 0
output_path = "samples/opensky_states/opensky_longitude/"

