manifest_version = 1
dataset_id = "wikimedia_pageviews_daily"
name = "Wikimedia Daily Pageviews (per article)"
description = "Long daily Wikimedia pageview series: one family (views/day), one sample per popular article across several large Wikipedia projects."
homepage = "https://wikimedia.org/api/rest_v1/"

[license]
name = "Creative Commons Attribution-ShareAlike 4.0 International"
spdx = "CC-BY-SA-4.0"
url = "https://foundation.wikimedia.org/wiki/Policy:Terms_of_Use"
citation = "Wikimedia REST API pageviews endpoint."
notes = "Wikimedia content and derived traffic metadata are public under Wikimedia terms and attribution requirements."

[safety]
contains_sensitive_data = false
contains_personal_data = false
provenance_notes = "Official Wikimedia REST API only (top + per-article pageview endpoints)."
usage_notes = "Public operational traffic-count source intended for reproducible numeric dataset collection."

[[origins]]
id = "wikimedia"
name = "Wikimedia REST API"
url = "https://wikimedia.org/api/rest_v1/"
type = "api"
notes = "Official public Wikimedia metrics API."

[[resources]]
id = "top_articles_api"
origin = "wikimedia"
url = "https://wikimedia.org/api/rest_v1/metrics/pageviews/top/"
type = "api_endpoint"
version = "top_by_project_month"
access = "Direct public API."
size_bytes = 0
sha256 = ""
local_path = "downloads/wikimedia_pageviews_daily/top/"
notes = "Top-article lists per project and reference month; used only to discover article names."

[[resources]]
id = "per_article_daily_api"
origin = "wikimedia"
url = "https://wikimedia.org/api/rest_v1/metrics/pageviews/per-article/"
type = "api_endpoint"
version = "daily_all_access_all_agents"
access = "Direct public API."
size_bytes = 0
sha256 = ""
local_path = "downloads/wikimedia_pageviews_daily/series/"
notes = "One daily pageview series per discovered article over the full available window."

[local_paths]
downloads = "downloads/wikimedia_pageviews_daily/"
extracted = "extracted/wikimedia_pageviews_daily/"
filtered = "filtered/wikimedia_pageviews_daily/"
index = "index/wikimedia_pageviews_daily/"
samples = "samples/wikimedia_pageviews_daily/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/wikimedia_pageviews_daily/samples.jsonl"
summary = "Discover popular articles from the top endpoint across several projects/months, fetch each article's full daily pageview series, and emit one uint32 sample per article in a single family."
deterministic_notes = "Article discovery is a deterministic top-N filter (mainspace only, junk dropped, de-duplicated by project+article). Each sample is the API's chronological daily `views` for one article, validated for strictly increasing daily timestamps. Short series (< WIKI_MIN_DAYS) and constant series are dropped. One family = one physical quantity (pageviews per day); articles differ in magnitude but never in quantity -- 'many station-series of the same quantity'."

[[series]]
id = "wikimedia_pageviews_daily_u32"
description = "Daily pageview count series, one sample per popular Wikipedia article."
semantic_meaning = "Native daily pageview counts returned by the public Wikimedia metrics API."
role = "primary"
representation_class = "native_numeric"
representation_notes = "Public operational traffic counts, not derived local encodings."
source_resources = ["top_articles_api", "per_article_daily_api"]
filtered_input_path = "filtered/wikimedia_pageviews_daily/ingest_stats.json"
filtering = "Mainspace articles only (drop namespaced titles, Main_Page, and '-'); top-N per project/month; de-duplicated by (project, article); per-article series with >= WIKI_MIN_DAYS non-constant daily values."
missing_value_policy = "Days absent from the API are simply absent (natural variable-length series); malformed timestamps or view counts drop the whole series. No imputation or padding."
conversion = "Read local JSON payloads, validate strictly increasing daily timestamps, extract `views`, and emit little-endian uint32 arrays."
numeric_kind = "uint"
bit_width = 32
endianness = "little"
sample_format = "raw homogeneous numeric array"
sample_count = 0
total_size_bytes = 0
output_path = "samples/wikimedia_pageviews_daily/wikimedia_pageviews_daily_u32/"
