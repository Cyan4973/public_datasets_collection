description = "Event origin time (ms epoch)."
semantic_meaning = "Event origin time (ms epoch)."
role = "auxiliary"
representation_class = "native_numeric"
missing_value_policy = "Records missing or with an unparseable value for this field are skipped by the build; constant or empty samples are rejected."
conversion = "Extract this field from each source record in order and store as raw little-endian int64."
numeric_kind = "int"
bit_width = 64
endianness = "little"
sample_format = "raw homogeneous numeric array"
sample_count = 0
total_size_bytes = 0
output_path = "samples/usgs_fdsn_events_large/usgs_event_time_ms_i64/"

