manifest_version = 1
dataset_id = "openalex_institutions_large"
name = "OpenAlex Institutions Large"
description = "Bounded cursor-paginated OpenAlex institutions table with institution-level numeric metadata, one column sample per native numeric field."
homepage = "https://openalex.org/"

[license]
name = "CC0-1.0"
spdx = "CC0-1.0"
url = "https://docs.openalex.org/"
citation = "https://openalex.org/"
notes = "Public OpenAlex API output (CC0)."

[safety]
contains_sensitive_data = false
contains_personal_data = false
provenance_notes = "Public JSON responses from cursor-paginated OpenAlex institutions pages."
usage_notes = "Promote only after fresh successful download, build, and verify."

[[origins]]
id = "official"
name = "OpenAlex"
url = "https://api.openalex.org/institutions"
type = "api"
notes = "Official public endpoint."

[[resources]]
id = "institutions_pages"
origin = "official"
url = "https://api.openalex.org/institutions?per-page=200&cursor=*"
type = "api_response_pages"
version = "cursor_paginated"
access = "Direct public HTTP cursor pagination over the default institution ordering."
size_bytes = 0
sha256 = ""
local_path = "downloads/openalex_institutions_large/pages/"
notes = "First TARGET_RECORDS (default 20000) institutions in OpenAlex default cursor order."

[local_paths]
downloads = "downloads/openalex_institutions_large/"
extracted = "extracted/openalex_institutions_large/"
filtered = "filtered/openalex_institutions_large/"
index = "index/openalex_institutions_large/"
samples = "samples/openalex_institutions_large/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/openalex_institutions_large/samples.jsonl"
summary = "Cursor-paginate the OpenAlex institutions index to a bounded record count, extract institution-level numeric fields as table columns, and emit one raw little-endian numeric sample per field."
deterministic_notes = "Fixed endpoint, fixed page size, cursor pagination over default order, bounded target record count, atomic per-row field extraction (rows missing required scalar fields are dropped), and a generated sample index."

[[series]]
id = "openalex_inst_works_count"
semantic_meaning = "Native OpenAlex works_count for the institution."
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Rows missing works_count are filtered."
conversion = "Native JSON integer stored as uint32."
numeric_kind = "uint"
bit_width = 32
endianness = "little"

[[series]]
id = "openalex_inst_cited_by_count"
semantic_meaning = "Native OpenAlex cited_by_count for the institution."
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Rows missing cited_by_count are filtered."
conversion = "Native JSON integer stored as uint32."
numeric_kind = "uint"
bit_width = 32
endianness = "little"

[[series]]
id = "openalex_inst_h_index"
semantic_meaning = "Native summary_stats.h_index for the institution."
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Missing metric defaults to 0."
conversion = "Native JSON integer stored as uint32."
numeric_kind = "uint"
bit_width = 32
endianness = "little"

[[series]]
id = "openalex_inst_i10_index"
semantic_meaning = "Native summary_stats.i10_index for the institution."
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Missing metric defaults to 0."
conversion = "Native JSON integer stored as uint32."
numeric_kind = "uint"
bit_width = 32
endianness = "little"

[[series]]
id = "openalex_inst_repo_count"
semantic_meaning = "Number of repository records attached to the institution."
role = "primary"
representation_class = "derived_operational_numeric"
missing_value_policy = "Missing arrays are treated as empty arrays; counts are clamped to 65535."
conversion = "Stable JSON array cardinality stored as uint16."
numeric_kind = "uint"
bit_width = 16
endianness = "little"

[[series]]
id = "openalex_inst_role_count"
semantic_meaning = "Number of role records attached to the institution."
role = "primary"
representation_class = "derived_operational_numeric"
missing_value_policy = "Missing arrays are treated as empty arrays; counts are clamped to 255."
conversion = "Stable JSON array cardinality stored as uint8."
numeric_kind = "uint"
bit_width = 8
endianness = "little"

[[series]]
id = "openalex_inst_assoc_count"
semantic_meaning = "Number of associated-institution records attached to the institution."
role = "primary"
representation_class = "derived_operational_numeric"
missing_value_policy = "Missing arrays are treated as empty arrays; counts are clamped to 65535."
conversion = "Stable JSON array cardinality stored as uint16."
numeric_kind = "uint"
bit_width = 16
endianness = "little"
