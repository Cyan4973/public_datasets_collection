missing_value_policy = "Preserve all official class bytes, including 0 NoData. Malformed TIFF metadata, unsupported compression, truncated byte ranges, non-uint8 rasters, unexpected class codes, and missing selected chunks are fatal."
conversion = "Parse local TIFF headers and selected compressed tile chunks, decompress Deflate/uncompressed tile data, undo horizontal predictor if present, and write one raw uint8 grid per selected internal tile."
