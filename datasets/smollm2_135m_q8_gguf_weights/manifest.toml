representation_class = "native_numeric"
missing_value_policy = "Non-Q8_0 tensors and tensors with < GGUF_MIN_RECORDS values dropped."
conversion = "Q8_0 block qs (signed int8) stored as int8; per-block fp16 scale dropped."
numeric_kind = "int"
bit_width = 8
endianness = "little"

