manifest_version = 1
dataset_id = "statsbomb_world_cup_final"
name = "StatsBomb World Cup Final"
description = "Pinned StatsBomb World Cup final event stream."

[license]
name = "StatsBomb Open Data"
spdx = "LicenseRef-StatsBomb"
url = "https://github.com/statsbomb/open-data"

[[resources]]
id = "statsbomb_events_json"
url = "https://raw.githubusercontent.com/statsbomb/open-data/master/data/events/8658.json"
type = "api_response"
local_path = "downloads/statsbomb_world_cup_final/statsbomb_world_cup_final.json"

[local_paths]
downloads = "downloads/statsbomb_world_cup_final/"
filtered = "filtered/statsbomb_world_cup_final/"
index = "index/statsbomb_world_cup_final/"
samples = "samples/statsbomb_world_cup_final/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/statsbomb_world_cup_final/samples.jsonl"

[[series]]
id = "statsbomb_event_index"
representation_class = "native_numeric"
missing_value_policy = "Rows missing required numeric fields are filtered."
numeric_kind = "uint"
bit_width = 16
endianness = "little"

