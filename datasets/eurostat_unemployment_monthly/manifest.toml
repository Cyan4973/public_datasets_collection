manifest_version = 1
dataset_id = "eurostat_unemployment_monthly"
name = "Eurostat Unemployment Monthly"
description = "Eurostat monthly unemployment-rate observations for active-population percentage units across all returned adjustment statuses, age groups, sex categories, geographies, and months."
homepage = "https://ec.europa.eu/eurostat/"

[license]
name = "European Commission Reuse Notice"
spdx = "LicenseRef-EC-Reuse"
url = "https://commission.europa.eu/legal-notice_en"
citation = "Eurostat dissemination API."

[[resources]]
id = "eurostat_unemployment_monthly"
url = "https://ec.europa.eu/eurostat/api/dissemination/statistics/1.0/data/une_rt_m?unit=PC_ACT"
type = "api_query_result"
local_path = "downloads/eurostat_unemployment_monthly/data.json"

[local_paths]
downloads = "downloads/eurostat_unemployment_monthly/"
filtered = "filtered/eurostat_unemployment_monthly/"
index = "index/eurostat_unemployment_monthly/"
samples = "samples/eurostat_unemployment_monthly/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/eurostat_unemployment_monthly/samples.jsonl"

[[series]]
id = "unemployment_rate_f32"
role = "primary"
description = "Monthly unemployment-rate values."
semantic_meaning = "Float32 monthly unemployment rates, aligned by adjustment status, age, sex, geography, and month."
representation_class = "native_numeric"
missing_value_policy = "Sparse missing cells, malformed time keys, malformed numeric values, and non-finite values are filtered."
numeric_kind = "float"
bit_width = 32
endianness = "little"

[[series]]
id = "eurostat_unemployment_s_adj_index"
role = "auxiliary"
description = "Eurostat seasonal-adjustment-status ordinal for each retained unemployment-rate observation."
representation_class = "derived_operational_numeric"
missing_value_policy = "Emitted only for retained primary observations."
numeric_kind = "uint"
bit_width = 16
endianness = "little"

[[series]]
id = "eurostat_unemployment_age_index"
role = "auxiliary"
description = "Eurostat age-category ordinal for each retained unemployment-rate observation."
representation_class = "derived_operational_numeric"
missing_value_policy = "Emitted only for retained primary observations."
numeric_kind = "uint"
bit_width = 16
endianness = "little"

[[series]]
id = "eurostat_unemployment_sex_index"
role = "auxiliary"
description = "Eurostat sex-category ordinal for each retained unemployment-rate observation."
representation_class = "derived_operational_numeric"
missing_value_policy = "Emitted only for retained primary observations."
numeric_kind = "uint"
bit_width = 16
endianness = "little"

[[series]]
id = "eurostat_unemployment_geo_index"
role = "auxiliary"
description = "Eurostat geography-category ordinal for each retained unemployment-rate observation."
representation_class = "derived_operational_numeric"
missing_value_policy = "Emitted only for retained primary observations."
numeric_kind = "uint"
bit_width = 16
endianness = "little"

[[series]]
id = "eurostat_unemployment_month_ordinal"
role = "auxiliary"
description = "Month ordinal encoded as year * 12 + month for each retained unemployment-rate observation."
representation_class = "derived_operational_numeric"
missing_value_policy = "Emitted only for retained primary observations."
numeric_kind = "uint"
bit_width = 32
endianness = "little"
