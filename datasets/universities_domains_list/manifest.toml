manifest_version = 1
dataset_id = "universities_domains_list"
name = "Universities Domains List"
description = "Pinned universities domains list with string-length and list-count metrics."

[license]
name = "University Domains List"
spdx = "LicenseRef-UniversityDomains"
url = "https://github.com/Hipo/university-domains-list"

[[resources]]
id = "universities_json"
url = "https://raw.githubusercontent.com/Hipo/university-domains-list/master/world_universities_and_domains.json"
type = "api_response"
local_path = "downloads/universities_domains_list/universities_domains_list.json"

[local_paths]
downloads = "downloads/universities_domains_list/"
filtered = "filtered/universities_domains_list/"
index = "index/universities_domains_list/"
samples = "samples/universities_domains_list/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/universities_domains_list/samples.jsonl"

[[series]]
id = "universities_name_length"
representation_class = "derived_operational_numeric"
missing_value_policy = "Rows missing text fields are filtered."
numeric_kind = "uint"
bit_width = 16
endianness = "little"

[[series]]
id = "universities_domains_count"
representation_class = "derived_operational_numeric"
missing_value_policy = "Rows missing list fields are filtered."
numeric_kind = "uint"
bit_width = 8
endianness = "little"

[[series]]
id = "universities_web_pages_count"
representation_class = "derived_operational_numeric"
missing_value_policy = "Rows missing list fields are filtered."
numeric_kind = "uint"
bit_width = 8
endianness = "little"

[[series]]
id = "universities_country_length"
representation_class = "derived_operational_numeric"
missing_value_policy = "Rows missing text fields are filtered."
numeric_kind = "uint"
bit_width = 8
endianness = "little"

[[series]]
id = "universities_state_province_length"
representation_class = "derived_operational_numeric"
missing_value_policy = "Rows missing text fields are filtered."
numeric_kind = "uint"
bit_width = 16
endianness = "little"
