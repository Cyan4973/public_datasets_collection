manifest_version = 1
dataset_id = "opendota_pro_matches"
status = "staged"
kind = "native_numeric"

[origin]
name = "OpenDota"
url = "https://api.opendota.com/api/proMatches"
license = "Public API terms"

[build]
sample_index_path = ".data/index/opendota_pro_matches/samples.jsonl"
missing_value_policy = "Rows missing required numeric fields are dropped. Optional team and league ids use 0 when absent."

[[series]]
id = "match_id_u64"
numeric_kind = "uint"
bit_width = 64
endianness = "little"
sample_format = "raw"

[[series]]
id = "duration_u32"
numeric_kind = "uint"
bit_width = 32
endianness = "little"
sample_format = "raw"

[[series]]
id = "start_time_u32"
numeric_kind = "uint"
bit_width = 32
endianness = "little"
sample_format = "raw"

[[series]]
id = "radiant_team_id_u32"
numeric_kind = "uint"
bit_width = 32
endianness = "little"
sample_format = "raw"

[[series]]
id = "dire_team_id_u32"
numeric_kind = "uint"
bit_width = 32
endianness = "little"
sample_format = "raw"

[[series]]
id = "league_id_u32"
numeric_kind = "uint"
bit_width = 32
endianness = "little"
sample_format = "raw"

[[series]]
id = "series_id_u32"
numeric_kind = "uint"
bit_width = 32
endianness = "little"
sample_format = "raw"

[[series]]
id = "series_type_u8"
numeric_kind = "uint"
bit_width = 8
endianness = "little"
sample_format = "raw"

[[series]]
id = "radiant_score_u16"
numeric_kind = "uint"
bit_width = 16
endianness = "little"
sample_format = "raw"

[[series]]
id = "dire_score_u16"
numeric_kind = "uint"
bit_width = 16
endianness = "little"
sample_format = "raw"

[[series]]
id = "radiant_win_u8"
numeric_kind = "uint"
bit_width = 8
endianness = "little"
sample_format = "raw"

[[series]]
id = "version_u16"
numeric_kind = "uint"
bit_width = 16
endianness = "little"
sample_format = "raw"
