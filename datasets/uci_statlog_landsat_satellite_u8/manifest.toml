[[origins]]
id = "official"
name = "UCI Machine Learning Repository"
url = "https://archive.ics.uci.edu/dataset/146/statlog+landsat+satellite"
type = "data_portal"
notes = "Official upstream dataset page."

[[resources]]
id = "main_archive"
origin = "official"
url = "https://archive.ics.uci.edu/static/public/146/statlog+landsat+satellite.zip"
type = "archive"
version = "accessed_by_user"
access = "Direct public download."
size_bytes = 0
sha256 = ""
local_path = "downloads/uci_statlog_landsat_satellite_u8/statlog-landsat-satellite.zip"
notes = "Archive containing sat.trn and sat.tst."

[local_paths]
downloads = "downloads/uci_statlog_landsat_satellite_u8/"
extracted = "extracted/uci_statlog_landsat_satellite_u8/"
filtered = "filtered/uci_statlog_landsat_satellite_u8/"
index = "index/uci_statlog_landsat_satellite_u8/"
samples = "samples/uci_statlog_landsat_satellite_u8/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/uci_statlog_landsat_satellite_u8/samples.jsonl"
summary = "Validate the local UCI archive, parse train/test multispectral feature tables, emit 36 native uint8 feature columns per row, and write land-cover labels as auxiliary uint8."
deterministic_notes = "Build is local-only, preserves upstream train/test row order, range-checks feature values to 0..255, validates class labels, rejects malformed rows, and writes a samples.jsonl index."

[[series]]
id = "landsat_spectral_features"
description = "Landsat multispectral neighborhood feature values."
semantic_meaning = "Thirty-six multispectral pixel-neighborhood integer attributes per example, in upstream feature-column order."
role = "primary"
representation_class = "native_numeric"
representation_notes = "The source table stores bounded integer spectral values; values are copied as unsigned 8-bit integers without remapping."
source_resources = ["main_archive"]
filtered_input_path = "filtered/uci_statlog_landsat_satellite_u8/ingest_stats.json"
filtering = "Keep all rows and 36 feature columns from sat.trn and sat.tst."
missing_value_policy = "No missing marker is documented; blank, malformed, non-integer, or out-of-range values are fatal."
conversion = "Parse decimal feature values, range-check to 0..255, and write train/test row-major raw uint8 samples."
numeric_kind = "uint"
bit_width = 8
endianness = "little"
sample_format = "raw homogeneous numeric array"
sample_count = 0
total_size_bytes = 0
output_path = "samples/uci_statlog_landsat_satellite_u8/landsat_spectral_features/"

[[series]]
id = "landsat_class_labels"
description = "Landsat class labels."
semantic_meaning = "Integer land-cover class label aligned one value per source row."
role = "auxiliary"
representation_class = "native_numeric"
representation_notes = "The source table stores integer class labels; values are copied as uint8."
source_resources = ["main_archive"]
filtered_input_path = "filtered/uci_statlog_landsat_satellite_u8/ingest_stats.json"
filtering = "Keep the final class label column for all retained rows."
missing_value_policy = "Blank, malformed, non-integer, or out-of-range labels are fatal."
conversion = "Parse decimal labels, range-check to 1..7, and write raw uint8 bytes."
numeric_kind = "uint"
bit_width = 8
endianness = "little"
sample_format = "raw homogeneous numeric array"
sample_count = 0
total_size_bytes = 0
output_path = "samples/uci_statlog_landsat_satellite_u8/landsat_class_labels/"
