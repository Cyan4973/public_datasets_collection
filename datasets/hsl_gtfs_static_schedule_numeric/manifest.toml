manifest_version = 1
dataset_id = "hsl_gtfs_static_schedule_numeric"
name = "HSL GTFS Static Schedule Numeric"
description = "Helsinki Region Transport GTFS static schedule feed parsed into native and operational numeric timetable and geometry arrays."
homepage = "https://www.hsl.fi/en/hsl/open-data"

[license]
name = "Creative Commons Attribution 4.0 International"
spdx = "CC-BY-4.0"
url = "https://creativecommons.org/licenses/by/4.0/"
citation = "Helsinki Region Transport (HSL) open data GTFS static feed."
notes = "Preserve HSL attribution and feed metadata."

[safety]
contains_sensitive_data = false
contains_personal_data = false
provenance_notes = "Public transit schedule and stop geometry feed."
usage_notes = "Public transport timetable data; no personal data expected."

[[origins]]
id = "hsl_open_data_gtfs"
name = "HSL Open Data GTFS"
url = "https://www.hsl.fi/en/hsl/open-data"
type = "public_data_portal"
notes = "Helsinki Region Transport public GTFS static feed."

[[resources]]
id = "hsl_gtfs_static_zip"
origin = "hsl_open_data_gtfs"
url = "https://infopalvelut.storage.hsldev.com/gtfs/hsl.zip"
type = "source_archive"
version = "feed_at_user_download_time"
access = "Download script fetches the public GTFS ZIP URL, or HSL_GTFS_URL can override it for the same HSL GTFS material."
size_bytes = 0
sha256 = ""
local_path = "downloads/hsl_gtfs_static_schedule_numeric/"
notes = "Download validation requires GTFS stop_times, stops, and shapes tables with parseable numeric schedule and geometry fields."

[local_paths]
downloads = "downloads/hsl_gtfs_static_schedule_numeric/"
filtered = "filtered/hsl_gtfs_static_schedule_numeric/"
index = "index/hsl_gtfs_static_schedule_numeric/"
samples = "samples/hsl_gtfs_static_schedule_numeric/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/hsl_gtfs_static_schedule_numeric/samples.jsonl"
summary = "Download the HSL GTFS static ZIP, parse numeric schedule and geometry fields from local CSV tables, and emit raw homogeneous numeric arrays."
deterministic_notes = "Build reads only the local ZIP, parses fixed GTFS table columns with Python csv, converts GTFS times to service-day seconds, preserves source row order, skips missing optional numeric values, writes little-endian arrays, and enforces acceptance floors."

[[series]]
id = "stop_times_arrival_seconds_i32"
description = "GTFS stop_times arrival seconds."
semantic_meaning = "Service-day arrival time at each trip stop, preserving stop_times.txt row order."
role = "primary"
representation_class = "derived_operational_numeric"
representation_notes = "GTFS represents service-day times as HH:MM:SS strings; integer seconds since service-day start is the standard operational numeric form."
source_resources = ["hsl_gtfs_static_zip"]
filtered_input_path = "filtered/hsl_gtfs_static_schedule_numeric/ingest_stats.json"
filtering = "Keep rows with parseable arrival_time values."
missing_value_policy = "Missing stop_times.txt, absent columns, malformed times, non-finite values, tiny outputs, or constant outputs are rejected or skipped as recorded in build stats."
conversion = "Convert HH:MM:SS to little-endian int32 seconds, allowing GTFS hours beyond 24."
numeric_kind = "int"
bit_width = 32
endianness = "little"
sample_format = "raw homogeneous int32 array"
sample_geometry = "gtfs_table_column"
sample_rank = 1
sample_axes = ["stop_time_row"]
sample_count = 0
total_size_bytes = 0
output_path = "samples/hsl_gtfs_static_schedule_numeric/stop_times_arrival_seconds_i32/"

