manifest_version = 1
dataset_id = "who_gho_observations"
status = "staged"
kind = "native_numeric"

[origin]
name = "WHO GHO API"
url = "https://ghoapi.azureedge.net/api/MDG_0000000001"
license = "Public API terms"

[build]
sample_index_path = ".data/index/who_gho_observations/samples.jsonl"
missing_value_policy = "Rows lacking NumericValue, TimeDim, or Id are dropped. Low and High are preserved as NaN when absent."

[[series]]
id = "who_gho_numeric_value_f64"
numeric_kind = "float"
bit_width = 64
endianness = "little"
sample_format = "raw"

[[series]]
id = "who_gho_time_dim_u16"
numeric_kind = "uint"
bit_width = 16
endianness = "little"
sample_format = "raw"

[[series]]
id = "who_gho_record_id_u32"
numeric_kind = "uint"
bit_width = 32
endianness = "little"
sample_format = "raw"

[[series]]
id = "who_gho_spatial_dim_length_u8"
numeric_kind = "uint"
bit_width = 8
endianness = "little"
sample_format = "raw"

[[series]]
id = "who_gho_parent_location_length_u8"
numeric_kind = "uint"
bit_width = 8
endianness = "little"
sample_format = "raw"

[[series]]
id = "who_gho_dim1_length_u8"
numeric_kind = "uint"
bit_width = 8
endianness = "little"
sample_format = "raw"

[[series]]
id = "who_gho_dim2_length_u8"
numeric_kind = "uint"
bit_width = 8
endianness = "little"
sample_format = "raw"

[[series]]
id = "who_gho_low_f64"
numeric_kind = "float"
bit_width = 64
endianness = "little"
sample_format = "raw"

[[series]]
id = "who_gho_high_f64"
numeric_kind = "float"
bit_width = 64
endianness = "little"
sample_format = "raw"

