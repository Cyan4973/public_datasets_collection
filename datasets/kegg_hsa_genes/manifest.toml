manifest_version = 1
dataset_id = "kegg_hsa_genes"
name = "KEGG HSA Genes"
description = "Pinned KEGG human gene listing preserving native gene ids and numeric flags."

[local_paths]
downloads = "downloads/kegg_hsa_genes/"
filtered = "filtered/kegg_hsa_genes/"
index = "index/kegg_hsa_genes/"
samples = "samples/kegg_hsa_genes/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/kegg_hsa_genes/samples.jsonl"

[[series]]
id = "kegg_gene_id"
description = "KEGG gene identifier."
semantic_meaning = "KEGG gene identifier."
role = "auxiliary"
representation_class = "native_numeric"
missing_value_policy = "Records missing or with an unparseable value for this field are skipped by the build; constant or empty samples are rejected."
conversion = "Extract this field from each source record in order and store as raw little-endian uint32."
numeric_kind = "uint"
bit_width = 32
endianness = "little"
sample_format = "raw homogeneous numeric array"
sample_count = 0
total_size_bytes = 0
output_path = "samples/kegg_hsa_genes/kegg_gene_id/"

[[series]]
id = "kegg_is_cds"
description = "Coding-sequence flag."
semantic_meaning = "Coding-sequence flag."
role = "auxiliary"
representation_class = "native_numeric"
missing_value_policy = "Records missing or with an unparseable value for this field are skipped by the build; constant or empty samples are rejected."
conversion = "Extract this field from each source record in order and store as raw little-endian uint8."
numeric_kind = "uint"
bit_width = 8
endianness = "little"
sample_format = "raw homogeneous numeric array"
sample_count = 0
total_size_bytes = 0
output_path = "samples/kegg_hsa_genes/kegg_is_cds/"

[[series]]
id = "kegg_coord_start"
description = "Gene start coordinate on the chromosome."
