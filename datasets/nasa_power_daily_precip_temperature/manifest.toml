filtering = "Keep PRECTOTCORR rows with parseable date keys and values that are not equal to the API fill value."
missing_value_policy = "Filter rows whose values equal the API fill value, blank strings, NaN strings, malformed date keys, or malformed numeric values."
conversion = "Parse retained parameter values as Python float and write IEEE-754 little-endian float64 arrays preserving chronological order within each location sample."
