manifest_version = 1
dataset_id = "coinpaprika_tickers"
name = "CoinPaprika Tickers"
description = "Pinned CoinPaprika tickers snapshot with USD quote metrics."

[local_paths]
downloads = "downloads/coinpaprika_tickers/"
filtered = "filtered/coinpaprika_tickers/"
index = "index/coinpaprika_tickers/"
samples = "samples/coinpaprika_tickers/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/coinpaprika_tickers/samples.jsonl"

[[series]]
id = "coinpaprika_rank"
description = "Market-cap rank."
semantic_meaning = "Market-cap rank."
role = "auxiliary"
representation_class = "native_numeric"
missing_value_policy = "Records missing or with an unparseable value for this field are skipped by the build; constant or empty samples are rejected."
conversion = "Extract this field from each source record in order and store as raw little-endian uint16."
numeric_kind = "uint"
bit_width = 16
endianness = "little"
sample_format = "raw homogeneous numeric array"
sample_count = 0
total_size_bytes = 0
output_path = "samples/coinpaprika_tickers/coinpaprika_rank/"

