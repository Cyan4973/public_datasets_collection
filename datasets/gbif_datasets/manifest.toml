manifest_version = 1
dataset_id = "gbif_datasets"
name = "GBIF Datasets"
description = "Paged GBIF dataset catalog metadata; each emitted sample is one homogeneous numeric field across dataset rows."

[license]
name = "GBIF"
spdx = "LicenseRef-GBIF"
url = "https://www.gbif.org/terms"

[[resources]]
id = "gbif_dataset_pages"
url = "https://api.gbif.org/v1/dataset/search?limit={limit}&offset={offset}"
type = "api_response"
local_path = "downloads/gbif_datasets/pages/"

[local_paths]
downloads = "downloads/gbif_datasets/"
filtered = "filtered/gbif_datasets/"
index = "index/gbif_datasets/"
samples = "samples/gbif_datasets/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/gbif_datasets/samples.jsonl"

[[series]]
id = "gbif_record_count_u64"
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Missing recordCount values are preserved as zero."
numeric_kind = "uint"
bit_width = 64
endianness = "little"
sample_geometry = "gbif_dataset_table_column"

[[series]]
id = "gbif_keyword_count_u16"
role = "primary"
representation_class = "derived_operational_numeric"
missing_value_policy = "Missing keyword lists are preserved as zero-length lists."
numeric_kind = "uint"
bit_width = 16
endianness = "little"
sample_geometry = "gbif_dataset_table_column"

[[series]]
id = "gbif_decade_count_u16"
role = "primary"
representation_class = "derived_operational_numeric"
missing_value_policy = "Missing decade lists are preserved as zero-length lists."
numeric_kind = "uint"
bit_width = 16
endianness = "little"
sample_geometry = "gbif_dataset_table_column"
