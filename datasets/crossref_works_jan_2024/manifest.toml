manifest_version = 1
dataset_id = "crossref_works_jan_2024"
name = "Crossref Works January 2024 Sample"
description = "Pinned Crossref works sample with native citation-count and timestamp fields."

[license]
name = "LicenseRef-Crossref"
spdx = "LicenseRef-Crossref"
url = "https://api.crossref.org/"

[[resources]]
id = "crossref_works_json"
url = "https://api.crossref.org/works?filter=from-created-date:2024-01-01,until-created-date:2024-01-31&rows=200"
type = "api_response"
local_path = "downloads/crossref_works_jan_2024/crossref_works_jan_2024.json"

[local_paths]
downloads = "downloads/crossref_works_jan_2024/"
filtered = "filtered/crossref_works_jan_2024/"
index = "index/crossref_works_jan_2024/"
samples = "samples/crossref_works_jan_2024/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/crossref_works_jan_2024/samples.jsonl"

[[series]]
id = "crossref_reference_count"
representation_class = "native_numeric"
missing_value_policy = "Rows missing numeric fields are filtered."
numeric_kind = "uint"
bit_width = 32
endianness = "little"

[[series]]
id = "crossref_is_referenced_by_count"
representation_class = "native_numeric"
missing_value_policy = "Rows missing numeric fields are filtered."
numeric_kind = "uint"
bit_width = 32
endianness = "little"

[[series]]
id = "crossref_created_timestamp_ms"
representation_class = "native_numeric"
missing_value_policy = "Rows missing numeric fields are filtered."
numeric_kind = "uint"
bit_width = 64
endianness = "little"

