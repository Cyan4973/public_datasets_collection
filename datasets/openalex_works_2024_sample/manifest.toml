semantic_meaning = "Number of authorship records attached to the work."
role = "primary"
representation_class = "derived_operational_numeric"
missing_value_policy = "Missing arrays are treated as empty arrays."
conversion = "Stable JSON array cardinality stored as uint16."
numeric_kind = "uint"
bit_width = 16
endianness = "little"

