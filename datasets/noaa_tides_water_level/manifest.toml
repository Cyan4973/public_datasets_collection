role = "primary"
representation_class = "native_numeric"
source_resources = ["water_level_station_months"]
filtered_input_path = "filtered/noaa_tides_water_level/ingest_stats.json"
filtering = "Keep rows with parseable timestamp, finite water level, and finite sigma; keep station samples with at least NOAA_TIDES_MIN_VALUES_PER_SAMPLE values."
conversion = "Parse JSON field v as Python float and write IEEE-754 little-endian float64 arrays preserving source order."
numeric_kind = "float"
bit_width = 64
endianness = "little"
sample_format = "raw homogeneous numeric array"
sample_geometry = "noaa_coops_station_time_series"
sample_count = 21
total_size_bytes = 29149968
output_path = "samples/noaa_tides_water_level/noaa_tides_level_f64/"

