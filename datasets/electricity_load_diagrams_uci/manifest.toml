representation_class = "native_numeric"
source_resources = ["main"]
filtering = "Emit every meter column as its own sample; timestamps are omitted."
missing_value_policy = "Absent readings are recorded as the source 0 values; constant samples are rejected by verify."
conversion = "Parse the semicolon-delimited LD2011_2014.txt in row order and write each meter column as raw little-endian float32."
numeric_kind = "float"
bit_width = 32
endianness = "little"
sample_format = "raw homogeneous float32 electricity-load time series"
