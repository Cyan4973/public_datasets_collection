manifest_version = 1
dataset_id = "met_biocollection_objects"
name = "Met Museum Bio Collection Objects"
description = "Public Met Museum search result object identifiers for a subject query."

[license]
name = "CC0 1.0"
spdx = "CC0-1.0"
url = "https://creativecommons.org/publicdomain/zero/1.0/"

[[resources]]
id = "met_search_json"
url = "https://collectionapi.metmuseum.org/public/collection/v1/search?hasImages=true&q=bird"
type = "api_response"
local_path = "downloads/met_biocollection_objects/met_biocollection_objects.json"

[local_paths]
downloads = "downloads/met_biocollection_objects/"
filtered = "filtered/met_biocollection_objects/"
index = "index/met_biocollection_objects/"
samples = "samples/met_biocollection_objects/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/met_biocollection_objects/samples.jsonl"

[[series]]
id = "met_object_id"
representation_class = "derived_operational_numeric"
missing_value_policy = "Missing object ids are filtered."
numeric_kind = "uint"
bit_width = 32
endianness = "little"
