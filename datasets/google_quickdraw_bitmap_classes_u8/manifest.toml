manifest_version = 1
dataset_id = "google_quickdraw_bitmap_classes_u8"
name = "Google Quick, Draw! Bitmap Classes UInt8"
description = "Crowdsourced Quick, Draw! 28x28 sketch bitmap arrays for a bounded public class set."
homepage = "https://quickdraw.withgoogle.com/data"

[license]
name = "Creative Commons Attribution 4.0 International"
spdx = "CC-BY-4.0"
url = "https://creativecommons.org/licenses/by/4.0/"
citation = "Google Quick, Draw! Dataset."
notes = "Preserve Google Quick, Draw! attribution."

[safety]
contains_sensitive_data = false
contains_personal_data = false
provenance_notes = "Public crowdsourced drawing dataset released by Google."
usage_notes = "This recipe emits only class-level bitmap pixel arrays; no user identifiers or drawing metadata are included."

[[origins]]
id = "google_quickdraw"
name = "Google Quick, Draw! Dataset"
url = "https://quickdraw.withgoogle.com/data"
type = "public_research_dataset"
notes = "Public Quick, Draw! full bitmap class arrays hosted on Google Cloud Storage."

[[resources]]
id = "quickdraw_full_numpy_bitmap_classes"
origin = "google_quickdraw"
url = "https://storage.googleapis.com/quickdraw_dataset/full/numpy_bitmap/"
type = "npy_uint8_bitmap_class_arrays"
version = "full numpy_bitmap class files"
access = "Download script fetches a fixed class set from the public numpy_bitmap directory and validates each .npy header."
size_bytes = 0
sha256 = ""
local_path = "downloads/google_quickdraw_bitmap_classes_u8/"
notes = "Default class set is airplane, cat, dog, car, house, and tree. Total downloads are capped below 1 GB."

[local_paths]
downloads = "downloads/google_quickdraw_bitmap_classes_u8/"
filtered = "filtered/google_quickdraw_bitmap_classes_u8/"
index = "index/google_quickdraw_bitmap_classes_u8/"
samples = "samples/google_quickdraw_bitmap_classes_u8/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/google_quickdraw_bitmap_classes_u8/samples.jsonl"
summary = "Download fixed Quick, Draw! full bitmap .npy class arrays, validate uint8 28x28 shapes, strip NPY containers, and emit one raw uint8 bitmap-stack sample per class."
deterministic_notes = "Build is local-only after download. Class order is fixed by QUICKDRAW_CLASSES, source arrays must be uint8 C-order arrays of shape (n, 784), and primary output is capped below 1 GB."

[[series]]
id = "quickdraw_bitmap_28x28_u8"
description = "Quick, Draw! 28x28 bitmap stacks by prompt class."
semantic_meaning = "Crowdsourced hand-drawn sketch rasters for one prompt class per sample."
role = "primary"
representation_class = "native_numeric"
representation_notes = "The source NumPy arrays store each drawing as 784 uint8 grayscale pixel values. The build copies the raw uint8 payload unchanged."
source_resources = ["quickdraw_full_numpy_bitmap_classes"]
filtered_input_path = "filtered/google_quickdraw_bitmap_classes_u8/ingest_stats.json"
filtering = "Keep validated default class arrays with uint8 dtype, C-order storage, and shape (n, 784)."
missing_value_policy = "Malformed NPY headers, unsupported dtypes/order, missing class files, and shape/payload-size mismatches are fatal."
conversion = "Strip the NPY container and write the contiguous uint8 bitmap payload unchanged."
numeric_kind = "uint"
bit_width = 8
endianness = "little"
sample_format = "raw homogeneous uint8 28x28 sketch bitmap stack"
sample_geometry = "sketch_bitmap_stack"
sample_rank = 3
sample_axes = ["drawing", "y", "x"]
natural_record_kind = "quickdraw_bitmap_class"
sample_count = 0
total_size_bytes = 0
output_path = "samples/google_quickdraw_bitmap_classes_u8/quickdraw_bitmap_28x28_u8/"
