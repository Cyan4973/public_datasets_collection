manifest_version = 1
dataset_id = "europeana_search"
name = "Europeana Search"
description = "Numeric item fields extracted from a public Europeana search response."

[license]
name = "Europeana Terms"
spdx = "LicenseRef-Europeana"
url = "https://www.europeana.eu/en/rights"

[[resources]]
id = "europeana_json"
url = "https://api.europeana.eu/record/v2/search.json?wskey=apidemo&query=art&rows=100"
type = "api_response"
local_path = "downloads/europeana_search/europeana_search.json"

[local_paths]
downloads = "downloads/europeana_search/"
filtered = "filtered/europeana_search/"
index = "index/europeana_search/"
samples = "samples/europeana_search/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/europeana_search/samples.jsonl"

[[series]]
id = "europeana_completeness"
representation_class = "native_numeric"
missing_value_policy = "Rows missing numeric fields are filtered for that series."
numeric_kind = "uint"
bit_width = 8
endianness = "little"

[[series]]
id = "europeana_index"
representation_class = "native_numeric"
missing_value_policy = "Rows missing numeric fields are filtered for that series."
numeric_kind = "uint"
bit_width = 16
endianness = "little"

[[series]]
id = "europeana_score"
representation_class = "native_numeric"
missing_value_policy = "Rows missing numeric fields are filtered for that series."
numeric_kind = "float"
bit_width = 32
endianness = "little"

[[series]]
id = "europeana_timestamp_created_epoch"
representation_class = "native_numeric"
missing_value_policy = "Rows missing numeric fields are filtered for that series."
numeric_kind = "uint"
bit_width = 64
endianness = "little"

[[series]]
id = "europeana_timestamp_update_epoch"
representation_class = "native_numeric"
missing_value_policy = "Rows missing numeric fields are filtered for that series."
numeric_kind = "uint"
bit_width = 64
endianness = "little"
