origin = "official"
url = "https://archive.ics.uci.edu/static/public/235/individual+household+electric+power+consumption.zip"
type = "archive"
version = "accessed_by_user"
access = "Direct public download."
size_bytes = 0
sha256 = ""
local_path = "downloads/household_power_uci/household_power.zip"
notes = "Archive containing household_power_consumption.txt."

[local_paths]
downloads = "downloads/household_power_uci/"
extracted = "extracted/household_power_uci/"
filtered = "filtered/household_power_uci/"
index = "index/household_power_uci/"
samples = "samples/household_power_uci/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/household_power_uci/samples.jsonl"
summary = "Download pinned upstream resources, build local raw numeric samples only from local files, and generate a machine-readable sample index."
deterministic_notes = "Build preserves text row order after filtering rows with question-mark sentinels, does no network access, writes durable logs, and emits samples.jsonl under index/household_power_uci/."

