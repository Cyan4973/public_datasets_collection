manifest_version = 1
dataset_id = "nomis_employment"
name = "NOMIS Employment"
description = "NOMIS Jobseeker's Allowance claimant observations for one employment measure, widened by geography while preserving homogeneous numeric fields."

[license]
name = "Open Government Licence v3.0"
spdx = "OGL-UK-3.0"
url = "https://www.nationalarchives.gov.uk/open-government-licence/version/3/"

[[resources]]
id = "nomis_json"
url = "https://www.nomisweb.co.uk/api/v01/dataset/NM_1_1.data.json?geography={geography}&item=1&measures=20100"
type = "api_response"
local_path = "downloads/nomis_employment/nomis_employment.json"

[local_paths]
downloads = "downloads/nomis_employment/"
filtered = "filtered/nomis_employment/"
index = "index/nomis_employment/"
samples = "samples/nomis_employment/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/nomis_employment/samples.jsonl"

[[series]]
id = "nomis_obs_value"
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Rows missing required numeric fields are filtered."
numeric_kind = "uint"
bit_width = 32
endianness = "little"
sample_geometry = "nomis_employment_observation_column"

[[series]]
id = "nomis_geography"
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Rows missing required numeric fields are filtered."
numeric_kind = "uint"
bit_width = 32
endianness = "little"
sample_geometry = "nomis_employment_observation_column"

[[series]]
id = "nomis_sex"
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Rows missing required numeric fields are filtered."
numeric_kind = "uint"
bit_width = 8
endianness = "little"
sample_geometry = "nomis_employment_observation_column"

[[series]]
id = "nomis_year"
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Rows missing required numeric fields are filtered."
numeric_kind = "uint"
bit_width = 16
endianness = "little"
sample_geometry = "nomis_employment_observation_column"

[[series]]
id = "nomis_month"
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Rows missing required numeric fields are filtered."
numeric_kind = "uint"
bit_width = 8
endianness = "little"
sample_geometry = "nomis_employment_observation_column"
