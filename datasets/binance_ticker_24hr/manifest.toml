manifest_version = 1
dataset_id = "binance_ticker_24hr"
name = "Binance 24h Ticker Snapshot"
description = "Pinned Binance 24-hour ticker snapshot across trading pairs."

[local_paths]
downloads = "downloads/binance_ticker_24hr/"
filtered = "filtered/binance_ticker_24hr/"
index = "index/binance_ticker_24hr/"
samples = "samples/binance_ticker_24hr/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/binance_ticker_24hr/samples.jsonl"

[[series]]
id = "binance_price_change_pct"
description = "24h price change percent."
semantic_meaning = "24h price change percent."
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Records missing or with an unparseable value for this field are skipped by the build; constant or empty samples are rejected."
conversion = "Extract this field from each source record in order and store as raw little-endian float32."
numeric_kind = "float"
bit_width = 32
endianness = "little"
sample_format = "raw homogeneous numeric array"
sample_count = 0
total_size_bytes = 0
output_path = "samples/binance_ticker_24hr/binance_price_change_pct/"

