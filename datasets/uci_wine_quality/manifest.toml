manifest_version = 1
dataset_id = "uci_wine_quality"
name = "UCI Wine Quality"
description = "Two numeric wine chemistry tables (red and white)."
homepage = "https://archive.ics.uci.edu/dataset/186/wine+quality"

[license]
name = "CC BY 4.0"
spdx = "CC-BY-4.0"
url = "https://creativecommons.org/licenses/by/4.0/"
citation = "Cortez et al. Wine Quality Data Set, UCI Machine Learning Repository."
notes = "UCI metadata indicates CC BY 4.0."

[safety]
contains_sensitive_data = false
contains_personal_data = false
provenance_notes = "Official upstream distribution only; no mirrors, leaks, or scraped personal content."
usage_notes = "Public source intended for reproducible numeric dataset collection."

[[origins]]
id = "official"
name = "UCI ML Repository"
url = "https://archive.ics.uci.edu/dataset/186/wine+quality"
type = "data_portal"
notes = "Official upstream dataset page."

[[resources]]
id = "main"
origin = "official"
url = "https://archive.ics.uci.edu/static/public/186/wine+quality.zip"
type = "archive"
version = "accessed_by_user"
access = "Direct public download."
size_bytes = 0
sha256 = ""
local_path = "downloads/uci_wine_quality/wine_quality.zip"
notes = "Archive containing red and white CSV tables."

[local_paths]
downloads = "downloads/uci_wine_quality/"
extracted = "extracted/uci_wine_quality/"
filtered = "filtered/uci_wine_quality/"
index = "index/uci_wine_quality/"
samples = "samples/uci_wine_quality/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/uci_wine_quality/samples.jsonl"
summary = "Download pinned upstream resources, build local raw numeric samples only from local files, and generate a machine-readable sample index."
deterministic_notes = "Build preserves source file order, does no network access, writes durable logs, and emits samples.jsonl under index/uci_wine_quality/."

[[series]]
id = "wine_fixed_acidity"
description = "Fixed acidity (g/dm^3 tartaric acid)."
semantic_meaning = "Fixed acidity (g/dm^3 tartaric acid)."
role = "primary"
representation_class = "native_numeric"
source_resources = ["main"]
filtered_input_path = "filtered/uci_wine_quality/inventory.tsv"
filtering = "Keep all rows from both CSVs with parseable numeric fields."
missing_value_policy = "Malformed or blank numeric values are fatal."
conversion = "Parse the source table(s) in order and write this column's parsed values as one sample per wine color, as raw little-endian float64."
numeric_kind = "float"
bit_width = 64
endianness = "little"
sample_format = "raw homogeneous numeric array"
sample_count = 0
total_size_bytes = 0
output_path = "samples/uci_wine_quality/wine_fixed_acidity/"

