manifest_version = 1
dataset_id = "taginfo_tags_popular"
name = "Taginfo Tags Popular"
description = "Paginated OpenStreetMap Taginfo popular tag usage statistics."

[license]
name = "OpenStreetMap"
spdx = "ODbL-1.0"
url = "https://taginfo.openstreetmap.org/"

[[resources]]
id = "taginfo_tags_json"
url = "https://taginfo.openstreetmap.org/api/4/tags/popular?page={page}&rp=500"
type = "api_response"
local_path = "downloads/taginfo_tags_popular/pages/"

[local_paths]
downloads = "downloads/taginfo_tags_popular/"
filtered = "filtered/taginfo_tags_popular/"
index = "index/taginfo_tags_popular/"
samples = "samples/taginfo_tags_popular/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/taginfo_tags_popular/samples.jsonl"

[[series]]
id = "taginfo_tag_count_all"
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Rows missing numeric fields are filtered."
numeric_kind = "uint"
bit_width = 64
endianness = "little"

[[series]]
id = "taginfo_tag_count_all_fraction"
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Rows missing numeric fields are filtered."
numeric_kind = "float"
bit_width = 64
endianness = "little"

[[series]]
id = "taginfo_tag_count_nodes"
