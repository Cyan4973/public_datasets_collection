manifest_version = 1
dataset_id = "fmnist_px_u8"
name = "Fashion-MNIST Pixels (u8)"
description = "Grayscale 8-bit pixel intensities of the Fashion-MNIST images: one family, one sample per (split, garment class)."
homepage = "https://github.com/zalandoresearch/fashion-mnist"

[license]
name = "MIT"
spdx = "MIT"
url = "https://github.com/zalandoresearch/fashion-mnist/blob/master/LICENSE"
citation = "Xiao, Rasul, Vollgraf. Fashion-MNIST: a Novel Image Dataset for Benchmarking ML Algorithms. 2017."
notes = "Public benchmark; only numeric pixel intensities are extracted."

[safety]
contains_sensitive_data = false
contains_personal_data = false
provenance_notes = "Fashion-MNIST IDX files from the official GitHub repository; raw 28x28 grayscale pixel bytes."
usage_notes = "Promote only after a fresh successful download, build, and verify."

[[origins]]
id = "zalando"
name = "Zalando Research Fashion-MNIST"
url = "https://github.com/zalandoresearch/fashion-mnist"
type = "repository"
notes = "IDX ubyte gzip files (train/test images + labels), same format as MNIST."

[[resources]]
id = "idx_files"
origin = "zalando"
url = "https://github.com/zalandoresearch/fashion-mnist/raw/master/data/fashion/train-images-idx3-ubyte.gz"
type = "idx_ubyte"
version = "fashion-mnist"
access = "Four gzip IDX files: train/test images (idx3) and labels (idx1)."
size_bytes = 0
sha256 = ""
local_path = "downloads/fmnist_px_u8/"
notes = "Images: magic 0x803, n x 28 x 28 uint8. Labels: magic 0x801, n uint8."

[local_paths]
downloads = "downloads/fmnist_px_u8/"
extracted = "extracted/fmnist_px_u8/"
filtered = "filtered/fmnist_px_u8/"
index = "index/fmnist_px_u8/"
samples = "samples/fmnist_px_u8/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/fmnist_px_u8/samples.jsonl"
summary = "Parse the Fashion-MNIST IDX images/labels and emit one sample per (split, garment class) of concatenated 8-bit pixel intensities."
deterministic_notes = "Each 28x28 image contributes 784 uint8 pixels in row-major order; images are grouped by (split in {train,test}, label in 0..9) into one sample each (a 28x28 image is < 1000 values, so per-class grouping keeps samples above the floor). One family fmnist_pixel_u8; samples with < FMNIST_MIN_RECORDS or constant values dropped. Mirrors the downstream fmnist_px_28x28 family."

[[series]]
id = "fmnist_pixel_u8"
semantic_meaning = "Grayscale pixel intensity (0-255) of Fashion-MNIST images, one sample per (split, garment class)."
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Per-class buffers with < FMNIST_MIN_RECORDS or constant values dropped."
conversion = "Native 8-bit grayscale pixel bytes, row-major."
numeric_kind = "uint"
bit_width = 8
endianness = "little"
