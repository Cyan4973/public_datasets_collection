manifest_version = 1
dataset_id = "jpl_close_approaches"
name = "JPL Small-Body Close Approaches"
description = "JPL/CNEOS small-body close-approach data over a multi-decade window, one column sample per native close-approach numeric field."
homepage = "https://ssd-api.jpl.nasa.gov/doc/cad.html"

[license]
name = "LicenseRef-JPL"
spdx = "LicenseRef-JPL"
url = "https://ssd-api.jpl.nasa.gov/"
citation = "NASA/JPL Center for Near-Earth Object Studies (CNEOS) close-approach data API."
notes = "Public NASA/JPL SSD/CNEOS API output."

[safety]
contains_sensitive_data = false
contains_personal_data = false
provenance_notes = "Public JSON responses from the JPL SSD/CNEOS cad.api endpoint, fetched one decade per page."
usage_notes = "Promote only after fresh successful download, build, and verify."

[[origins]]
id = "official"
name = "JPL SSD/CNEOS"
url = "https://ssd-api.jpl.nasa.gov/cad.api"
type = "api"
notes = "Official public close-approach data endpoint."

[[resources]]
id = "cad_decade_pages"
origin = "official"
url = "https://ssd-api.jpl.nasa.gov/cad.api?date-min=YYYY-01-01&date-max=YYYY-12-31&sort=date&fullname=true"
type = "api_response_pages"
version = "per_decade"
access = "One public HTTP request per decade in the configured window."
size_bytes = 0
sha256 = ""
local_path = "downloads/jpl_close_approaches/pages/"
notes = "Close approaches for each decade in JPL_START_DECADE..JPL_END_DECADE (default 1900-2099)."

[local_paths]
downloads = "downloads/jpl_close_approaches/"
extracted = "extracted/jpl_close_approaches/"
filtered = "filtered/jpl_close_approaches/"
index = "index/jpl_close_approaches/"
samples = "samples/jpl_close_approaches/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/jpl_close_approaches/samples.jsonl"
summary = "Download the JPL CAD close-approach table one decade per page and emit one raw little-endian float64 sample per native numeric field across all close-approach rows."
deterministic_notes = "Fixed endpoint, per-decade date windows, fixed field extraction, atomic per-row parsing with (des, jd) de-duplication, and a generated sample index."

[[series]]
id = "jpl_cad_jd"
semantic_meaning = "Close-approach time as Julian date."
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Malformed rows are dropped."
conversion = "Native CAD numeric string parsed to float64."
numeric_kind = "float"
bit_width = 64
endianness = "little"

