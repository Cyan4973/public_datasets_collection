manifest_version = 1
dataset_id = "ncbi_gene_human"
status = "staged"
kind = "native_numeric"

[origin]
name = "NCBI Gene"
url = "https://ftp.ncbi.nlm.nih.gov/gene/DATA/"
license = "NCBI terms"

[build]
sample_index_path = ".data/index/ncbi_gene_human/samples.jsonl"
missing_value_policy = "Rows lacking parseable numeric identifiers are dropped. Only tax_id 9606 rows are retained."

[[series]]
id = "ncbi_gene_info_gene_id_u32"
numeric_kind = "uint"
bit_width = 32
endianness = "little"
sample_format = "raw"

[[series]]
id = "ncbi_gene_info_modification_date_u32"
numeric_kind = "uint"
bit_width = 32
endianness = "little"
sample_format = "raw"

[[series]]
id = "ncbi_gene2pubmed_gene_id_u32"
numeric_kind = "uint"
bit_width = 32
endianness = "little"
sample_format = "raw"

[[series]]
id = "ncbi_gene2pubmed_pubmed_id_u32"
numeric_kind = "uint"
bit_width = 32
endianness = "little"
sample_format = "raw"

