notes = "Texas road-network edge list."

[local_paths]
downloads = "downloads/snap_roadnet_edges_i32/"
filtered = "filtered/snap_roadnet_edges_i32/"
index = "index/snap_roadnet_edges_i32/"
samples = "samples/snap_roadnet_edges_i32/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/snap_roadnet_edges_i32/samples.jsonl"
summary = "Download three SNAP road-network gzipped edge lists, parse source and destination node endpoints, and emit one int32 sample per state-endpoint column."
deterministic_notes = "Build is local-only after download. It preserves source edge order, emits signed little-endian int32 endpoint columns, validates nonnegative endpoints and no self-loops, requires all three states and 10,000,000 total endpoint values, and enforces the 1 GB primary-output cap."

[[series]]
id = "snap_roadnet_*_node_i32"
description = "SNAP road-network source and destination node endpoint columns."
semantic_meaning = "Per-edge graph endpoint node IDs for California, Pennsylvania, and Texas road-network topology."
role = "primary"
representation_class = "native_numeric"
representation_notes = "The source edge-list files store node endpoint integers; the build writes little-endian signed int32 endpoint arrays without remapping IDs or synthesizing graph topology."
source_resources = ["roadnet_ca", "roadnet_pa", "roadnet_tx"]
filtered_input_path = "filtered/snap_roadnet_edges_i32/ingest_stats.json"
filtering = "Keep source and destination endpoint columns for each of the three roadNet edge lists after validating edge counts and int32 endpoint range."
missing_value_policy = "Malformed edge rows are rejected during download/build validation."
conversion = "Parse retained endpoint integers as Python int and write little-endian signed int32 preserving source edge order."
numeric_kind = "int"
bit_width = 32
endianness = "little"
sample_format = "raw homogeneous int32 SNAP road-network edge endpoint column"
sample_geometry = "graph_edge_endpoint_column"
sample_rank = 1
sample_axes = ["edge"]
natural_record_kind = "snap_roadnet_edge_endpoint_column"
sample_count = 0
total_size_bytes = 0
output_path = "samples/snap_roadnet_edges_i32/"
