build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/msd_hippocampus_segmentation_labels_u8/samples.jsonl"
summary = "Download the Task04 Hippocampus tar archive, parse local NIfTI-1 label volumes under labelsTr/, and emit one raw uint8 3D class-code volume per case."
deterministic_notes = "The archive URL and license URL are fixed. Build sorts labelsTr members by archive path, accepts only integer unscaled 3D NIfTI-1 single-file volumes, converts class IDs losslessly to uint8 only when all values are in range, rejects constant or malformed volumes, and writes a deterministic JSONL sample index."

[[series]]
id = "hippocampus_segmentation_label_u8"
description = "3D hippocampus segmentation class-label volumes."
semantic_meaning = "Voxelwise biomedical segmentation labels, one patient/case label volume per natural NIfTI record."
role = "primary"
representation_class = "derived_operational_numeric"
representation_notes = "The semantic source values are integer segmentation class IDs. The recipe emits those class IDs as uint8 after verifying that every source integer value is in the uint8 range; no local remapping or relabeling is applied."
source_resources = ["task04_hippocampus_archive"]
filtered_input_path = "filtered/msd_hippocampus_segmentation_labels_u8/ingest_stats.json"
filtering = "Keep labelsTr/*.nii.gz NIfTI-1 volumes that are 3D, integer-typed, unscaled, non-constant, and whose label values fit in uint8."
missing_value_policy = "Missing archive, missing labels, malformed NIfTI headers, unsupported datatypes, scaled labels, out-of-range labels, non-3D labels, empty labels, or constant labels are fatal or skipped as documented in build stats."
conversion = "Read each NIfTI label payload, preserve source voxel order, and write class IDs as a raw homogeneous uint8 byte array."
numeric_kind = "uint"
bit_width = 8
endianness = "little"
sample_format = "raw homogeneous uint8 byte array"
sample_count = 0
total_size_bytes = 0
output_path = "samples/msd_hippocampus_segmentation_labels_u8/hippocampus_segmentation_label_u8/"
