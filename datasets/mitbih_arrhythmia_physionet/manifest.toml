[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/mitbih_arrhythmia_physionet/samples.jsonl"
summary = "Download PhysioNet MIT-BIH records, decode WFDB format 212 to native int16 per lead family, and generate a machine-readable sample index."
deterministic_notes = "Build preserves one sample per source record and lead family, writes durable logs, and emits samples.jsonl under index/mitbih_arrhythmia_physionet/."

[[series]]
id = "mitbih_mlii_1d_var"
