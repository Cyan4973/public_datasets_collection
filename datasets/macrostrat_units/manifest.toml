manifest_version = 1
dataset_id = "macrostrat_units"
name = "Macrostrat Units"
description = "Macrostrat stratigraphic unit geology and paleontology numeric fields from the public units API."

[license]
name = "CC BY 4.0"
spdx = "CC-BY-4.0"
url = "https://creativecommons.org/licenses/by/4.0/"

[[origins]]
id = "macrostrat_api"
name = "Macrostrat API"
url = "https://macrostrat.org/api/units?response=long"
type = "api"

[[resources]]
id = "macrostrat_units_json"
origin = "macrostrat_api"
url = "https://macrostrat.org/api/units?response=long"
type = "json_api_response"
access = "Public HTTPS JSON endpoint."
size_bytes = 404092601
sha256 = ""
local_path = "downloads/macrostrat_units/macrostrat_units.json"
notes = "Validated local source has 129,304 unit records and 404,092,601 source bytes. Legacy ID and coordinate outputs are intentionally removed from this recipe."

[local_paths]
downloads = "downloads/macrostrat_units/"
filtered = "filtered/macrostrat_units/"
index = "index/macrostrat_units/"
samples = "samples/macrostrat_units/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/macrostrat_units/samples.jsonl"
summary = "Emit one primary numeric sample per selected Macrostrat unit geology or paleontology field."
deterministic_notes = "Fixed API endpoint; source order is preserved."

[[series]]
id = "macrostrat_unit_t_age_f32"
role = "primary"
description = "Unit top age."
semantic_meaning = "Top geologic age for each Macrostrat unit."
representation_class = "native_numeric"
source_resources = ["macrostrat_units_json"]
filtering = "Keep parseable numeric values."
missing_value_policy = "Missing or unparsable values are dropped for this field only."
conversion = "Store as little-endian float32."
numeric_kind = "float"
bit_width = 32
endianness = "little"
sample_format = "raw homogeneous numeric array"
sample_geometry = "macrostrat_unit_table_field"
sample_rank = 1
sample_axes = ["unit"]
sample_count = 1
total_size_bytes = 517044
output_path = "samples/macrostrat_units/macrostrat_unit_t_age_f32/"

