manifest_version = 1
dataset_id = "nih_reporter_projects"
name = "NIH RePORTER Projects"
description = "NIH RePORTER funded projects, one numeric field per family with one independent sample per fiscal year (2010-2024). Dollar and date fields kept as separate homogeneous families."
homepage = "https://reporter.nih.gov/"

[license]
name = "NIH RePORTER (U.S. Government public data)"
spdx = "LicenseRef-US-Gov-Public-Domain"
url = "https://api.reporter.nih.gov/"
citation = "NIH RePORTER API (https://api.reporter.nih.gov/)."
notes = "U.S. federal funding records, public domain."

[safety]
contains_sensitive_data = false
contains_personal_data = false
provenance_notes = "Public JSON from the NIH RePORTER v2 projects/search API, fetched per fiscal year with offset pagination."
usage_notes = "Public award metadata; no application content beyond public fields."

[[origins]]
id = "official"
name = "NIH RePORTER"
url = "https://api.reporter.nih.gov/v2/projects/search"
type = "api"
notes = "Official public NIH RePORTER v2 API. offset+limit is capped at 15000 per query."

[[resources]]
id = "projects_year_pages"
origin = "official"
url = "https://api.reporter.nih.gov/v2/projects/search"
type = "api_response_pages"
version = "per_fiscal_year_2010_2024"
access = "POST search per fiscal year (criteria.fiscal_years=[YEAR]) with offset pagination up to the 15000 offset+limit cap, sorted by project_start_date desc."
size_bytes = 0
sha256 = ""
local_path = "downloads/nih_reporter_projects/pages/"
notes = "One fiscal year per criteria window = one independent sample per field; ~15000 projects/year (offset cap)."

[local_paths]
downloads = "downloads/nih_reporter_projects/"
extracted = "extracted/nih_reporter_projects/"
filtered = "filtered/nih_reporter_projects/"
index = "index/nih_reporter_projects/"
samples = "samples/nih_reporter_projects/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/nih_reporter_projects/samples.jsonl"
summary = "Fetch NIH RePORTER projects one fiscal year per query (offset-paginated within the 15000 cap) and emit, per numeric field, one homogeneous sample per fiscal year."
deterministic_notes = "Fixed endpoint, fixed fiscal-year windows, fixed sort, offset pagination within the API cap, atomic per-row extraction within each year with appl_id de-duplication, and a generated sample index. fiscal_year itself is the sample axis and is not emitted as a field."

[[series]]
