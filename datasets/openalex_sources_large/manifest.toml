manifest_version = 1
dataset_id = "openalex_sources_large"
name = "OpenAlex Sources Large"
description = "Bounded cursor-paginated OpenAlex sources table with source-level numeric metadata, one column sample per native numeric field."
homepage = "https://openalex.org/"

[license]
name = "CC0-1.0"
spdx = "CC0-1.0"
url = "https://docs.openalex.org/"
citation = "https://openalex.org/"
notes = "Public OpenAlex API output (CC0)."

[safety]
contains_sensitive_data = false
contains_personal_data = false
provenance_notes = "Public JSON responses from cursor-paginated OpenAlex sources pages."
usage_notes = "Promote only after fresh successful download, build, and verify."

[[origins]]
id = "official"
name = "OpenAlex"
url = "https://api.openalex.org/sources"
type = "api"
notes = "Official public endpoint."

[[resources]]
id = "sources_pages"
origin = "official"
url = "https://api.openalex.org/sources?per-page=200&cursor=*"
type = "api_response_pages"
version = "cursor_paginated"
access = "Direct public HTTP cursor pagination over the default source ordering."
size_bytes = 0
sha256 = ""
local_path = "downloads/openalex_sources_large/pages/"
notes = "First TARGET_RECORDS (default 20000) sources in OpenAlex default cursor order."

[local_paths]
downloads = "downloads/openalex_sources_large/"
extracted = "extracted/openalex_sources_large/"
filtered = "filtered/openalex_sources_large/"
index = "index/openalex_sources_large/"
samples = "samples/openalex_sources_large/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/openalex_sources_large/samples.jsonl"
summary = "Cursor-paginate the OpenAlex sources index to a bounded record count, extract source-level numeric fields as table columns, and emit one raw little-endian numeric sample per field."
deterministic_notes = "Fixed endpoint, fixed page size, cursor pagination over default order, bounded target record count, atomic per-row field extraction (rows missing required scalar fields are dropped), and a generated sample index."

[[series]]
id = "openalex_source_works_count_u32"
semantic_meaning = "Native OpenAlex works_count for the source."
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Rows missing works_count are filtered."
conversion = "Native JSON integer stored as uint32."
numeric_kind = "uint"
bit_width = 32
endianness = "little"

[[series]]
id = "openalex_source_oa_works_count_u32"
semantic_meaning = "Native OpenAlex oa_works_count (open-access works) for the source."
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Rows missing oa_works_count are filtered."
conversion = "Native JSON integer stored as uint32."
numeric_kind = "uint"
bit_width = 32
endianness = "little"

[[series]]
id = "openalex_source_cited_by_count_u32"
