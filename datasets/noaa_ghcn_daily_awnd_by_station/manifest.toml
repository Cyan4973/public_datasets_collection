manifest_version = 1
dataset_id = "noaa_ghcn_daily_awnd_by_station"
name = "NOAA GHCN Daily AWND By Station"
description = "NOAA GHCN Daily by-station archives filtered to AWND observations for six fixed stations, 2010-2023."
homepage = "https://www.ncei.noaa.gov/products/land-based-station/global-historical-climatology-network-daily"

[license]
name = "U.S. Government Public Domain"
spdx = "LicenseRef-US-Government-Public-Domain"
url = "https://www.ncei.noaa.gov/pub/data/ghcn/daily/readme.txt"
citation = "NOAA National Centers for Environmental Information, Global Historical Climatology Network Daily."
notes = "NOAA GHCN Daily data are public U.S. government works. Preserve attribution and source provenance."

[safety]
contains_sensitive_data = false
contains_personal_data = false
provenance_notes = "Official NOAA NCEI GHCN Daily archive only."
usage_notes = "Public-domain climate observations suitable for reproducible numeric dataset collection."

[[origins]]
id = "noaa_ncei_ghcn_daily"
name = "NOAA NCEI GHCN Daily"
url = "https://www.ncei.noaa.gov/pub/data/ghcn/daily/"
type = "archive"
notes = "Public by-station daily climate archives and station metadata."

[[resources]]
id = "ghcn_daily_awnd_station_subset"
origin = "noaa_ncei_ghcn_daily"
url = "https://www.ncei.noaa.gov/pub/data/ghcn/daily/by_station/"
type = "archive_subset"
version = "2010-2023-six-stations-awnd"
access = "Fixed station-file downloads from by_station/ plus ghcnd-stations.txt metadata."
size_bytes = 0
sha256 = ""
local_path = "downloads/noaa_ghcn_daily_awnd_by_station/"
notes = "One gzip-compressed CSV per selected station plus ghcnd-stations.txt."

[local_paths]
downloads = "downloads/noaa_ghcn_daily_awnd_by_station/"
extracted = "extracted/noaa_ghcn_daily_awnd_by_station/"
filtered = "filtered/noaa_ghcn_daily_awnd_by_station/"
index = "index/noaa_ghcn_daily_awnd_by_station/"
samples = "samples/noaa_ghcn_daily_awnd_by_station/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/noaa_ghcn_daily_awnd_by_station/samples.jsonl"
summary = "Download selected NOAA GHCN Daily station archives, retain AWND rows, and emit raw numeric arrays plus a machine-readable sample index."
deterministic_notes = "Fixed station list, fixed element AWND, fixed year window 2010-2023, download-time gzip and metadata validation, retained only rows with blank quality flag and parseable bounded numeric values, preserved source row order within each station file, durable script logs under logs/noaa_ghcn_daily_awnd_by_station/, and generated sample index at index/noaa_ghcn_daily_awnd_by_station/samples.jsonl."

[[series]]
id = "ghcn_value_i16"
description = "Native GHCN AWND daily values."
semantic_meaning = "Signed 16-bit AWND values from retained GHCN rows, one sample per station."
source_resources = ["ghcn_daily_awnd_station_subset"]
filtered_input_path = "filtered/noaa_ghcn_daily_awnd_by_station/station_year_stats.tsv"
filtering = "Keep AWND rows from selected stations whose year is in 2010-2023, whose quality flag is blank, and whose value/date fields parse cleanly."
missing_value_policy = "Filter rows with non-blank quality flags, malformed dates, malformed numeric values, or out-of-range int16 values."
conversion = "Parse the GHCN value column as integer and write little-endian int16 arrays preserving row order within each station sample."
numeric_kind = "int"
bit_width = 16
endianness = "little"
sample_format = "raw homogeneous numeric array"
sample_count = 0
total_size_bytes = 0
output_path = "samples/noaa_ghcn_daily_awnd_by_station/ghcn_value_i16/"

[[series]]
id = "obs_year_u16"
description = "Observation year values aligned to retained AWND rows."
semantic_meaning = "Unsigned 16-bit years derived from retained GHCN row dates."
source_resources = ["ghcn_daily_awnd_station_subset"]
filtered_input_path = "filtered/noaa_ghcn_daily_awnd_by_station/station_year_stats.tsv"
filtering = "Keep rows accepted for ghcn_value_i16."
missing_value_policy = "Filter rows rejected by the ghcn_value_i16 series missing-value policy."
conversion = "Parse the date year component as integer and write little-endian uint16 arrays aligned to retained value rows."
numeric_kind = "uint"
bit_width = 16
endianness = "little"
sample_format = "raw homogeneous numeric array"
sample_count = 0
total_size_bytes = 0
output_path = "samples/noaa_ghcn_daily_awnd_by_station/obs_year_u16/"

[[series]]
