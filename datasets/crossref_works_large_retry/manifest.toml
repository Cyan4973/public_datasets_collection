manifest_version = 1
dataset_id = "crossref_works_large_retry"
name = "Crossref Works Large Retry"
description = "Pinned Crossref works sample with citation and timestamp fields."

[license]
name = "Crossref"
spdx = "CC0-1.0"
url = "https://api.crossref.org/"

[[resources]]
id = "crossref_works_json"
url = "https://api.crossref.org/works?rows=500&filter=from-pub-date:2024-01-01,until-pub-date:2024-12-31"
type = "api_response"
local_path = "downloads/crossref_works_large_retry/crossref_works_large_retry.json"

[local_paths]
downloads = "downloads/crossref_works_large_retry/"
filtered = "filtered/crossref_works_large_retry/"
index = "index/crossref_works_large_retry/"
samples = "samples/crossref_works_large_retry/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/crossref_works_large_retry/samples.jsonl"

[[series]]
id = "crossref_reference_count_u32"
representation_class = "native_numeric"
missing_value_policy = "Rows missing numeric fields are filtered."
numeric_kind = "uint"
bit_width = 32
endianness = "little"

[[series]]
id = "crossref_is_referenced_by_count_u32"
representation_class = "native_numeric"
missing_value_policy = "Rows missing numeric fields are filtered."
numeric_kind = "uint"
bit_width = 32
endianness = "little"

[[series]]
id = "crossref_created_timestamp_u64"
representation_class = "derived_operational_numeric"
missing_value_policy = "Rows missing timestamp fields are filtered."
numeric_kind = "uint"
bit_width = 64
endianness = "little"
