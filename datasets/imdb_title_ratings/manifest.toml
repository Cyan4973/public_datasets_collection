manifest_version = 1
dataset_id = "imdb_title_ratings"
name = "IMDb Title Ratings"
description = "IMDb title ratings dump with native vote and average rating fields."

[license]
name = "IMDb Non-Commercial Datasets"
spdx = "LicenseRef-IMDb-NonCommercial"
url = "https://developer.imdb.com/non-commercial-datasets/"

[[resources]]
id = "imdb_title_ratings_tsv_gz"
url = "https://datasets.imdbws.com/title.ratings.tsv.gz"
type = "archive_member"
local_path = "downloads/imdb_title_ratings/imdb_title_ratings.tsv.gz"

[local_paths]
downloads = "downloads/imdb_title_ratings/"
filtered = "filtered/imdb_title_ratings/"
index = "index/imdb_title_ratings/"
samples = "samples/imdb_title_ratings/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/imdb_title_ratings/samples.jsonl"

[[series]]
id = "imdb_average_rating_f32"
representation_class = "native_numeric"
missing_value_policy = "Rows missing rating fields are filtered."
numeric_kind = "float"
bit_width = 32
endianness = "little"

[[series]]
id = "imdb_num_votes_u32"
representation_class = "native_numeric"
missing_value_policy = "Rows missing rating fields are filtered."
numeric_kind = "uint"
bit_width = 32
endianness = "little"
