[local_paths]
downloads = "downloads/nasa_power_daily_precip_temperature/"
extracted = "extracted/nasa_power_daily_precip_temperature/"
filtered = "filtered/nasa_power_daily_precip_temperature/"
index = "index/nasa_power_daily_precip_temperature/"
samples = "samples/nasa_power_daily_precip_temperature/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/nasa_power_daily_precip_temperature/samples.jsonl"
summary = "Download selected NASA POWER daily point JSON files, retain parseable corrected precipitation values, and emit one homogeneous daily time-series sample per location."
deterministic_notes = "Fixed location list, fixed parameter list, fixed years 1981-2024, fixed API query parameters, download-time payload validation, skipped fill-value and malformed rows only, preserved day order within each location-year response, concatenated years in ascending order per location sample, durable logs under logs/nasa_power_daily_precip_temperature/, and generated sample index at index/nasa_power_daily_precip_temperature/samples.jsonl."

[[series]]
id = "nasa_power_precip_prectotcorr_f64"
