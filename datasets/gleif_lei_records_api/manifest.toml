manifest_version = 1
dataset_id = "gleif_lei_records_api"
name = "GLEIF LEI Records API"
description = "Pinned GLEIF LEI records page reduced to structural registration and entity counts."

[local_paths]
downloads = "downloads/gleif_lei_records_api/"
filtered = "filtered/gleif_lei_records_api/"
index = "index/gleif_lei_records_api/"
samples = "samples/gleif_lei_records_api/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/gleif_lei_records_api/samples.jsonl"

[[series]]
id = "gleif_creation_year_u16"
path = "samples/gleif_lei_records_api/gleif_creation_year_u16/records.bin"
numeric_kind = "uint"
bit_width = 16
endianness = "little"
sample_format = "raw_homogeneous_array"
missing_value_policy = "filtered_rows_with_invalid_required_dates"

[[series]]
id = "gleif_other_names_count_u16"
path = "samples/gleif_lei_records_api/gleif_other_names_count_u16/records.bin"
numeric_kind = "uint"
bit_width = 16
endianness = "little"
sample_format = "raw_homogeneous_array"
missing_value_policy = "filtered_rows_with_invalid_required_dates"

[[series]]
id = "gleif_address_line_count_u8"
path = "samples/gleif_lei_records_api/gleif_address_line_count_u8/records.bin"
numeric_kind = "uint"
bit_width = 8
endianness = "little"
sample_format = "raw_homogeneous_array"
missing_value_policy = "filtered_rows_with_invalid_required_dates"
