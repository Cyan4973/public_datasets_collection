manifest_version = 1
dataset_id = "ncbi_assembly_refseq_summary"
name = "NCBI Assembly RefSeq Summary"
description = "Pinned RefSeq assembly summary table with native genome-size and gene-count fields."

[local_paths]
downloads = "downloads/ncbi_assembly_refseq_summary/"
filtered = "filtered/ncbi_assembly_refseq_summary/"
index = "index/ncbi_assembly_refseq_summary/"
samples = "samples/ncbi_assembly_refseq_summary/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/ncbi_assembly_refseq_summary/samples.jsonl"

[[series]]
id = "ncbi_assembly_taxid"
description = "NCBI taxonomy identifier."
semantic_meaning = "NCBI taxonomy identifier."
role = "auxiliary"
representation_class = "native_numeric"
missing_value_policy = "Records missing or with an unparseable value for this field are skipped by the build; constant or empty samples are rejected."
conversion = "Extract this field from each source record in order and store as raw little-endian uint32."
numeric_kind = "uint"
bit_width = 32
endianness = "little"
sample_format = "raw homogeneous numeric array"
sample_count = 0
total_size_bytes = 0
output_path = "samples/ncbi_assembly_refseq_summary/ncbi_assembly_taxid/"

[[series]]
id = "ncbi_assembly_genome_size"
description = "Total genome size (base pairs)."
semantic_meaning = "Total genome size (base pairs)."
