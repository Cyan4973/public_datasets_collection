summary = "Download one fixed Localized Narratives ADE20K train JSONL annotation file, extract normalized mouse trace x/y/time streams plus per-record trace and caption counts, and emit homogeneous float32/uint32 streams."
deterministic_notes = "Build is local-only after download. It preserves annotation row order, accepts trace points only when coordinates are normalized finite values and time is nonnegative, writes one stream per numeric field, and enforces size/count floors and the 1 GB primary-output cap."

[[series]]
id = "localized_narratives_ade20k_trace_fields"
description = "Localized Narratives ADE20K mouse-trace and record-count fields."
semantic_meaning = "Human annotation mouse trajectory coordinates/times and per-record trace/caption summary counts."
role = "primary"
representation_class = "native_numeric"
representation_notes = "Trace coordinates and times are parsed from JSON numeric values and written as IEEE-754 little-endian float32; per-record counts are written as little-endian uint32."
source_resources = ["ade20k_train_localized_narratives_jsonl"]
filtered_input_path = "filtered/google_localized_narratives_ade20k_traces_f32/ingest_stats.json"
filtering = "Keep finite trace points with x/y in [0,1] and nonnegative time; preserve zero trace-count records in per-record count streams."
missing_value_policy = "Malformed JSON, missing source file, non-object records, non-finite trace values, out-of-range coordinates, and undersized trace totals are fatal. Records without trace points are represented with zero in the points-per-record stream."
conversion = "Parse JSONL annotations, extract trace-like x/y/time triples, and write homogeneous field streams in source order."
numeric_kind = "mixed"
bit_width = 32
endianness = "little"
sample_format = "raw homogeneous float32 and uint32 annotation streams"
sample_geometry = "human_annotation_trace_stream"
sample_rank = 1
sample_axes = ["annotation_point_or_record"]
natural_record_kind = "localized_narratives_ade20k_annotation_field"
sample_count = 0
