manifest_version = 1
dataset_id = "sec_submissions_largecap_bundle"
name = "SEC Submissions Large-Cap Bundle"
description = "Pinned SEC recent submissions metadata for 49 large-cap issuers, emitted as homogeneous filing-metadata arrays."
homepage = "https://www.sec.gov/edgar/sec-api-documentation"

[license]
name = "U.S. Government Work"
spdx = "LicenseRef-USGov"
url = "https://www.usa.gov/government-works"
citation = "U.S. Securities and Exchange Commission submissions JSON API."
notes = "SEC filings and submissions metadata are public. Respect SEC access policy and user-agent requirements."

[safety]
contains_sensitive_data = false
contains_personal_data = false
provenance_notes = "Official SEC submissions JSON only."
usage_notes = "Public corporate filing metadata suitable for numeric dataset collection."

[[origins]]
id = "sec_submissions"
name = "SEC Submissions API"
url = "https://data.sec.gov/submissions/"
type = "api"
notes = "Per-issuer JSON submissions API keyed by zero-padded CIK."

[[resources]]
id = "sec_largecap_submission_json"
origin = "sec_submissions"
url = "https://data.sec.gov/submissions/"
type = "api_query_result"
version = "49-largecap-issuer-subset"
access = "Fixed CIK list in issuers.tsv; one public submissions JSON payload per issuer."
size_bytes = 0
sha256 = ""
local_path = "downloads/sec_submissions_largecap_bundle/"
notes = "Download validation requires a JSON payload with filings.recent.accessionNumber."

[local_paths]
downloads = "downloads/sec_submissions_largecap_bundle/"
filtered = "filtered/sec_submissions_largecap_bundle/"
index = "index/sec_submissions_largecap_bundle/"
samples = "samples/sec_submissions_largecap_bundle/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/sec_submissions_largecap_bundle/samples.jsonl"
summary = "Download 49 pinned SEC submissions JSON payloads and emit homogeneous filing-metadata arrays."
deterministic_notes = "Fixed issuer list, fixed filings.recent columns, source row order, local form-code codebook, and one issuer-column array per natural sample."

[[series]]
id = "sec_submission_form_code"
description = "Categorical SEC filing form codes."
semantic_meaning = "Local stable integer code for the SEC form string in each issuer's filings.recent table."
role = "primary"
representation_class = "derived_operational_numeric"
representation_notes = "The source form field is categorical text; the recipe emits a deterministic codebook under filtered/sec_submissions_largecap_bundle/form_codebook.tsv."
source_resources = ["sec_largecap_submission_json"]
filtered_input_path = "filtered/sec_submissions_largecap_bundle/issuer_stats.tsv"
filtering = "Keep rows with parseable filing date, acceptance timestamp, form code, size, and XBRL flags."
missing_value_policy = "Rows with malformed required fields are skipped and counted in issuer_stats.tsv."
conversion = "Encode sorted distinct form strings as little-endian uint16 codes."
numeric_kind = "uint"
bit_width = 16
endianness = "little"
sample_format = "raw homogeneous numeric array"
sample_geometry = "sec_submission_recent_table_column_by_issuer"
sample_rank = 1
sample_axes = ["filing"]
sample_count = 49
total_size_bytes = 193294
output_path = "samples/sec_submissions_largecap_bundle/sec_submission_form_code/"

