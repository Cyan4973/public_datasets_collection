manifest_version = 1
dataset_id = "fashion_mnist_images_u8"
name = "Fashion-MNIST Images"
description = "Native 8-bit grayscale apparel image pixels from the full Fashion-MNIST train and test IDX files."
homepage = "https://github.com/zalandoresearch/fashion-mnist"

[license]
name = "MIT"
spdx = "MIT"
url = "https://github.com/zalandoresearch/fashion-mnist/blob/master/LICENSE"
citation = "Han Xiao, Kashif Rasul, and Roland Vollgraf. Fashion-MNIST: a Novel Image Dataset for Benchmarking Machine Learning Algorithms. arXiv:1708.07747."
notes = "Official Fashion-MNIST repository is MIT licensed."

[safety]
contains_sensitive_data = false
contains_personal_data = false
provenance_notes = "Official upstream repository files only; no mirrors, leaks, or scraped personal content."
usage_notes = "Public, permissively licensed image benchmark appropriate for reproducible numeric dataset collection."

[[origins]]
id = "official"
name = "Zalando Research Fashion-MNIST"
url = "https://github.com/zalandoresearch/fashion-mnist"
type = "repository"
notes = "Official dataset repository."

