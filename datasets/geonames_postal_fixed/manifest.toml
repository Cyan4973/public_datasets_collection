manifest_version = 1
dataset_id = "geonames_postal_fixed"
name = "GeoNames US Postal Codes"
description = "Pinned GeoNames US postal code archive with native postal, coordinate, and accuracy fields."

[local_paths]
downloads = "downloads/geonames_postal_fixed/"
filtered = "filtered/geonames_postal_fixed/"
index = "index/geonames_postal_fixed/"
samples = "samples/geonames_postal_fixed/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/geonames_postal_fixed/samples.jsonl"

[[series]]
id = "geonames_postal_code_u32"
description = "Numeric postal code."
semantic_meaning = "Numeric postal code."
role = "auxiliary"
representation_class = "native_numeric"
missing_value_policy = "Records missing or with an unparseable value for this field are skipped by the build; constant or empty samples are rejected."
conversion = "Extract this field from each source record in order and store as raw little-endian uint32."
numeric_kind = "uint"
bit_width = 32
endianness = "little"
sample_format = "raw homogeneous numeric array"
sample_count = 0
total_size_bytes = 0
output_path = "samples/geonames_postal_fixed/geonames_postal_code_u32/"

