manifest_version = 1
dataset_id = "google_robotics_bridge_tfrecord_u8"
name = "Google Robotics Bridge TFRecord UInt8"
description = "One bounded public Google Research Robotics BridgeData V2 TFRecord shard, preserved as one primary uint8 payload sample per TFRecord record with auxiliary framing streams."
homepage = "https://rail-berkeley.github.io/bridgedata/"

[license]
name = "Creative Commons Attribution 4.0 International"
spdx = "CC-BY-4.0"
url = "https://creativecommons.org/licenses/by/4.0/"
citation = "Walke, Homer, et al. BridgeData V2: A Dataset for Robot Learning at Scale. Conference on Robot Learning, 2023."
notes = "Preserve BridgeData V2 citation and attribution. The script also downloads TFDS metadata carrying the dataset citation and feature schema."

[safety]
contains_sensitive_data = false
contains_personal_data = false
provenance_notes = "Public robot-learning demonstration shard hosted in the Google Research Robotics TFDS/RLDS bucket."
usage_notes = "The payload contains serialized robot demonstrations, including camera observations and control/state fields. This recipe does not decode images or language strings."

[[origins]]
id = "google_research_robotics_bridge"
name = "Google Research Robotics Bridge TFDS"
url = "https://storage.googleapis.com/gresearch/robotics/bridge/0.1.0/"
type = "public_research_dataset"
notes = "Public TFDS/RLDS BridgeData V2 shard and metadata on Google Cloud Storage."

[[resources]]
id = "bridge_train_tfrecord_00000"
origin = "google_research_robotics_bridge"
url = "https://storage.googleapis.com/gresearch/robotics/bridge/0.1.0/bridge-train.tfrecord-00000-of-01024"
type = "tfrecord_shard"
version = "bridge/0.1.0"
access = "Download script fetches one fixed public training shard plus dataset_info.json and features.json metadata."
size_bytes = 435280257
sha256 = ""
local_path = "downloads/google_robotics_bridge_tfrecord_u8/bridge-train.tfrecord-00000-of-01024"
notes = "Single selected shard is about 435 MB and is capped below 500 MB by the download script."

[[resources]]
id = "bridge_tfds_metadata"
origin = "google_research_robotics_bridge"
url = "https://storage.googleapis.com/gresearch/robotics/bridge/0.1.0/"
type = "tfds_metadata_json"
version = "bridge/0.1.0"
access = "Download script fetches dataset_info.json and features.json."
size_bytes = 0
sha256 = ""
local_path = "downloads/google_robotics_bridge_tfrecord_u8/"
notes = "Metadata records the BridgeData V2 citation and the uint8/float32 feature schema."

[local_paths]
downloads = "downloads/google_robotics_bridge_tfrecord_u8/"
filtered = "filtered/google_robotics_bridge_tfrecord_u8/"
index = "index/google_robotics_bridge_tfrecord_u8/"
samples = "samples/google_robotics_bridge_tfrecord_u8/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/google_robotics_bridge_tfrecord_u8/samples.jsonl"
summary = "Download one fixed BridgeData V2 TFRecord shard, validate TFDS metadata and TFRecord framing, emit one uint8 sample per record payload, and emit record length and masked CRC streams as auxiliary metadata."
deterministic_notes = "Build is local-only after download. It preserves TFRecord record order, strips only the TFRecord length/CRC framing from each payload sample, writes frame metadata separately as auxiliary metadata, and enforces a 1 GB aggregate primary-output cap on the payload samples."

[[series]]
id = "bridge_train_00000_tfrecord_payload_u8"
description = "Per-record payload bytes from one BridgeData V2 TFRecord training shard."
semantic_meaning = "Serialized robot-learning demonstration records containing uint8 camera observations and float32 reward, state, action, and language-embedding tensors."
role = "primary"
representation_class = "container_payload_bytes"
representation_notes = "TFDS metadata describes typed source features; this series preserves serialized TFRecord payload bytes without TensorFlow or protobuf decoding."
source_resources = ["bridge_train_tfrecord_00000", "bridge_tfds_metadata"]
filtered_input_path = "filtered/google_robotics_bridge_tfrecord_u8/ingest_stats.json"
filtering = "Keep the fixed shard if TFRecord framing validates, at least 16 records are present, and aggregate payload bytes exceed 390 MB."
missing_value_policy = "Missing shard, missing metadata, malformed JSON metadata, truncated TFRecord framing, zero-length records, and undersized payloads are fatal."
conversion = "Remove TFRecord length and CRC fields and write each record payload as one uint8 sample in source order."
numeric_kind = "uint"
bit_width = 8
endianness = "little"
sample_format = "single TFRecord record payload bytes"
sample_geometry = "serialized_robotics_episode_records"
sample_rank = 1
sample_axes = ["byte"]
natural_record_kind = "bridge_tfrecord_record_payload"
sample_count = 0
total_size_bytes = 0
output_path = "samples/google_robotics_bridge_tfrecord_u8/bridge_tfrecord_payload_u8/"

[[series]]
id = "bridge_train_00000_tfrecord_record_lengths_u32"
description = "TFRecord payload length for each record in the selected BridgeData V2 shard."
semantic_meaning = "Per-record serialized demonstration payload byte lengths."
role = "auxiliary"
representation_class = "native_numeric"
representation_notes = "Lengths are native unsigned integer fields from the TFRecord container framing. They are auxiliary metadata for the payload samples, not an accepted standalone 32-bit robotics dataset."
source_resources = ["bridge_train_tfrecord_00000"]
filtered_input_path = "filtered/google_robotics_bridge_tfrecord_u8/ingest_stats.json"
filtering = "Preserve one length per accepted TFRecord record."
missing_value_policy = "Malformed or truncated TFRecord framing is fatal."
conversion = "Read little-endian uint64 TFRecord length fields and write range-checked little-endian uint32 values."
numeric_kind = "uint"
bit_width = 32
endianness = "little"
sample_format = "raw homogeneous uint32 TFRecord payload lengths"
sample_geometry = "record_metadata_vector"
sample_rank = 1
sample_axes = ["record"]
natural_record_kind = "bridge_tfrecord_record_lengths"
sample_count = 0
total_size_bytes = 0
output_path = "samples/google_robotics_bridge_tfrecord_u8/bridge_tfrecord_record_lengths_u32/"

[[series]]
id = "bridge_train_00000_tfrecord_masked_crc_u32"
description = "TFRecord masked CRC fields for each record length and payload."
semantic_meaning = "Per-record TFRecord framing checksum values: length CRC and data CRC."
role = "auxiliary"
representation_class = "native_numeric"
representation_notes = "The source stores both CRC fields as little-endian uint32 framing values. They are auxiliary metadata for integrity/framing, not an accepted standalone 32-bit robotics dataset."
source_resources = ["bridge_train_tfrecord_00000"]
filtered_input_path = "filtered/google_robotics_bridge_tfrecord_u8/ingest_stats.json"
filtering = "Preserve two masked CRC values per accepted TFRecord record."
missing_value_policy = "Malformed or truncated TFRecord framing is fatal."
conversion = "Read little-endian uint32 length/data masked CRC fields and write them unchanged."
numeric_kind = "uint"
bit_width = 32
endianness = "little"
sample_format = "raw homogeneous uint32 TFRecord masked CRC fields"
sample_geometry = "record_metadata_matrix"
sample_rank = 2
sample_axes = ["record", "crc_kind"]
natural_record_kind = "bridge_tfrecord_masked_crcs"
sample_count = 0
total_size_bytes = 0
output_path = "samples/google_robotics_bridge_tfrecord_u8/bridge_tfrecord_masked_crc_u32/"
