manifest_version = 1
dataset_id = "noaa_nexrad_level3_products_u8"
name = "NOAA NEXRAD Level-III Product Payloads"
description = "Bounded NOAA NEXRAD Level-III NIDS product files for one coherent product code, emitted as native uint8 product-message payload bytes."
homepage = "https://www.ncei.noaa.gov/products/radar/next-generation-weather-radar"

[license]
name = "NOAA public data"
spdx = "LicenseRef-NOAA-Public-Data"
url = "https://www.noaa.gov/nodd/datasets"
citation = "NOAA NEXRAD Level-III archive via NOAA/NCEI and Unidata public archives."
notes = "NOAA data are public U.S. government data; preserve NOAA/NCEI attribution."

[safety]
contains_sensitive_data = false
contains_personal_data = false
provenance_notes = "Public operational weather radar products only."
usage_notes = "Weather radar product data; no personal data expected."

[[origins]]
id = "unidata_nexrad_level3"
name = "Unidata NEXRAD Level-III archive"
url = "https://unidata-nexrad-level3.s3.amazonaws.com/"
type = "public_s3_bucket"
notes = "Public S3-compatible Level-III archive; exact URL/key list override is supported if listing is unavailable."

[[resources]]
id = "bounded_level3_products"
origin = "unidata_nexrad_level3"
url = "https://unidata-nexrad-level3.s3.amazonaws.com/"
type = "s3_prefix_or_exact_url_selection"
version = "station_date_product_at_user_download_time"
access = "Download script lists a bounded station/date/product prefix or reads exact URLs from NEXRAD_L3_URLS_FILE."
size_bytes = 0
sha256 = ""
local_path = "downloads/noaa_nexrad_level3_products_u8/"
notes = "Defaults target one product code only (N0Q) to keep material coherent; override NEXRAD_L3_PRODUCT_CODE if needed."

[local_paths]
downloads = "downloads/noaa_nexrad_level3_products_u8/"
extracted = "extracted/noaa_nexrad_level3_products_u8/"
filtered = "filtered/noaa_nexrad_level3_products_u8/"
index = "index/noaa_nexrad_level3_products_u8/"
samples = "samples/noaa_nexrad_level3_products_u8/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/noaa_nexrad_level3_products_u8/samples.jsonl"
summary = "Download a bounded set of one NEXRAD Level-III product code, strip optional text transport headers, and emit one raw uint8 NIDS product-message payload sample per file."
deterministic_notes = "Default discovery uses a fixed station/date/product and sorted object keys. If listing is unavailable, NEXRAD_L3_URLS_FILE or NEXRAD_L3_KEYS_FILE supplies exact inputs. Build is local-only, preserves product-message bytes after removing only leading WMO/AWIPS text headers when present, rejects mixed product codes, tiny files, constants, and over-cap output."

[[series]]
id = "nexrad_level3_nids_payload_u8"
description = "NEXRAD Level-III NIDS product-message payload bytes."
semantic_meaning = "Operational Level-III radar product payloads for one product code, one sample per product file."
role = "primary"
representation_class = "derived_operational_numeric"
representation_notes = "NIDS Level-III files are byte-addressed machine-facing radar product artifacts. The recipe preserves the product message bytes, removing only optional leading WMO/AWIPS transport text headers."
source_resources = ["bounded_level3_products"]
filtered_input_path = "filtered/noaa_nexrad_level3_products_u8/ingest_stats.json"
filtering = "Keep downloaded files whose metadata product code matches NEXRAD_L3_PRODUCT_CODE and whose payload is non-constant and at least NEXRAD_L3_MIN_SAMPLE_BYTES bytes."
missing_value_policy = "Missing files, malformed download plans, mismatched product codes, tiny payloads, empty payloads, or constant payloads are fatal or skipped as documented in build stats."
conversion = "Read each local Level-III product file as bytes, strip leading text transport header through the first CR/CR/LF or LF/LF delimiter if present, and write the remaining product-message bytes unchanged as uint8."
numeric_kind = "uint"
bit_width = 8
endianness = "little"
sample_format = "raw homogeneous uint8 byte array"
sample_count = 0
total_size_bytes = 0
output_path = "samples/noaa_nexrad_level3_products_u8/nexrad_level3_nids_payload_u8/"
