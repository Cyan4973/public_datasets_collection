manifest_version = 1
dataset_id = "noaa_tides_water_level"
name = "NOAA Tides Water Level"
description = "NOAA CO-OPS coastal water-level station time series, emitted as homogeneous physical water-level and sigma families."
homepage = "https://tidesandcurrents.noaa.gov/"

[license]
name = "U.S. Government Public Domain"
spdx = "LicenseRef-US-Government-Public-Domain"
