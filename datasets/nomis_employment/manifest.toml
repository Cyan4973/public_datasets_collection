manifest_version = 1
dataset_id = "nomis_employment"
name = "NOMIS Employment"
description = "Public NOMIS employment observations with numeric observation values and pinned code fields."

[license]
name = "Open Government Licence v3.0"
spdx = "OGL-UK-3.0"
url = "https://www.nationalarchives.gov.uk/doc/open-government-licence/version/3/"

[[resources]]
id = "nomis_json"
url = "https://www.nomisweb.co.uk/api/v01/dataset/NM_1_1.data.json?geography=2092957698&item=1&measures=20100"
type = "api_response"
local_path = "downloads/nomis_employment/nomis_employment.json"

[local_paths]
downloads = "downloads/nomis_employment/"
filtered = "filtered/nomis_employment/"
index = "index/nomis_employment/"
samples = "samples/nomis_employment/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/nomis_employment/samples.jsonl"

[[series]]
id = "nomis_obs_value"
representation_class = "native_numeric"
missing_value_policy = "Rows missing numeric fields are filtered for that series."
numeric_kind = "uint"
bit_width = 32
endianness = "little"

[[series]]
id = "nomis_geography"
representation_class = "derived_operational_numeric"
missing_value_policy = "Rows missing numeric fields are filtered for that series."
numeric_kind = "uint"
bit_width = 32
endianness = "little"

[[series]]
id = "nomis_sex"
representation_class = "derived_operational_numeric"
missing_value_policy = "Rows missing numeric fields are filtered for that series."
numeric_kind = "uint"
bit_width = 8
endianness = "little"

[[series]]
id = "nomis_item"
representation_class = "derived_operational_numeric"
missing_value_policy = "Rows missing numeric fields are filtered for that series."
numeric_kind = "uint"
bit_width = 8
endianness = "little"

[[series]]
id = "nomis_measure"
representation_class = "derived_operational_numeric"
missing_value_policy = "Rows missing numeric fields are filtered for that series."
numeric_kind = "uint"
bit_width = 32
endianness = "little"

[[series]]
id = "nomis_year"
representation_class = "native_numeric"
missing_value_policy = "Rows missing numeric fields are filtered for that series."
numeric_kind = "uint"
bit_width = 16
endianness = "little"

[[series]]
id = "nomis_month"
representation_class = "native_numeric"
missing_value_policy = "Rows missing numeric fields are filtered for that series."
numeric_kind = "uint"
bit_width = 8
endianness = "little"
