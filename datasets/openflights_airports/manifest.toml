manifest_version = 1
dataset_id = "openflights_airports"
name = "OpenFlights Airports"
description = "Pinned OpenFlights airports data with numeric coordinate and altitude fields."

[license]
name = "Open Database License"
spdx = "ODbL-1.0"
url = "https://openflights.org/data.html"

[[resources]]
id = "openflights_airports_dat"
url = "https://raw.githubusercontent.com/jpatokal/openflights/master/data/airports.dat"
type = "file"
local_path = "downloads/openflights_airports/openflights_airports.dat"

[local_paths]
downloads = "downloads/openflights_airports/"
filtered = "filtered/openflights_airports/"
index = "index/openflights_airports/"
samples = "samples/openflights_airports/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/openflights_airports/samples.jsonl"

[[series]]
id = "openflights_latitude"
representation_class = "native_numeric"
missing_value_policy = "Rows missing numeric fields are filtered."
numeric_kind = "float"
bit_width = 64
endianness = "little"

[[series]]
id = "openflights_longitude"
representation_class = "native_numeric"
missing_value_policy = "Rows missing numeric fields are filtered."
numeric_kind = "float"
bit_width = 64
endianness = "little"

[[series]]
id = "openflights_altitude"
representation_class = "native_numeric"
missing_value_policy = "Rows missing numeric fields are filtered."
numeric_kind = "int"
bit_width = 32
endianness = "little"

