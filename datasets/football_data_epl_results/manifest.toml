manifest_version = 1
dataset_id = "football_data_epl_results"
name = "Football Data EPL Results"
description = "Premier League match result and betting/statistics numeric fields from football-data.co.uk."

[license]
name = "LicenseRef-football-data-co-uk"
spdx = "LicenseRef-football-data-co-uk"
url = "https://www.football-data.co.uk/"

[[resources]]
id = "epl_csv"
url = "https://www.football-data.co.uk/mmz4281/2324/E0.csv"
type = "table_export"
local_path = "downloads/football_data_epl_results/football_data_epl_results.csv"

[local_paths]
downloads = "downloads/football_data_epl_results/"
filtered = "filtered/football_data_epl_results/"
index = "index/football_data_epl_results/"
samples = "samples/football_data_epl_results/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/football_data_epl_results/samples.jsonl"

[[series]]
id = "football_fthg"
representation_class = "native_numeric"
missing_value_policy = "Rows missing numeric fields are filtered for that series."
