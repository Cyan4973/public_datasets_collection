manifest_version = 1
dataset_id = "ecb_fx_eur_daily_matrix"
name = "ECB FX EUR Daily Matrix"
description = "ECB daily FX CSV extracts for 19 currencies against EUR, emitted as one yearly sample per currency pair."
homepage = "https://data.ecb.europa.eu/"

[license]
name = "ECB Data Access Terms"
spdx = "LicenseRef-ECB-Data"
url = "https://www.ecb.europa.eu/stats/ecb_statistics/data_access/html/index.en.html"
citation = "European Central Bank Data Portal exchange-rate series."
notes = "Confirm any downstream attribution requirements during review."

[safety]
contains_sensitive_data = false
contains_personal_data = false
provenance_notes = "Official ECB data API only."
usage_notes = "Public central-bank market data suitable for reproducible numeric dataset collection."

[[origins]]
id = "ecb_data_api"
name = "ECB Data API"
url = "https://data-api.ecb.europa.eu/service/data/"
type = "api"
notes = "Public API for ECB time-series data."

[[resources]]
id = "ecb_fx_eur_daily_matrix_2015_2024"
origin = "ecb_data_api"
url = "https://data-api.ecb.europa.eu/service/data/EXR/"
type = "api_query_result_set"
version = "EUR-matrix-2015-2024"
access = "Nineteen fixed CSV queries with pinned series keys, startPeriod, endPeriod, and format=csvdata."
size_bytes = 0
sha256 = ""
local_path = "downloads/ecb_fx_eur_daily_matrix/"
notes = "One CSV file per fixed daily exchange-rate series."

[local_paths]
downloads = "downloads/ecb_fx_eur_daily_matrix/"
extracted = "extracted/ecb_fx_eur_daily_matrix/"
filtered = "filtered/ecb_fx_eur_daily_matrix/"
index = "index/ecb_fx_eur_daily_matrix/"
samples = "samples/ecb_fx_eur_daily_matrix/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/ecb_fx_eur_daily_matrix/samples.jsonl"
summary = "Download a fixed ECB daily FX matrix, retain parseable observation rows, and emit one yearly sample per currency pair plus a machine-readable sample index."
deterministic_notes = "Fixed ECB series keys, fixed query parameters, download-time CSV validation, filtered blank and malformed rows only, sorted retained rows by date within each year, durable logs under logs/ecb_fx_eur_daily_matrix/, and generated sample index at index/ecb_fx_eur_daily_matrix/samples.jsonl."

[[series]]
id = "ecb_fx_aud_eur_value_f32"
description = "Daily ECB FX values for AUD/EUR."
semantic_meaning = "Float32 daily exchange-rate values for AUD/EUR, one sample per year."
source_resources = ["ecb_fx_eur_daily_matrix_2015_2024"]
filtering = "Keep rows with parseable TIME_PERIOD dates and parseable OBS_VALUE numbers."
missing_value_policy = "Filter rows with blank dates, blank values, malformed dates, or malformed numeric values."
conversion = "Parse retained values as float, sort by ascending date within each year, and write IEEE-754 little-endian float32 arrays."
numeric_kind = "float"
bit_width = 32
endianness = "little"
sample_format = "raw homogeneous numeric array"
sample_count = 0
total_size_bytes = 0
output_path = "samples/ecb_fx_eur_daily_matrix/ecb_fx_aud_eur_value_f32/"

