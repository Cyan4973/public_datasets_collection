manifest_version = 1
dataset_id = "silso_sunspot_activity_indices_f32"
name = "SILSO Sunspot Activity Indices Float32"
description = "Daily and monthly total sunspot-number activity index fields from the SILSO World Data Center."
homepage = "https://www.sidc.be/SILSO/"

[license]
name = "SILSO data terms"
spdx = "CC-BY-NC-4.0"
url = "https://www.sidc.be/SILSO/datafiles"
citation = "SILSO World Data Center. International Sunspot Number Monthly Bulletin and online catalogue."
notes = "Preserve SILSO and Royal Observatory of Belgium attribution."

[safety]
