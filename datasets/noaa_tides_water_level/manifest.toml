type = "api_response_pages"
version = "2023-2024-21-stations-monthly-json"
access = "Monthly JSON queries by station with product=water_level, datum=MSL, time_zone=gmt, units=metric, and format=json."
size_bytes = 0
sha256 = ""
local_path = "downloads/noaa_tides_water_level/"
notes = "One JSON response per station-month chunk."

[local_paths]
downloads = "downloads/noaa_tides_water_level/"
extracted = "extracted/noaa_tides_water_level/"
filtered = "filtered/noaa_tides_water_level/"
index = "index/noaa_tides_water_level/"
samples = "samples/noaa_tides_water_level/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/noaa_tides_water_level/samples.jsonl"
summary = "Download monthly NOAA CO-OPS water-level observations for selected stations, parse physical water level and sigma fields, reject short station samples, and emit one station time-series sample per physical field."
deterministic_notes = "Fixed default station list, fixed default date window, fixed monthly chunking, source row order preserved within chunks, chunks concatenated in plan order per station, rows with unparseable timestamps or non-finite physical fields skipped atomically, calendar-derived fields excluded, durable logs, generated chunk stats, ingest stats, and sample index."

[[series]]
id = "noaa_tides_level_f64"
description = "NOAA CO-OPS observed water level."
