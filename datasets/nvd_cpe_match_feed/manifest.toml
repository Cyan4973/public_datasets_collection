manifest_version = 1
dataset_id = "nvd_cpe_match_feed"
name = "NVD CPE Match Feed"
description = "NVD CPE Match Criteria API records, paginated into homogeneous numeric columns for match-string timestamps and attached CPE-name match counts."

[license]
name = "NVD data feeds terms"
spdx = "LicenseRef-NVD"
url = "https://nvd.nist.gov/vuln/Data-Feeds/JSON-feed-changelog"

[[resources]]
id = "nvd_cpe_match_api"
url = "https://services.nvd.nist.gov/rest/json/cpematch/2.0?resultsPerPage={resultsPerPage}&startIndex={startIndex}"
type = "api_response"
local_path = "downloads/nvd_cpe_match_feed/nvd_cpe_match_feed.json"

[local_paths]
downloads = "downloads/nvd_cpe_match_feed/"
filtered = "filtered/nvd_cpe_match_feed/"
index = "index/nvd_cpe_match_feed/"
samples = "samples/nvd_cpe_match_feed/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/nvd_cpe_match_feed/samples.jsonl"

[[series]]
id = "nvd_cpe_last_modified_at_u32"
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Rows lacking required parseable timestamps are filtered."
numeric_kind = "uint"
bit_width = 32
endianness = "little"
sample_geometry = "nvd_cpe_match_string_column"

[[series]]
id = "nvd_cpe_cpe_last_modified_at_u32"
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Rows lacking required parseable timestamps are filtered."
numeric_kind = "uint"
bit_width = 32
endianness = "little"
sample_geometry = "nvd_cpe_match_string_column"

[[series]]
id = "nvd_cpe_match_count_u16"
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Missing matches arrays are treated as zero attached matches; non-list matches fields are filtered."
numeric_kind = "uint"
bit_width = 16
endianness = "little"
sample_geometry = "nvd_cpe_match_string_column"
