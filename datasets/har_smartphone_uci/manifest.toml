manifest_version = 1
dataset_id = "har_smartphone_uci"
name = "UCI HAR Smartphone Inertial Signals"
description = "Train/test inertial signal matrices from the UCI HAR smartphone dataset."
homepage = "https://archive.ics.uci.edu/dataset/240/human+activity+recognition+using+smartphones"

[license]
name = "LicenseRef-UCI-HAR"
spdx = "LicenseRef-UCI-HAR"
url = "https://archive.ics.uci.edu/dataset/240/human+activity+recognition+using+smartphones"
citation = "Anguita et al. Human Activity Recognition Using Smartphones, UCI Machine Learning Repository."
notes = "Refer to the upstream dataset page for governing terms."

[safety]
contains_sensitive_data = false
contains_personal_data = false
provenance_notes = "Official upstream distribution only; no mirrors, leaks, or scraped personal content."
usage_notes = "Public source intended for reproducible numeric dataset collection."

[[origins]]
id = "official"
name = "UCI ML Repository"
url = "https://archive.ics.uci.edu/dataset/240/human+activity+recognition+using+smartphones"
type = "data_portal"
notes = "Official upstream dataset page."

[[resources]]
id = "main"
origin = "official"
url = "https://archive.ics.uci.edu/static/public/240/human+activity+recognition+using+smartphones.zip"
type = "archive"
version = "accessed_by_user"
access = "Direct public download."
size_bytes = 0
sha256 = ""
local_path = "downloads/har_smartphone_uci/har_smartphone.zip"
notes = "Archive containing train/test inertial signal text files."

[local_paths]
downloads = "downloads/har_smartphone_uci/"
extracted = "extracted/har_smartphone_uci/"
filtered = "filtered/har_smartphone_uci/"
index = "index/har_smartphone_uci/"
samples = "samples/har_smartphone_uci/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/har_smartphone_uci/samples.jsonl"
summary = "Download pinned upstream resources, build local raw numeric samples only from local files, and generate a machine-readable sample index."
deterministic_notes = "Build preserves source file order, does no network access, writes durable logs, and emits samples.jsonl under index/har_smartphone_uci/."

[[series]]
id = "har_total_acc_x"
description = "Total acceleration x-axis samples for train/test splits."
semantic_meaning = "Selected inertial signal matrix flattened row-major per split."
source_resources = ["main"]
filtered_input_path = "filtered/har_smartphone_uci/inventory.tsv"
filtering = "Keep all rows from the selected inertial signal text files."
missing_value_policy = "Malformed rows are fatal."
conversion = "Parse whitespace-delimited numeric matrices and write little-endian float64 samples for each split."
numeric_kind = "float"
bit_width = 64
endianness = "little"
sample_format = "raw homogeneous numeric array"
sample_count = 0
total_size_bytes = 0
output_path = "samples/har_smartphone_uci/har_total_acc_x/"

