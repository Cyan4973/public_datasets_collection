manifest_version = 1
dataset_id = "imf_unemployment_rate_annual"
name = "IMF Unemployment Rate Annual"
description = "IMF DataMapper annual unemployment rate values for a fixed eight-country subset."
homepage = "https://www.imf.org/external/datamapper/"

[license]
name = "IMF Copyright and Usage"
spdx = "LicenseRef-IMF"
url = "https://www.imf.org/en/About/Terms-and-Conditions"
citation = "International Monetary Fund, DataMapper."
notes = "Confirm downstream reuse terms during review."

[safety]
contains_sensitive_data = false
contains_personal_data = false
provenance_notes = "Official IMF DataMapper API only."
usage_notes = "Public macroeconomic annual series suitable for numeric dataset collection if licensing review remains acceptable."

[[origins]]
id = "imf_datamapper"
name = "IMF DataMapper API"
url = "https://www.imf.org/external/datamapper/api/v1/"
type = "api"
notes = "Public JSON endpoint used by IMF DataMapper."

[[resources]]
id = "imf_unemployment_rate_annual_country_subset"
origin = "imf_datamapper"
url = "https://www.imf.org/external/datamapper/api/v1/LUR/"
type = "api_query_result"
version = "eight-country-subset"
access = "One fixed DataMapper JSON fetch per country."
size_bytes = 0
sha256 = ""
local_path = "downloads/imf_unemployment_rate_annual/"
notes = "One JSON file per selected country."

[local_paths]
downloads = "downloads/imf_unemployment_rate_annual/"
extracted = "extracted/imf_unemployment_rate_annual/"
filtered = "filtered/imf_unemployment_rate_annual/"
index = "index/imf_unemployment_rate_annual/"
samples = "samples/imf_unemployment_rate_annual/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/imf_unemployment_rate_annual/samples.jsonl"
summary = "Download fixed IMF DataMapper JSON payloads, retain annual unemployment rate values, and emit one numeric sample per country plus a machine-readable sample index."
deterministic_notes = "Fixed country subset, fixed indicator id, download-time JSON validation, filtered blank and malformed rows only, selected the largest matching year map within each payload, durable logs under logs/imf_unemployment_rate_annual/, and generated sample index at index/imf_unemployment_rate_annual/samples.jsonl."

[[series]]
id = "unemployment_rate_f32"
description = "Annual unemployment rate values."
semantic_meaning = "Float32 annual IMF LUR values, one sample per country."
source_resources = ["imf_unemployment_rate_annual_country_subset"]
filtered_input_path = "filtered/imf_unemployment_rate_annual/country_stats.tsv"
filtering = "Keep year-to-value entries with parseable years and numeric values."
missing_value_policy = "Filter blank values, malformed numeric values, malformed years, and out-of-range years."
conversion = "Parse retained values as float32 and write IEEE-754 little-endian arrays ordered by ascending year."
numeric_kind = "float"
bit_width = 32
endianness = "little"
sample_format = "raw homogeneous numeric array"
sample_count = 0
total_size_bytes = 0
output_path = "samples/imf_unemployment_rate_annual/unemployment_rate_f32/"

[[series]]
id = "obs_year_u16"
description = "Observation years aligned to annual unemployment rate values."
semantic_meaning = "Unsigned 16-bit years aligned 1:1 with retained IMF LUR values."
source_resources = ["imf_unemployment_rate_annual_country_subset"]
filtered_input_path = "filtered/imf_unemployment_rate_annual/country_stats.tsv"
filtering = "Keep rows accepted for unemployment_rate_f32."
missing_value_policy = "Filter rows rejected by the unemployment_rate_f32 missing-value policy."
conversion = "Write little-endian uint16 arrays aligned 1:1 with retained IMF values."
numeric_kind = "uint"
bit_width = 16
endianness = "little"
sample_format = "raw homogeneous numeric array"
sample_count = 0
total_size_bytes = 0
output_path = "samples/imf_unemployment_rate_annual/obs_year_u16/"
