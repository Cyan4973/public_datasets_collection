sha256 = ""
local_path = "downloads/silso_sunspot_activity_indices_f32/SN_d_tot_V2.0.csv"
notes = "Daily total sunspot number, standard deviation, observation count, and metadata columns."

[[resources]]
id = "monthly_total"
origin = "silso_world_data_center"
url = "https://www.sidc.be/SILSO/DATA/SN_m_tot_V2.0.csv"
type = "semicolon_csv"
version = "SILSO version 2.0 monthly total sunspot number"
access = "Download script fetches the fixed SILSO CSV URL and validates row count and schema."
size_bytes = 0
sha256 = ""
local_path = "downloads/silso_sunspot_activity_indices_f32/SN_m_tot_V2.0.csv"
notes = "Monthly mean total sunspot number, standard deviation, observation count, and metadata columns."

[local_paths]
downloads = "downloads/silso_sunspot_activity_indices_f32/"
filtered = "filtered/silso_sunspot_activity_indices_f32/"
index = "index/silso_sunspot_activity_indices_f32/"
samples = "samples/silso_sunspot_activity_indices_f32/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/silso_sunspot_activity_indices_f32/samples.jsonl"
summary = "Download SILSO daily and monthly total sunspot-number CSV files, parse selected nonnegative index fields, and emit one float32 time-series sample per cadence-field pair."
deterministic_notes = "Build is local-only after download. It preserves source row order, skips negative missing-value sentinels, emits six non-constant float32 time series, and enforces acceptance floors plus the 1 GB primary-output cap."

[[series]]
id = "silso_*_f32"
description = "SILSO daily and monthly sunspot activity index fields."
semantic_meaning = "Solar activity index values derived from sunspot observations: total or mean sunspot number, uncertainty/standard-deviation fields, and contributing observation counts."
role = "primary"
representation_class = "native_numeric"
representation_notes = "The source CSV stores decimal numeric index fields; the build writes IEEE-754 little-endian float32 arrays and excludes calendar columns and status flags."
source_resources = ["daily_total", "monthly_total"]
filtered_input_path = "filtered/silso_sunspot_activity_indices_f32/ingest_stats.json"
filtering = "Keep selected nonnegative, finite, non-constant daily/monthly activity fields with at least 1000 values."
missing_value_policy = "Negative SILSO missing-value sentinels and malformed rows are skipped per field."
conversion = "Parse retained CSV values as Python float, round to float32, and write little-endian float32 values preserving source row order."
numeric_kind = "float"
bit_width = 32
endianness = "little"
sample_format = "raw homogeneous float32 SILSO sunspot activity field"
sample_geometry = "time_series"
sample_rank = 1
sample_axes = ["day_or_month"]
natural_record_kind = "silso_sunspot_activity_index_field"
sample_count = 0
total_size_bytes = 0
output_path = "samples/silso_sunspot_activity_indices_f32/"
