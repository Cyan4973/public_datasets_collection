manifest_version = 1
dataset_id = "usgs_nwis_streamflow_daily"
name = "USGS NWIS Daily Streamflow"
description = "USGS NWIS daily streamflow JSON extracts for 32 geographically diverse stream sites, 2021-2023."
homepage = "https://waterservices.usgs.gov/"

[license]
name = "U.S. Government Public Domain"
spdx = "LicenseRef-US-Government-Public-Domain"
url = "https://waterservices.usgs.gov/"
citation = "USGS Water Services, NWIS daily values service."
notes = "USGS streamflow data are public U.S. government works. Preserve attribution and source provenance."

[safety]
contains_sensitive_data = false
contains_personal_data = false
provenance_notes = "Official USGS NWIS daily values API only; no mirrors, leaks, or scraped personal content."
usage_notes = "Public-domain hydrology observations suitable for reproducible numeric dataset collection."

[[origins]]
id = "usgs_nwis_dv_api"
name = "USGS NWIS Daily Values Service"
url = "https://waterservices.usgs.gov/nwis/dv/"
type = "api"
notes = "Public JSON service for historical daily observations by site and parameter code."

[[resources]]
id = "usgs_streamflow_2021_2023"
origin = "usgs_nwis_dv_api"
url = "https://waterservices.usgs.gov/nwis/dv/"
type = "api_query_result"
version = "2021-2023-32-sites-00060-json"
access = "Site-year JSON queries with fixed sites, parameterCd=00060, startDT, endDT, format=json, and siteStatus=all."
size_bytes = 0
sha256 = ""
local_path = "downloads/usgs_nwis_streamflow_daily/"
notes = "One JSON file per site per year for the 32-site geographically diverse subset."

[local_paths]
downloads = "downloads/usgs_nwis_streamflow_daily/"
extracted = "extracted/usgs_nwis_streamflow_daily/"
filtered = "filtered/usgs_nwis_streamflow_daily/"
index = "index/usgs_nwis_streamflow_daily/"
samples = "samples/usgs_nwis_streamflow_daily/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/usgs_nwis_streamflow_daily/samples.jsonl"
summary = "Download site-year USGS daily streamflow JSON files, select the mean daily statistic for parameter 00060 when multiple statistics are present, derive aligned date component arrays, and emit raw numeric arrays plus a machine-readable sample index."
deterministic_notes = "Fixed 32-site list, fixed years 2021-2023, fixed parameterCd=00060, fixed API query parameters, explicit selection of statistic code 00003 when multiple daily statistics are present, preserved source observation order within each site-year file, concatenated years in ascending order per site, durable script logs under logs/usgs_nwis_streamflow_daily/, and generated sample index at index/usgs_nwis_streamflow_daily/samples.jsonl."

[[series]]
id = "usgs_discharge_cfs_f64"
description = "Daily mean discharge values."
semantic_meaning = "Float64 mean daily discharge in cubic feet per second from USGS parameter code 00060, one sample per site."
source_resources = ["usgs_streamflow_2021_2023"]
filtered_input_path = "filtered/usgs_nwis_streamflow_daily/site_year_stats.tsv"
filtering = "Keep rows with parseable discharge values and parseable observation dates."
conversion = "Parse the USGS value field as Python float and write IEEE-754 little-endian float64 arrays preserving source order after site-year concatenation."
numeric_kind = "float"
bit_width = 64
endianness = "little"
sample_format = "raw homogeneous numeric array"
sample_count = 32
total_size_bytes = 0
output_path = "samples/usgs_nwis_streamflow_daily/usgs_discharge_cfs_f64/"

[[series]]
id = "obs_year_u16"
description = "Observation year values aligned to discharge."
semantic_meaning = "Unsigned 16-bit observation years derived from retained USGS mean daily discharge row dates, one sample per site."
