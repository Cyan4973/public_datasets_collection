conversion = "Native JSON integer stored as uint32."
numeric_kind = "uint"
bit_width = 32
endianness = "little"

[[series]]
id = "openalex_source_2yr_mean_citedness_f32"
semantic_meaning = "Native summary_stats.2yr_mean_citedness impact factor for the source."
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Missing metric defaults to 0.0."
conversion = "Native JSON number stored as float32."
numeric_kind = "float"
bit_width = 32
endianness = "little"

[[series]]
