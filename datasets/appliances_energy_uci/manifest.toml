manifest_version = 1
dataset_id = "appliances_energy_uci"
name = "UCI Appliances Energy Prediction"
description = "Residential energy and sensor time-series from energydata_complete.csv."
homepage = "https://archive.ics.uci.edu/dataset/374/appliances+energy+prediction"

[license]
name = "CC BY 4.0"
spdx = "CC-BY-4.0"
url = "https://creativecommons.org/licenses/by/4.0/"
citation = "Appliances Energy Prediction, UCI Machine Learning Repository."
notes = "UCI metadata indicates CC BY 4.0."

[safety]
contains_sensitive_data = false
contains_personal_data = false
provenance_notes = "Official upstream distribution only; no mirrors, leaks, or scraped personal content."
usage_notes = "Public source intended for reproducible numeric dataset collection."

[[origins]]
id = "official"
name = "UCI ML Repository"
url = "https://archive.ics.uci.edu/dataset/374/appliances+energy+prediction"
type = "data_portal"
notes = "Official upstream dataset page."

[[resources]]
id = "main"
origin = "official"
url = "https://archive.ics.uci.edu/static/public/374/appliances+energy+prediction.zip"
type = "archive"
version = "accessed_by_user"
access = "Direct public download."
size_bytes = 0
sha256 = ""
local_path = "downloads/appliances_energy_uci/appliances_energy_prediction.zip"
notes = "Archive containing energydata_complete.csv."

[local_paths]
downloads = "downloads/appliances_energy_uci/"
extracted = "extracted/appliances_energy_uci/"
filtered = "filtered/appliances_energy_uci/"
index = "index/appliances_energy_uci/"
samples = "samples/appliances_energy_uci/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/appliances_energy_uci/samples.jsonl"
summary = "Download pinned upstream resources, build local raw numeric samples only from local files, and generate a machine-readable sample index."
deterministic_notes = "Build preserves CSV row order, does no network access, writes durable logs, and emits samples.jsonl under index/appliances_energy_uci/."

