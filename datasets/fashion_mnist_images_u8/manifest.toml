[local_paths]
downloads = "downloads/fashion_mnist_images_u8/"
extracted = "extracted/fashion_mnist_images_u8/"
filtered = "filtered/fashion_mnist_images_u8/"
index = "index/fashion_mnist_images_u8/"
samples = "samples/fashion_mnist_images_u8/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/fashion_mnist_images_u8/samples.jsonl"
summary = "Validate local IDX gzip files, emit train/test image pixels as raw uint8 arrays, and write labels as auxiliary alignment arrays."
deterministic_notes = "Build is local-only, preserves upstream train/test order, validates IDX magic/count/shape, range-checks labels to 0..9, and writes a samples.jsonl index."

[[series]]
id = "fashion_mnist_images"
description = "Fashion-MNIST grayscale image pixels."
semantic_meaning = "Native 28x28 grayscale apparel image intensity values, row-major within each upstream split."
role = "primary"
representation_class = "native_numeric"
representation_notes = "IDX image payload stores native unsigned 8-bit pixel intensities."
source_resources = ["train_images", "test_images"]
filtered_input_path = "filtered/fashion_mnist_images_u8/ingest_stats.json"
filtering = "Keep all images from the official train and test image files."
missing_value_policy = "IDX payload has no missing marker; malformed headers, truncated payloads, or wrong counts are fatal."
conversion = "Strip IDX/gzip containers and copy pixel bytes unchanged into raw .bin samples."
numeric_kind = "uint"
bit_width = 8
endianness = "little"
sample_format = "raw homogeneous numeric array"
sample_count = 0
total_size_bytes = 0
output_path = "samples/fashion_mnist_images_u8/fashion_mnist_images/"

[[series]]
id = "fashion_mnist_labels"
description = "Fashion-MNIST class labels."
semantic_meaning = "Native class labels aligned to the image samples."
role = "auxiliary"
representation_class = "native_numeric"
representation_notes = "IDX label payload stores native unsigned 8-bit class IDs."
source_resources = ["train_labels", "test_labels"]
filtered_input_path = "filtered/fashion_mnist_images_u8/ingest_stats.json"
filtering = "Keep all labels from the official train and test label files."
missing_value_policy = "Malformed headers, truncated payloads, count mismatches, or labels outside 0..9 are fatal."
conversion = "Strip IDX/gzip containers and copy label bytes unchanged into raw .bin samples."
numeric_kind = "uint"
bit_width = 8
endianness = "little"
sample_format = "raw homogeneous numeric array"
sample_count = 0
total_size_bytes = 0
output_path = "samples/fashion_mnist_images_u8/fashion_mnist_labels/"
