filtered_input_path = "filtered/physionet_mitbih_annotation_codes_u8/ingest_stats.json"
filtering = "Keep records with at least MITBIH_ANN_MIN_VALUES emitted type codes and nonconstant code sequences."
missing_value_policy = "Missing RECORDS, malformed .atr files, unsupported annotation control records, tiny records, and constant records are rejected or skipped and recorded in build stats."
conversion = "Parse each WFDB .atr annotation word, preserve official annotation type codes 1..49 as uint8 values, and write one raw sample per record."
numeric_kind = "uint"
bit_width = 8
endianness = "little"
sample_format = "raw homogeneous uint8 annotation-code sequence"
sample_geometry = "1d_event_code_sequence"
sample_rank = 1
sample_axes = ["annotation_order"]
sample_count = 0
total_size_bytes = 0
