manifest_version = 1
dataset_id = "geoboundaries_all_adm0"
name = "GeoBoundaries ADM0"
description = "Pinned GeoBoundaries ADM0 metadata with geometry summary statistics."

[license]
name = "GeoBoundaries"
spdx = "LicenseRef-GeoBoundaries"
url = "https://www.geoboundaries.org/"

[[resources]]
id = "geoboundaries_adm0_json"
url = "https://www.geoboundaries.org/api/current/gbOpen/ALL/ADM0/"
type = "api_response"
local_path = "downloads/geoboundaries_all_adm0/geoboundaries_all_adm0.json"

[local_paths]
downloads = "downloads/geoboundaries_all_adm0/"
filtered = "filtered/geoboundaries_all_adm0/"
index = "index/geoboundaries_all_adm0/"
samples = "samples/geoboundaries_all_adm0/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/geoboundaries_all_adm0/samples.jsonl"

[[series]]
id = "geoboundaries_boundary_year"
representation_class = "native_numeric"
missing_value_policy = "Rows missing numeric fields are filtered."
numeric_kind = "uint"
bit_width = 16
endianness = "little"

[[series]]
id = "geoboundaries_adm_unit_count"
representation_class = "native_numeric"
missing_value_policy = "Rows missing numeric fields are filtered."
numeric_kind = "uint"
bit_width = 16
endianness = "little"

[[series]]
id = "geoboundaries_mean_vertices"
representation_class = "native_numeric"
missing_value_policy = "Rows missing numeric fields are filtered."
numeric_kind = "float"
bit_width = 32
endianness = "little"

[[series]]
id = "geoboundaries_mean_perimeter_km"
representation_class = "native_numeric"
missing_value_policy = "Rows missing numeric fields are filtered."
numeric_kind = "float"
bit_width = 32
endianness = "little"

[[series]]
id = "geoboundaries_mean_area_sqkm"
representation_class = "native_numeric"
missing_value_policy = "Rows missing numeric fields are filtered."
numeric_kind = "float"
bit_width = 32
endianness = "little"
