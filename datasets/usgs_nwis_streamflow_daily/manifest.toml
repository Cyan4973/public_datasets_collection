filtering = "Keep rows with parseable discharge values and parseable observation dates."
conversion = "Parse the observation date year component as integer and write little-endian uint16 arrays aligned 1:1 with retained discharge values."
numeric_kind = "uint"
bit_width = 16
endianness = "little"
sample_format = "raw homogeneous numeric array"
sample_count = 32
total_size_bytes = 0
output_path = "samples/usgs_nwis_streamflow_daily/obs_year_u16/"

