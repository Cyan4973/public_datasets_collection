manifest_version = 1
dataset_id = "uci_letter_recognition_u8"
name = "UCI Letter Recognition Features"
description = "Native 8-bit integer OCR feature vectors from the UCI Letter Recognition dataset."
homepage = "https://archive.ics.uci.edu/dataset/59/letter+recognition"

[license]
name = "Creative Commons Attribution 4.0 International"
spdx = "CC-BY-4.0"
url = "https://creativecommons.org/licenses/by/4.0/"
citation = "Frey, P. W. and Slate, D. J. Letter Recognition Using Holland-style Adaptive Classifiers. Machine Learning, 1991."
notes = "UCI metadata indicates CC BY 4.0."

[safety]
contains_sensitive_data = false
contains_personal_data = false
provenance_notes = "Official UCI archive only; no mirrors, leaks, or scraped personal content."
usage_notes = "Public OCR benchmark appropriate for reproducible numeric dataset collection."

[[origins]]
id = "official"
name = "UCI Machine Learning Repository"
url = "https://archive.ics.uci.edu/dataset/59/letter+recognition"
type = "data_portal"
notes = "Official upstream dataset page."

[[resources]]
id = "main_archive"
origin = "official"
url = "https://archive.ics.uci.edu/static/public/59/letter+recognition.zip"
type = "archive"
version = "accessed_by_user"
access = "Direct public download."
size_bytes = 0
sha256 = ""
local_path = "downloads/uci_letter_recognition_u8/letter-recognition.zip"
notes = "Archive containing letter-recognition.data."

[local_paths]
downloads = "downloads/uci_letter_recognition_u8/"
extracted = "extracted/uci_letter_recognition_u8/"
filtered = "filtered/uci_letter_recognition_u8/"
index = "index/uci_letter_recognition_u8/"
samples = "samples/uci_letter_recognition_u8/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/uci_letter_recognition_u8/samples.jsonl"
summary = "Validate the local UCI archive, parse the OCR feature table, emit the 16 native integer features as one row-major uint8 sample, and write labels as an auxiliary ASCII-byte array."
deterministic_notes = "Build is local-only, preserves upstream row order, range-checks the 16 feature columns to 0..15, validates labels A..Z, rejects malformed rows, and writes a samples.jsonl index."

[[series]]
id = "letter_ocr_features"
description = "Letter Recognition OCR feature vectors."
semantic_meaning = "Sixteen upstream integer OCR attributes per letter image, row-major in source order."
role = "primary"
representation_class = "native_numeric"
representation_notes = "The source table stores bounded integer feature values; values are copied as unsigned 8-bit integers without remapping."
source_resources = ["main_archive"]
filtered_input_path = "filtered/uci_letter_recognition_u8/ingest_stats.json"
filtering = "Keep all 20,000 records and all 16 numeric feature columns from letter-recognition.data."
missing_value_policy = "No missing marker is documented; blank, malformed, non-integer, or out-of-range feature values are fatal."
conversion = "Parse decimal feature values, range-check to 0..15, and write one row-major raw uint8 sample."
numeric_kind = "uint"
bit_width = 8
endianness = "little"
sample_format = "raw homogeneous numeric array"
sample_count = 0
total_size_bytes = 0
output_path = "samples/uci_letter_recognition_u8/letter_ocr_features/"

[[series]]
id = "letter_labels_ascii"
description = "Letter class labels."
semantic_meaning = "ASCII byte for the source class label A through Z, aligned one byte per source row."
role = "auxiliary"
representation_class = "native_numeric"
representation_notes = "The source label is a single ASCII character; the emitted byte is the original character code, not a local class remap."
source_resources = ["main_archive"]
filtered_input_path = "filtered/uci_letter_recognition_u8/ingest_stats.json"
filtering = "Keep one label byte per retained source row."
missing_value_policy = "Blank, malformed, or non-uppercase A..Z labels are fatal."
conversion = "Write the source ASCII label byte unchanged."
numeric_kind = "uint"
bit_width = 8
endianness = "little"
sample_format = "raw homogeneous numeric array"
sample_count = 0
total_size_bytes = 0
output_path = "samples/uci_letter_recognition_u8/letter_labels_ascii/"
