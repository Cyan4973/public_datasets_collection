missing_value_policy = "Records missing or with an unparseable value for this field are skipped by the build; constant or empty samples are rejected."
conversion = "Extract this field from each source record in order and store as raw little-endian int16."
numeric_kind = "int"
bit_width = 16
endianness = "little"
sample_format = "raw homogeneous numeric array"
sample_count = 0
total_size_bytes = 0
output_path = "samples/mitbih_arrhythmia_physionet/mitbih_mlii_1d_var/"

