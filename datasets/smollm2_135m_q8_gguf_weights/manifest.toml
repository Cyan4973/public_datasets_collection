sample_index_path = "index/smollm2_135m_q8_gguf_weights/samples.jsonl"
summary = "Parse a SmolLM2-135M Q8_0 GGUF and emit one sample per Q8_0 weight tensor, grouped into families by layer role (attention, MLP, embedding)."
deterministic_notes = "Only ggml type Q8_0 tensors are used (F32 norms skipped). Tensor name -> role: 'attn' -> gguf_q8_attn, 'ffn'/'mlp' -> gguf_q8_mlp, token/output embedding -> gguf_q8_embed. Each block's two-byte fp16 scale is dropped; the 32 signed int8 quantized values are kept. A family is emitted only if it has tensors with >= GGUF_MIN_RECORDS non-constant values. Each family is one layer role; roles are never mixed. Mirrors the downstream llama_q8_{attn,embed,mlp} families."

[[series]]
id = "gguf_q8_attn"
semantic_meaning = "Int8 quantized attention weight values (q/k/v/output projections), one sample per weight tensor."
