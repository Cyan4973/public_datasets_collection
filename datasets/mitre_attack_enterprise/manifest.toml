manifest_version = 1
dataset_id = "mitre_attack_enterprise"
name = "MITRE ATT&CK Enterprise"
description = "Pinned MITRE ATT&CK Enterprise bundle reduced to attack-pattern structural numeric series."

[local_paths]
downloads = "downloads/mitre_attack_enterprise/"
filtered = "filtered/mitre_attack_enterprise/"
index = "index/mitre_attack_enterprise/"
samples = "samples/mitre_attack_enterprise/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/mitre_attack_enterprise/samples.jsonl"

[[series]]
id = "mitre_attack_name_length_u16"
path = "samples/mitre_attack_enterprise/mitre_attack_name_length_u16/attack_patterns.bin"
numeric_kind = "uint"
bit_width = 16
endianness = "little"
sample_format = "raw_homogeneous_array"
missing_value_policy = "filtered_non_attack_pattern_objects"

[[series]]
id = "mitre_attack_platform_count_u8"
path = "samples/mitre_attack_enterprise/mitre_attack_platform_count_u8/attack_patterns.bin"
numeric_kind = "uint"
bit_width = 8
endianness = "little"
sample_format = "raw_homogeneous_array"
missing_value_policy = "filtered_non_attack_pattern_objects"

[[series]]
id = "mitre_attack_kill_chain_count_u8"
path = "samples/mitre_attack_enterprise/mitre_attack_kill_chain_count_u8/attack_patterns.bin"
numeric_kind = "uint"
bit_width = 8
endianness = "little"
sample_format = "raw_homogeneous_array"
missing_value_policy = "filtered_non_attack_pattern_objects"

[[series]]
id = "mitre_attack_is_subtechnique_u8"
path = "samples/mitre_attack_enterprise/mitre_attack_is_subtechnique_u8/attack_patterns.bin"
numeric_kind = "uint"
bit_width = 8
endianness = "little"
sample_format = "raw_homogeneous_array"
missing_value_policy = "filtered_non_attack_pattern_objects"

[[series]]
id = "mitre_attack_revoked_u8"
path = "samples/mitre_attack_enterprise/mitre_attack_revoked_u8/attack_patterns.bin"
numeric_kind = "uint"
bit_width = 8
endianness = "little"
sample_format = "raw_homogeneous_array"
