deterministic_notes = "Build is local-only after download. The download plan is deterministic: fixed source COG URLs, fixed header range size, and fixed interior tile-index positions per source. Full source rasters can exceed the repository output cap, so the natural sample boundary is one official TIFF internal tile/chunk. Edge tiles are avoided. Values are preserved as ESA WorldCover uint8 class codes."

