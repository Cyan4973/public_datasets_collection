manifest_version = 1
dataset_id = "internetarchive_advancedsearch"
name = "Internet Archive Advanced Search"
description = "Numeric metadata streams from a fixed 500-row Internet Archive text search result."
homepage = "https://archive.org/advancedsearch.php"

[license]
name = "Internet Archive Terms"
spdx = "NOASSERTION"
url = "https://archive.org/advancedsearch.php"
citation = "https://archive.org/advancedsearch.php"
notes = "Use the upstream provider terms."

[safety]
contains_sensitive_data = false
contains_personal_data = false
provenance_notes = "Public dataset acquired from the official endpoint."
usage_notes = "Staged recipe; promote only after a fresh successful user-run download."

[[origins]]
id = "official"
name = "Internet Archive Advanced Search"
url = "https://archive.org/advancedsearch.php"
type = "api"
notes = "Official public endpoint."

[[resources]]
id = "search_result"
origin = "official"
url = "https://archive.org/advancedsearch.php?q=mediatype:texts&fl[]=downloads&fl[]=item_size&fl[]=week&rows=500&page=1&output=json"
type = "api_query_result"
version = "2026-06-10"
access = "Direct public HTTP request."
size_bytes = 0
sha256 = ""
local_path = "downloads/internetarchive_advancedsearch/internetarchive_advancedsearch.json"
notes = "Pinned query parameters from the scout batch."

[local_paths]
downloads = "downloads/internetarchive_advancedsearch/"
extracted = "extracted/internetarchive_advancedsearch/"
filtered = "filtered/internetarchive_advancedsearch/"
index = "index/internetarchive_advancedsearch/"
samples = "samples/internetarchive_advancedsearch/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/internetarchive_advancedsearch/samples.jsonl"
summary = "Download the pinned public JSON payload, validate its top-level structure, extract numeric fields, and emit raw little-endian numeric samples."
deterministic_notes = "Fixed endpoint, fixed query parameters, fixed field extraction, and source-order row retention."

[[series]]
id = "ia_downloads"
description = "Per-document download counts."
semantic_meaning = "Internet Archive downloads field."
representation_class = "native_numeric"
representation_notes = "Direct numeric metadata field from the fixed advanced search result."
source_resources = ["search_result"]
filtering = "Keep all docs from the pinned query that carry numeric downloads/item_size/week fields."
missing_value_policy = "Rows missing any required numeric field are skipped."
conversion = "Parse JSON docs in response order and emit homogeneous raw little-endian numeric arrays."
numeric_kind = "uint"
bit_width = 32
endianness = "little"
sample_format = "raw homogeneous numeric array"
output_path = "samples/internetarchive_advancedsearch/ia_downloads/"

[[series]]
id = "ia_item_size_bytes"
description = "Per-document item size bytes."
semantic_meaning = "Internet Archive item_size field."
representation_class = "native_numeric"
representation_notes = "Direct numeric metadata field from the fixed advanced search result."
source_resources = ["search_result"]
filtering = "Same retained row set as ia_downloads."
missing_value_policy = "Rows missing any required numeric field are skipped."
conversion = "Parse JSON docs in response order and emit homogeneous raw little-endian numeric arrays."
numeric_kind = "uint"
bit_width = 64
endianness = "little"
sample_format = "raw homogeneous numeric array"
output_path = "samples/internetarchive_advancedsearch/ia_item_size_bytes/"

[[series]]
id = "ia_week"
description = "Per-document week field."
semantic_meaning = "Internet Archive week field from the search result."
representation_class = "native_numeric"
representation_notes = "Direct numeric metadata field from the fixed advanced search result."
source_resources = ["search_result"]
filtering = "Same retained row set as ia_downloads."
missing_value_policy = "Rows missing any required numeric field are skipped."
conversion = "Parse JSON docs in response order and emit homogeneous raw little-endian numeric arrays."
numeric_kind = "uint"
bit_width = 16
endianness = "little"
sample_format = "raw homogeneous numeric array"
output_path = "samples/internetarchive_advancedsearch/ia_week/"
