manifest_version = 1
dataset_id = "susy_uci"
name = "UCI SUSY"
description = "Large dense high-energy physics feature table with a binary label."
homepage = "https://archive.ics.uci.edu/dataset/279/susy"

[license]
name = "CC BY 4.0"
spdx = "CC-BY-4.0"
url = "https://creativecommons.org/licenses/by/4.0/"
citation = "SUSY, UCI Machine Learning Repository."
notes = "UCI metadata indicates CC BY 4.0."

[safety]
contains_sensitive_data = false
contains_personal_data = false
provenance_notes = "Official upstream UCI distribution only."
usage_notes = "Public source intended for reproducible numeric dataset collection."

[[origins]]
id = "official"
name = "UCI ML Repository"
url = "https://archive.ics.uci.edu/dataset/279/susy"
type = "data_portal"
notes = "Official upstream dataset page."

[[resources]]
id = "main"
origin = "official"
url = "https://archive.ics.uci.edu/static/public/279/susy.zip"
type = "archive"
version = "accessed_by_user"
access = "Direct public download."
size_bytes = 0
sha256 = ""
local_path = "downloads/susy_uci/susy.zip"
notes = "Archive containing SUSY.csv.gz or equivalent."

[local_paths]
downloads = "downloads/susy_uci/"
extracted = "extracted/susy_uci/"
filtered = "filtered/susy_uci/"
index = "index/susy_uci/"
samples = "samples/susy_uci/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/susy_uci/samples.jsonl"
summary = "Download pinned upstream resources, build local raw numeric samples only from local files, and generate a machine-readable sample index."
deterministic_notes = "Build preserves row order, emits one label sample and one sample per feature column, writes durable logs, and emits samples.jsonl under index/susy_uci/."

[[series]]
id = "susy_label"
description = "SUSY particle-physics feature column 001."
semantic_meaning = "SUSY particle-physics feature column 001."
role = "primary"
representation_class = "native_numeric"
missing_value_policy = "Records missing or with an unparseable value for this field are skipped by the build; constant or empty samples are rejected."
conversion = "Extract this field from each source record in order and store as raw little-endian uint8."
numeric_kind = "uint"
bit_width = 8
endianness = "little"
sample_format = "raw homogeneous numeric array"
sample_count = 0
total_size_bytes = 0
output_path = "samples/susy_uci/susy_label/"

