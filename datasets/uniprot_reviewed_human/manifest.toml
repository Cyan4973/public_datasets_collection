manifest_version = 1
dataset_id = "uniprot_reviewed_human"
name = "UniProt Reviewed Human"
description = "Pinned UniProt reviewed human protein sample with sequence length and molecular weight."

[license]
name = "UniProt"
spdx = "CC-BY-4.0"
url = "https://www.uniprot.org/help/license"

[[resources]]
id = "uniprot_reviewed_human_json"
url = "https://rest.uniprot.org/uniprotkb/search?query=(reviewed:true)%20AND%20(organism_id:9606)&format=json&size=500&fields=accession,length,mass"
type = "api_response"
local_path = "downloads/uniprot_reviewed_human/uniprot_reviewed_human.json"

[local_paths]
downloads = "downloads/uniprot_reviewed_human/"
filtered = "filtered/uniprot_reviewed_human/"
index = "index/uniprot_reviewed_human/"
samples = "samples/uniprot_reviewed_human/"

[processing]
download_script = "download.sh"
build_script = "build.sh"
verify_script = "verify.sh"
sample_index_path = "index/uniprot_reviewed_human/samples.jsonl"

[[series]]
id = "uniprot_sequence_length_u32"
representation_class = "native_numeric"
missing_value_policy = "Rows missing sequence metrics are filtered."
numeric_kind = "uint"
bit_width = 32
endianness = "little"

[[series]]
id = "uniprot_mol_weight_u32"
representation_class = "native_numeric"
missing_value_policy = "Rows missing sequence metrics are filtered."
numeric_kind = "uint"
bit_width = 32
endianness = "little"
